    [1, "十进制数 -127 的 8 位补码是", ["10000000","10000001","11111111","01111111"], 1, "答案：B (解析：-127的8位原码为11111111（符号位1，数值位为127的二进制1111111），补码计算规则为符号位不变，数值位取反后加1，即10000000+1=10000001；注意-128的8位补码是10000000)"],
    [1, "若 x 为负数，其补码的符号位是", ["0","1","随数值变化","不确定"], 1, "答案：B (解析：补码的符号位规则固定，正数符号位为0，负数符号位为1，与具体数值大小无关，仅用于区分数据的正负属性)"],
    [1, "以下哪种部件不属于运算器?", ["ALU","累加器","程序计数器(PC)","移位寄存器"], 2, "答案：C (PC属于控制器。解析：运算器由ALU（算术逻辑单元）、累加器、移位寄存器等部件组成；程序计数器(PC)属于控制器，用于存储下一条要执行的指令地址，控制程序执行顺序)"],
    [1, "中断服务程序的入口地址通常存储在", ["主存中","中断向量表中","寄存器中","缓存中"], 1, "答案：B (解析：中断向量表是专门存储各类中断服务程序入口地址的表格，中断发生时，CPU通过中断号查找该表，快速获取对应服务程序的入口地址并跳转执行)"],
    [1, "以下哪种情况会导致流水线阻塞?", ["指令顺序执行","数据相关","指令格式统一","操作数在寄存器中"], 1, "答案：B (解析：流水线阻塞的核心原因包括数据相关、控制相关和结构相关；数据相关指后一条指令依赖前一条指令的执行结果，当前一条指令未完成时，后一条指令无法执行，导致流水线停顿；指令顺序执行、格式统一、操作数在寄存器中均有利于流水线顺畅运行)"],
    [1, "高速缓冲存储器(Cache)的作用是", ["扩大存储容量","提高存储速度","降低存储功耗","简化寻址"], 1, "答案：B (解析：Cache基于局部性原理，缓存CPU近期常用的数据和指令，让CPU优先访问速度更快的Cache，缩短平均存储访问时间，核心作用是提高存储访问速度；扩大存储容量是辅存的功能)"],
    [1, "若 Cache 的命中率为 90%，Cache 的存取时间为 10ns，主存的存取时间为 100ns，则平均存取时间为", ["19ns","91ns","55ns","100ns"], 0, "答案：A (0.9*10 + 0.1*100 = 19。解析：平均存取时间计算公式为：平均存取时间=命中率×Cache存取时间+（1-命中率）×主存存取时间，代入数据计算可得0.9×10ns+0.1×100ns=19ns)"],
    [1, "下面哪种I/O接口数据控制方式使CPU与外部设备只能串行工作，浪费大量时间查询和等待。", ["程序控制方式","程序中断方式","DMA方式","通道方式"], 0, "答案：A (解析：程序控制方式（查询方式）下，CPU需要不断循环查询外部设备的就绪状态，设备未就绪时CPU只能等待，无法执行其他任务，导致CPU与设备串行工作，利用率极低；中断、DMA、通道方式均能提高CPU与设备的并行工作能力)"],
    [1, "( )的主要功能是存放程序和数据。", ["存储器","控制器","运算器","输入设备"], 0, "答案：A (存储器。解析：存储器包括主存和辅存，核心功能是存放计算机运行所需的程序和数据；控制器负责控制程序执行流程，运算器负责算术和逻辑运算，输入设备负责数据输入)"],
    [1, "存储器的地址线数量为 n，则其最大存储容量为", ["n 字节","2^n 字节","n^2 字节","2^n 位"], 1, "答案：B (解析：地址线数量为n时，可表示2^n个不同的内存地址，每个地址对应1字节的存储单元，因此最大存储容量为2^n字节；注意区分“字节”和“位”，存储器容量默认以字节为单位)"],
    [1, "页式虚拟存储器中，页面的大小通常是", ["固定的","可变的","随程序变化","随数据量变化"], 0, "答案：A (解析：页式虚拟存储器中，页面大小由系统预先设定（如4KB、8KB），为固定值；固定的页面大小便于内存管理和硬件实现，避免因页面大小可变带来的管理复杂度和硬件开销)"],
    [1, "指令寄存器(IR)用于存储", ["下一条要执行的指令","当前正在执行的指令","指令地址","操作数"], 1, "答案：B (解析：指令寄存器(IR)用于存储当前正在执行的指令，供指令译码器分析和执行；程序计数器(PC)存储下一条要执行的指令地址，存储器存储指令和数据)"],
    [1, "异步总线的传输是基于", ["时钟信号","握手信号","地址信号","数据信号"], 1, "答案：B (解析：异步总线无统一时钟信号，设备之间通过“请求-应答”握手信号协调数据传输，适合不同速度的设备连接；同步总线则基于统一时钟信号工作，地址信号和数据信号是总线传输的内容，而非同步依据)"],
    [1, "总线仲裁的目的是", ["解决多个设备同时请求总线的冲突","提高总线的传输速度","增加总线的带宽","简化总线的控制逻辑"], 0, "答案：A (解析：当多个设备同时请求使用总线时，会产生总线冲突，总线仲裁的目的就是通过一定的优先级规则，选择一个设备占用总线，解决冲突，保证总线有序、高效使用；仲裁不直接提高总线速度或带宽)"],
    [1, "定点数乘法运算中，部分积的位数通常是", ["与被乘数相同","与乘数相同","被乘数位数加乘数位数","被乘数位数减乘数位数"], 2, "答案：C (解析：定点数乘法运算中，若被乘数为n位，乘数为m位，则乘积的位数为n+m位，为了完整存储运算过程中的中间结果（部分积），部分积的位数需要覆盖n+m位)"],
    [1, "在相同存储容量下，与SRAM相比，DRAM的主要优势是", ["存取速度更快","结构简单、成本更低","无需地址译码电路","抗干扰能力更强"], 1, "答案：B (解析：SRAM采用6管触发器作为存储单元，存取速度快、抗干扰能力强，但结构复杂、成本高；DRAM采用单管+电容作为存储单元，结构简单、集成度高，相同容量下成本更低，适合作为大容量主存；两者均需要地址译码电路)"],
    [1, "( )是计算机内部存储、处理加工和传输汉字时所用的统一编码。", ["汉字输入码","汉字机内码","汉字外码","汉字字形码"], 1, "答案：B (解析：汉字机内码是计算机内部存储、处理和传输汉字的统一编码，确保汉字在计算机内部的一致性和唯一性；汉字输入码是输入汉字时的编码（如拼音码、五笔码），外码即输入码，字形码是汉字显示和打印时的编码)"],
    [1, "移码在计算机数据表示时，通常用于", ["浮点格式的尾数","浮点格式的阶码","浮点格式的基数","浮点格式的类型"], 1, "答案：B (解析：移码的数值大小与真值一致，且正数的移码大于负数的移码，便于阶码的比较和运算，能简化浮点数的对阶操作，因此常用于浮点格式的阶码表示；尾数通常采用补码或原码表示)"],
    [1, "微程序控制器中，微程序存放在", ["主存中","控制存储器中","寄存器中","缓存中"], 1, "答案：B (解析：微程序控制器中，微程序（由多条微指令组成，用于生成指令执行所需的控制信号序列）存储在控制存储器（CM）中，控制存储器位于CPU内部，采用ROM实现；主存用于存储用户程序和数据)"],
    [1, "控制器的主要功能是", ["进行算术运算","控制程序的执行","存储数据","传输数据"], 1, "答案：B (解析：控制器的核心功能是控制程序的执行，包括取指令、分析指令（译码）、向各部件发送控制信号，协调计算机各部件有序工作；算术运算由运算器负责，存储数据由存储器负责，传输数据由总线负责)"],
    [1, "复杂指令系统计算机(CISC)的特点是", ["指令数量少","指令功能简单","指令格式统一","指令功能复杂"], 3, "答案：D (解析：CISC（复杂指令系统计算机）的特点是指令数量多、功能复杂、寻址方式丰富、指令格式不统一，适合复杂操作，能减少指令执行条数；RISC（精简指令系统计算机）则指令数量少、功能简单、格式统一)"],
    [1, "中断控制方式中，设备请求 CPU 服务时通过( )发送中断信号", ["地址总线","数据总线","控制总线","电源总线"], 2, "答案：C (解析：系统总线按传输信息类型分为地址总线、数据总线和控制总线；中断信号属于控制信号，用于请求CPU提供服务，通过控制总线从设备发送给CPU；地址总线传地址，数据总线传数据，无电源总线的传输功能)"],
    [1, "主存储器的主要性能指标不包括", ["存储容量","存取速度","功耗","寻址方式"], 3, "答案：D (解析：主存储器的主要性能指标包括存储容量（存储数据的多少）、存取速度（存取数据的快慢，如存取时间、存储周期）、功耗（工作时的能耗）；寻址方式是存储器的访问方式，不属于性能指标)"],
    [1, "浮点数的表示精度取决于", ["阶码位数","尾数位数","基数","符号位"], 1, "答案：B (解析：浮点数由阶码和尾数组成，阶码决定数值的表示范围（阶码越大，范围越大），尾数决定数值的表示精度（尾数位数越长，有效数字越多，精度越高）；基数和符号位不决定精度)"],
    [1, "系统总线按传输信息的类型可分为", ["地址、数据、控制总线","内部、外部总线","并行、串行总线","同步、异步总线"], 0, "答案：A (解析：系统总线按传输信息的类型可分为地址总线（传输内存或I/O设备的地址）、数据总线（传输数据和指令）、控制总线（传输控制信号和状态信号）；内部/外部总线按总线作用范围分类，并行/串行按传输方式分类，同步/异步按同步方式分类)"],
    [1, "浮点运算中，阶码的主要作用是", ["表示数值的符号","表示数值的精度","表示数值的范围","简化运算"], 2, "答案：C (解析：浮点数的阶码用于表示数值的数量级，阶码越大，数值的范围（数量级）越大；尾数表示数值的精度，符号位表示数值的正负，对阶操作可简化浮点运算，但这不是阶码的主要作用)"],
    [1, "中断优先级的作用是", ["决定中断服务程序的长度","决定中断请求的先后响应顺序","决定中断的类型","决定中断的地址"], 1, "答案：B (解析：当多个中断请求同时发生时，中断优先级决定了CPU响应中断的先后顺序，优先级高的中断会先被响应和处理，优先级低的中断需等待高优先级中断处理完成后再响应；与中断服务程序长度、中断类型、中断地址无关)"],
    [1, "状态寄存器(PSW)用于存储", ["指令地址","操作数","程序执行状态","控制信号"], 2, "答案：C (解析：状态寄存器(PSW)用于存储程序执行过程中的状态信息，如进位标志、溢出标志、零标志、符号标志等，反映指令执行后的结果状态，供后续指令判断和使用；指令地址存于PC，操作数存于寄存器或存储器，控制信号由控制器产生)"],
    [1, "以下哪种寻址方式的操作数地址由指令直接给出?", ["立即寻址","直接寻址","间接寻址","寄存器寻址"], 1, "答案：B (解析：直接寻址方式中，指令的地址码字段直接给出操作数的内存地址，CPU通过该地址即可访问操作数；立即寻址是操作数直接在指令中，间接寻址是地址码给出操作数地址的地址，寄存器寻址是地址码给出寄存器编号)"],
    [1, "存储层次结构中，从外到内的顺序是", ["辅存→主存→Cache→寄存器","寄存器→Cache→主存→辅存","主存→辅存→Cache→寄存器","Cache→主存→辅存→寄存器"], 0, "答案：A (解析：计算机存储层次从外到内（对应速度由慢到快、容量由大到小、成本由低到高）依次为：辅存（硬盘、U盘、光盘）→主存（内存）→Cache（高速缓存）→寄存器（CPU内部）)"],
    [1, "定点小数的表示范围取决于", ["符号位位数","尾数位数","符号位和尾数位数","基数"], 2, "答案：C (解析：定点小数的表示范围由符号位和尾数位数共同决定，符号位区分正负（决定范围的正负区间），尾数位数决定数值的大小范围和精度（尾数位数越长，可表示的数值范围越大、精度越高）；定点数基数通常为2，不影响表示范围的核心决定因素)"],
    [1, "一般将运算器一次运算能处理的二进制位数称为", ["存储字长","指令字长","机器字长","数据字长"], 2, "答案：C (解析：机器字长是指运算器一次能处理的二进制位数，与CPU寄存器、ALU的位数一致，决定了CPU一次能处理的数据宽度和运算精度；存储字长是存储器一次存取的二进制位数，指令字长是一条指令的二进制位数，数据字长是数据的二进制位数)"],
    [1, "逻辑运算中，“异或” 的结果为 1 的条件是", ["两个输入均为 1","两个输入均为 0","两个输入不同","两个输入相同"], 2, "答案：C (解析：逻辑异或运算的规则是“相同为0，不同为1”，即当两个输入信号一个为0、一个为1时，运算结果为1；两个输入均为0或均为1时，结果为0)"],
    [1, "以下哪种寻址方式的寻址范围最大?", ["直接寻址","间接寻址","变址寻址","相对寻址"], 2, "答案：C (变址寻址通常范围最大。解析：变址寻址通过变址寄存器的内容加上指令中的位移量得到有效地址，变址寄存器的位数通常与地址总线位数一致，寻址范围由变址寄存器位数决定，范围最大；直接寻址范围由指令地址码位数决定，相对寻址以PC为基准，范围有限，间接寻址范围受中间地址存储单元限制)"],
    [1, "相对寻址方式中，有效地址是", ["PC的内容加位移量","基址寄存器的内容加位移量","变址寄存器的内容加位移量","指令地址加位移量"], 0, "答案：A (解析：相对寻址以程序计数器(PC)的内容（当前指令的下一条指令地址）为基准，加上指令中给出的位移量，得到操作数或转移指令的有效地址；基址寄存器+位移量是基址寻址，变址寄存器+位移量是变址寻址)"],
    [1, "转移指令的主要作用是", ["改变程序执行顺序","进行算术运算","存储数据","传输数据"], 0, "答案：A (解析：转移指令属于控制类指令，其主要作用是通过修改程序计数器(PC)的值，改变程序的执行顺序，实现程序的分支、循环、跳转等功能；算术运算由运算类指令完成，存储/传输数据由数据传输类指令完成)"],
    [1, "指令的地址码字段用于指定", ["操作数的地址","操作码","指令的地址","程序状态"], 0, "答案：A (解析：指令通常由操作码字段和地址码字段组成，操作码字段指定指令的操作类型（如加法、跳转），地址码字段用于指定操作数的地址（或操作数本身）；指令的地址存于PC，程序状态存于PSW)"],
    [1, "控制单元产生的控制信号是", ["数字信号","模拟信号","地址信号","数据信号"], 0, "答案：A (电平信号。解析：计算机内部采用二进制数字逻辑，控制单元产生的控制信号是数字信号，通过电平的高低（0或低电平、1或高电平）表示不同的控制命令；模拟信号是连续变化的信号，计算机内部不采用，地址信号和数据信号是总线传输的内容，而非控制信号的类型)"],
    [1, "I/O 接口的主要功能不包括", ["数据缓冲","地址译码","指令执行","电平转换"], 2, "答案：C (指令执行是CPU的事。解析：I/O接口的主要功能包括数据缓冲（协调CPU与设备的速度差异）、地址译码（识别自身设备地址）、电平转换（匹配CPU与设备的电平标准）、数据格式转换等；指令执行是CPU的核心功能，不属于I/O接口功能)"],
    [1, "寄存器寻址方式的优点是", ["寻址范围大","存取速度快","指令长度长","无需地址码"], 1, "答案：B (解析：寄存器寻址方式中，操作数存储在CPU内部的寄存器中，CPU访问寄存器的速度远快于访问内存，因此该寻址方式的存取速度快，能提高指令执行效率；其寻址范围由寄存器数量决定（范围较小），指令长度较短，需要地址码指定寄存器编号)"],
    [1, "冯·诺依曼机工作的基本方式的特点是", ["多指令流单数据流","按地址访问并顺序执行指令","堆栈操作","存贮器按内容选择地址"], 1, "答案：B (解析：冯·诺依曼机的核心工作特点是“存储程序”和“按地址访问并顺序执行指令”，即程序和数据存储在存储器中，CPU按地址取出指令，依次执行，实现程序的自动运行；多指令流单数据流是阵列处理机的特点，按内容访问是相联存储器的特点)"],
    [1, "算术逻辑单元(ALU)不能完成的操作是", ["加法运算","逻辑与运算","存储数据","移位运算"], 2, "答案：C (解析：算术逻辑单元(ALU)是运算器的核心，负责执行算术运算（如加法、减法、乘法）、逻辑运算（如与、或、非、异或）和移位运算（如左移、右移）；ALU不具备存储能力，存储数据是存储器、寄存器的功能)"],
    [1, "以下哪种存储器的存取速度最快?", ["硬盘","寄存器","主存","缓存"], 1, "答案：B (解析：存储器的存取速度从快到慢依次为：寄存器（CPU内部，无访问延迟，速度最快）→Cache（高速缓存，靠近CPU）→主存（内存）→硬盘（辅存，机械或固态，速度最慢）)"],
    [1, "指令的执行过程不包括", ["取指令","分析指令","执行指令","存储指令"], 3, "答案：D (解析：指令的执行过程通常分为三个核心阶段：取指令（从存储器取出指令存入IR）、分析指令（译码指令，获取操作数）、执行指令（执行操作，存储结果）；存储指令是存储器的功能，不属于指令的执行过程)"],
    [1, "BCD 码加法中，当和大于 9 时，需要进行( )调整", ["加 6","减 6","加 10","减 10"], 0, "答案：A (解析：BCD码是用4位二进制表示1位十进制数，4位二进制最大表示15，而十进制最大为9；当BCD码加法结果大于9时，需要加6调整，将二进制进位转换为十进制进位，得到正确的BCD码结果)"],
    [1, "立即寻址方式的操作数位于", ["主存中","寄存器中","指令中","堆栈中"], 2, "答案：C (解析：立即寻址方式中，操作数直接包含在指令的地址码字段中，CPU取出指令时即可同时获取操作数，无需访问内存、寄存器或堆栈，执行速度快；操作数在主存中是直接/间接寻址，在寄存器中是寄存器寻址，在堆栈中是堆栈寻址)"],
    [1, "指令译码器的作用是", ["翻译指令的操作码","存储指令","计算操作数地址","执行指令操作"], 0, "答案：A (解析：指令译码器位于CPU内部，其核心作用是翻译指令的操作码字段，识别指令的操作类型（如加法、跳转、数据传输），为后续的指令执行提供依据；存储指令由存储器完成，计算操作数地址由寻址逻辑完成，执行指令操作由ALU等部件完成)"],
    [1, "交叉存储器的主要作用是", ["提高并行存取能力","扩大存储容量","降低功耗","简化控制逻辑"], 0, "答案：A (解析：交叉存储器（多体并行存储器）将主存分为多个独立的、并行工作的存储体，每个存储体有独立的地址线、数据线和控制线，多个存储体可以同时存取数据，从而提高存储器的并行存取能力和整体存取速度；不直接扩大存储容量、降低功耗或简化控制逻辑)"],
    [1, "以下哪种运算会产生溢出?", ["正+正=正","负+负=负","正+负=正","正+正=负"], 3, "答案：D (解析：溢出是指运算结果超出了数据的表示范围，仅发生在同号数相加时；正+正=负，表示运算结果超出了正数的表示范围，产生正溢出；负+负=正产生负溢出；正+负不会产生溢出，结果的绝对值不大于较大的绝对值)"],
    [1, "输出设备的主要作用是", ["向计算机输入数据","存储计算机数据","将计算机处理结果转换为人类可识别形式","控制计算机运行"], 2, "答案：C (解析：输出设备是计算机与用户交互的桥梁，其主要作用是将计算机处理后的二进制数字结果，转换为人类可识别的形式（如文字、图像、声音、文档等）；输入数据是输入设备的功能，存储数据是存储器的功能，控制运行是控制器的功能)"],
    [1, "以下哪种编码是定点整数的常用表示方式?", ["BCD 码","补码","移码","余 3 码"], 1, "答案：B (解析：补码是定点整数的常用表示方式，其优点是能表示负数，且可以将减法运算转换为加法运算，简化运算电路的设计，提高运算效率；BCD码、余3码是十进制数的编码方式，移码主要用于浮点数的阶码表示)"],
    [1, "以下哪种接口是并行接口?", ["USB","串口","并口(LPT)","Ethernet"], 2, "答案：C (解析：并行接口是同时传输多位数据（如8位、16位）的接口，并口(LPT)是典型的并行接口，常用于连接老式打印机；USB、串口、Ethernet（以太网）均为串行接口，依次传输每位数据，抗干扰能力强，传输距离更远)"],
    [1, "下列关于原码和补码的说法，正确的是", ["原码的零表示唯一","补码的零表示唯一","原码运算更简便","补码不能表示负数"], 1, "答案：B (解析：原码中零有两种表示形式：正零（00000000）和负零（10000000）；补码中零的表示唯一，仅为00000000；补码可将减法转换为加法，运算更简便，且能表示负数，这是补码相比原码的核心优势)"],
    [1, "若浮点数的阶码用移码表示，尾数用补码表示，当阶码全 0 且尾数全 0 时，表示", ["正零","负零","机器零","下溢"], 2, "答案：C (解析：在浮点数的表示规则中，当阶码全0且尾数全0时，表示机器零，这是浮点数中统一的零表示形式，避免了原码中零的多义性，便于硬件实现和数据处理；正零/负零无此统一表示，下溢是指运算结果的绝对值小于浮点数的最小可表示值)"],
    [1, "下面关于TLB解释错误的项", ["用于缓冲经常访问的页表项","大多采用全相联或组相联方式工作","它离CPU比较远","存储的内容包含页表项的VPN和PPN"], 2, "答案：C (TLB在CPU内。解析：TLB（快表）是位于CPU内部的高速缓存，用于缓冲经常访问的页表项，减少CPU访问主存页表的次数；TLB大多采用全相联或组相联方式工作，存储的内容包含虚拟页号（VPN）和物理页号（PPN）的对应关系；其靠近CPU，访问速度快)"],
    [1, "动态MOS存储器(DRAM)需要周期性刷新的根本原因是", ["存储单元漏电导致电荷流失","地址线与数据线之间的干扰","电源电压波动影响数据稳定性","读写操作时的信号衰减"], 0, "答案：A (解析：DRAM的存储单元采用单管+电容结构，电容会因漏电导致存储的电荷逐渐流失，从而丢失存储的数据；为了保持数据的完整性，需要周期性地对DRAM存储单元进行刷新，补充电容的电荷；其他选项均不是DRAM需要周期性刷新的根本原因)"],
    [1, "程序计数器(PC)的作用是", ["存储当前执行的指令","存储下一条要执行的指令地址","存储运算结果","存储程序状态"], 1, "答案：B (解析：程序计数器(PC)是CPU内的专用寄存器，其核心作用是存储下一条要执行的指令地址，CPU通过读取PC的值获取指令地址，取指后自动更新PC的值，保证程序按顺序执行；当前指令存于IR，运算结果存于累加器/寄存器，程序状态存于PSW)"],
    [1, "DMA方式中，DMA控制器控制的数据传输通路位于", ["CPU和主存之间","CPU和设备接口之间","设备接口和主存之间","设备接口和DMA控制器之间"], 2, "答案：C (解析：DMA（直接存储器访问）方式中，DMA控制器直接接管总线控制权，控制设备接口和主存之间进行数据传输，无需CPU干预，数据传输通路直接在设备接口和主存之间建立，大幅提高数据传输效率；不经过CPU，避免了CPU的瓶颈限制)"],
    [1, "下列关于I/O控制方式的叙述中，错误的是", ["查询方式下，通过CPU执行查询程序进行I/O操作","中断方式下，通过CPU执行中断服务程序进行I/0操作","DMA方式下，通过CPU执行DMA传送程序进行I/O操作","对于SSD、网络适配器等高速设备采用DMA传送方式进行I/O操作"], 2, "答案：C (DMA是硬件控制。解析：DMA方式是由DMA控制器硬件直接控制数据传输，无需CPU执行任何传送程序，仅在数据传输开始和结束时向CPU发送中断信号；查询方式、中断方式均需要CPU执行相应程序完成I/O操作，高速设备通常采用DMA方式提高传输效率)"],
    [1, "基址寻址中，基址寄存器的内容是", ["固定不变的","随程序变化","由指令指定","由操作数决定"], 0, "答案：A (解析：基址寻址中，基址寄存器的内容通常由操作系统设置，用于确定内存的基地址（如程序的内存起始地址），一旦设置完成后固定不变；指令中给出位移量，有效地址=基址寄存器内容+位移量；变址寄存器的内容随程序变化)"],
    [1, "以下哪种存储器常用于作为计算机的启动引导存储器?", ["硬盘","软盘","ROM","RAM"], 2, "答案：C (解析：ROM（只读存储器）是非易失性存储器，断电后数据不会丢失，常用于存储计算机的启动引导程序（如BIOS），计算机开机时首先从ROM中读取引导程序，初始化硬件并加载操作系统；硬盘、软盘是辅存，RAM是易失性主存，断电后数据丢失，无法存储启动引导程序)"],
    [1, "指令的格式通常包括", ["操作码字段和地址码字段","操作数字段和地址码字段","操作码字段和操作数字段","地址码字段和控制字段"], 0, "答案：A (解析：指令的基本格式通常由操作码字段和地址码字段组成，操作码字段用于指定指令的操作类型（如加法、数据传输、跳转），地址码字段用于指定操作数的地址或操作数本身；控制字段不存在于指令基本格式中，操作数通过地址码字段获取)"],
    [1, "以下哪种指令属于数据传输类指令?", ["ADD","MOV","JMP","AND"], 1, "答案：B (解析：数据传输类指令的核心功能是实现数据的传输和存储，MOV指令用于将数据从一个位置（寄存器/内存）传输到另一个位置，属于数据传输类指令；ADD是算术运算类指令，JMP是控制转移类指令，AND是逻辑运算类指令)"],
    [1, "CPU 与主存之间的数据传输通过( )完成", ["地址总线","数据总线","控制总线","电源总线"], 1, "答案：B (解析：系统总线按传输信息类型分为地址总线、数据总线和控制总线；数据总线用于传输CPU与主存、I/O设备之间的数据和指令，CPU与主存之间的数据传输通过数据总线完成；地址总线传输地址信息，控制总线传输控制信号和状态信号，无电源总线的传输功能)"],
    [1, "流水线技术的核心是", ["提高指令执行的并行性","增加指令数量","简化指令格式","降低功耗"], 0, "答案：A (解析：流水线技术将指令的执行过程分解为多个独立的阶段（如取指、译码、执行、写回），多个指令可以在不同的阶段同时并行执行，其核心是提高指令执行的并行性，从而提高CPU的指令吞吐率；不增加指令数量、不直接简化指令格式或降低功耗)"],
    [1, "多核 CPU 的主要优势是", ["提高单个指令的执行速度","支持多任务并行执行","降低存储容量需求","简化控制逻辑"], 1, "答案：B (解析：多核CPU集成了多个独立的运算核心（核心），每个核心可以独立执行任务，能够同时处理多个任务，支持多任务并行执行，大幅提高计算机的整体处理性能；多核CPU不提高单个指令的执行速度，不降低存储容量需求，也不简化控制逻辑)"],
    [1, "以下哪种存储器属于非易失性存储器?", ["SRAM","DRAM","闪存(Flash)","寄存器"], 2, "答案：C (解析：非易失性存储器是指断电后数据仍能保持的存储器，闪存(Flash)属于非易失性存储器，常用于U盘、固态硬盘(SSD)等；SRAM、DRAM、寄存器均为易失性存储器，断电后数据会丢失，其中SRAM和DRAM是主存，寄存器位于CPU内部)"],
    [1, "32位补码所能表示的整数范围是", ["-2^32 ~ 2^31-1","-2^31 ~ 2^31-1","-2^32 ~ 2^32-1","-2^31 ~ 2^32-1"], 1, "答案：B (解析：32位补码中，最高位为符号位，0表示正数，1表示负数；正数的范围是0~2^31-1，负数的范围是-2^31~-1，因此32位补码的整体整数范围是-2^31 ~ 2^31-1；注意n位补码的表示范围是-2^(n-1) ~ 2^(n-1)-1)"],
    [1, "采用海明码对长度为8的数据实现纠正一位错，则添加校验位数至少为", ["2","3","4","5"], 2, "答案：C (4位，2^k >= n+k+1, 2^4=16 >= 8+4+1=13)。解析：海明码纠正一位错的校验位数量k需满足公式2^k >= n+k+1（其中n为数据位长度）；代入n=8，依次验证：k=3时2^3=8 < 8+3+1=12，不满足；k=4时2^4=16 >= 8+4+1=13，满足，因此校验位至少为4位)"],
    [1, "以下哪种总线仲裁方式响应速度最快?", ["链式查询","计数器定时查询","独立请求","优先级查询"], 2, "答案：C (解析：总线仲裁方式中，独立请求方式的每个设备都有独立的请求线和响应线，总线仲裁器可以直接识别优先级最高的请求设备并给予响应，无需逐级查询或计数，响应速度最快；链式查询响应速度最慢，计数器定时查询响应速度介于两者之间，优先级查询并非标准仲裁方式)"],
    [1, "补码减法的运算规则是", ["被减数加减数","被减数加减数的补码","被减数加减数的反码","被减数加减数的负数补码"], 3, "答案：D。解析：补码减法的核心是将减法运算转换为加法运算，根据补码运算规则，[X-Y]补=[X]补+[-Y]补，即**被减数的补码加上减数的负数的补码**。选项A直接对真值做减法，未利用补码特性；选项B直接加减数的补码，违背补码减法转换逻辑；选项C使用反码无运算依据，均为错误选项。其中[-Y]补需对[Y]补按位取反后末位加1得到，是实现补码减法的关键操作。"],
    [1, "对于定点小数而言，采用变形补码后，其模为", ["1","2","4","8"], 2, "答案：C (变形补码即双符号位，模4)。解析：变形补码又称双符号位补码，采用两位符号位表示数据的正负，其模为4（对应二进制100）；变形补码的主要作用是便于判断溢出，当两位符号位不同时，表示产生了溢出)"],
    [1, "指令系统中，操作码的位数决定了", ["指令的地址范围","指令的数量","操作数的类型","指令的执行速度"], 1, "答案：B (解析：操作码用于表示指令的操作类型，操作码的位数为k时，最多可以表示2^k种不同的操作，即指令的数量最多为2^k条，因此操作码的位数决定了指令系统中指令的数量；指令的地址范围由地址码位数决定，操作数类型由寻址方式决定，执行速度由硬件实现决定)"],
    [1, "二进制加法运算中，产生进位的条件是", ["两个加数均为 1","两个加数不同","两个加数均为 0","进位输入为 1"], 0, "答案：A (解析：二进制加法运算遵循“逢二进一”的规则，当两个加数的对应位均为1时，相加结果为2，需要向高位产生1个进位；两个加数不同时结果为1，无进位；两个加数均为0时结果为0，无进位；进位输入是低位向高位的进位，不是产生进位的根本条件)"],
    [1, "程序查询方式的特点是", ["CPU 效率高","无需 CPU 干预","CPU 需不断查询设备状态","设备主动向 CPU 发请求"], 2, "答案：C (解析：程序查询方式（查询方式）中，CPU需要不断循环执行查询程序，检测外部设备的就绪状态，设备未就绪时CPU只能等待，无法执行其他任务；其特点是CPU效率低、需要CPU全程干预，设备被动等待查询，不主动发请求；设备主动发请求是中断方式的特点)"],
    [1, "总线的工作频率越高，其", ["传输带宽越大","传输带宽越小","延迟越大","功耗越小"], 0, "答案：A (解析：总线的传输带宽（数据传输率）计算公式为：带宽=总线工作频率×总线宽度/8（单位为字节/秒）；在总线宽度不变的情况下，总线的工作频率越高，传输带宽越大，数据传输速度越快；工作频率越高，通常延迟越小、功耗越大)"],
    [1, "某机器指令的操作码长度为16，地址码长度为8，下面说法错误的是", ["该指令系统最多16条指令","若是立即寻址，数据范围-128~127","若是寄存器寻址，寄存器最多256个","若是直接寻址，内存单元仅有256个"], 0, "答案：A (16位操作码是2^16条)。解析：操作码长度为16位时，最多可以表示2^16条不同的指令，而非16条；8位地址码作为立即数时，补码表示范围为-128~127；作为寄存器编号时，最多可以标识256个寄存器；作为直接寻址地址时，最多可以访问256个内存单元，因此选项A错误)"],
    [1, "USB 接口的特点不包括", ["热插拔","即插即用","并行传输","支持多个设备"], 2, "答案：C (USB是串行)。解析：USB接口是一种通用串行接口，其特点包括热插拔（无需断电即可插拔设备）、即插即用（系统自动识别并配置设备）、支持多个设备（通过集线器扩展）、传输距离远、抗干扰能力强等；USB采用串行传输方式，而非并行传输，因此并行传输不是其特点)"],
    [1, "总线的负载能力是指", ["总线可承受的电压","总线可连接的设备数量","总线的最大传输距离","总线的最大传输速率"], 1, "答案：B (解析：总线的负载能力又称总线的驱动能力，是指总线能够稳定、可靠地连接的外部设备数量；当连接的设备数量超过总线的负载能力时，会导致总线信号衰减、失真，影响数据传输的稳定性；与总线承受的电压、传输距离、传输速率无关)"],
    [1, "下列关于多重中断系统描述错误的是", ["一条指令执行结束才响应中断","中断处理期间一直关中断","中断请求信号与当前指令无关","中断信号是设备向CPU发出"], 1, "答案：B (多重中断允许中断嵌套，不会一直关中断)。解析：多重中断系统支持中断嵌套，即在处理低优先级中断的过程中，可以响应并处理更高优先级的中断；因此中断处理期间不会一直关中断，而是在执行中断服务程序的关键部分关中断，其他部分开中断，允许更高优先级中断进入；选项A、C、D均为多重中断系统的正确描述)"],
    [1, "中央处理器(CPU)是指", ["运算器","控制器","运算器和控制器","运算器和控制器及主存"], 2, "答案：C (解析：中央处理器(CPU)由运算器和控制器两大部分组成，运算器负责算术和逻辑运算，控制器负责控制程序的执行，协调计算机各部件有序工作；主存位于CPU外部，不属于CPU的组成部分，CPU还包含寄存器组等辅助部件)"],
    [1, "CPU 的主要组成部分不包括", ["运算器","控制器","存储器","寄存器组"], 2, "答案：C (指主存)。解析：CPU的主要组成部分包括运算器、控制器和寄存器组，寄存器组用于临时存储数据和指令地址，提高CPU的运算效率；此处的存储器指主存（内存），主存位于CPU外部，不属于CPU的组成部分，因此CPU不包括存储器)"],
    [1, "同步总线的特点是", ["传输速度慢","控制逻辑复杂","所有设备按统一时钟工作","设备可自行决定传输时机"], 2, "答案：C (解析：同步总线的核心特点是所有连接在总线上的设备都按统一的时钟信号同步工作，时钟信号由总线控制器产生，设备在时钟的上升沿/下降沿完成数据的传输和接收；其控制逻辑简单、传输速度快，设备无法自行决定传输时机，需遵循统一时钟节奏)"],
    [1, "地址总线的主要功能是", ["传输数据","传输指令","传输内存或 I/O 设备的地址","传输控制信号"], 2, "答案：C (解析：系统总线按传输信息类型分为地址总线、数据总线和控制总线；地址总线的主要功能是传输CPU要访问的内存单元或I/O设备的地址信息，地址总线的位数决定了存储器的寻址范围；传输数据/指令的是数据总线，传输控制信号的是控制总线)"],
    [1, "下列关于主存(MEM)和控制存储器(CS)的叙述中，错误的是", ["MEM在CPU外，CS在CPU内","MEM按地址访问，CS按内容访问","MEM存储指令和数，CS存储微指令","MEM用RAM实现，CS用ROM实现"], 1, "答案：B (CS也是按地址访问的)。解析：控制存储器(CS)用于存储微程序（微指令序列），其访问方式与主存(MEM)一致，均为按地址访问，而非按内容访问；按内容访问是相联存储器的特点；选项A、C、D均为MEM和CS的正确叙述)"],
    [1, "虚拟存储器的主要目的是", ["提高存储速度","扩大逻辑存储容量","降低存储成本","简化存储管理"], 1, "答案：B (解析：虚拟存储器通过将主存和辅存统一编址，构建一个比实际主存容量大得多的逻辑存储器，其主要目的是扩大计算机的逻辑存储容量，让程序可以访问超出实际主存容量的存储空间；提高存储速度是Cache的功能，降低存储成本、简化存储管理不是其主要目的)"],
    [1, "精简指令系统计算机(RISC)的指令长度通常是", ["可变的","固定的","随操作数变化","随地址码变化"], 1, "答案：B (解析：RISC（精简指令系统计算机）的特点是指令数量少、功能简单、指令长度固定、寻址方式简单，固定的指令长度便于硬件实现流水线技术，提高指令执行效率；CISC（复杂指令系统计算机）的指令长度通常是可变的)"],
    [1, "CPU 执行指令的周期不包括", ["取指周期","分析周期","执行周期","存储周期"], 3, "答案：D (解析：CPU执行指令的周期通常包括取指周期（取出指令）、分析周期（译码并获取操作数）、执行周期（执行操作并存储结果），这三个周期构成了指令的基本执行流程；存储周期是存储器完成一次读写操作所需的时间，不属于CPU执行指令的周期)"],
    [1, "静态 RAM(SRAM)的存储单元是基于( )原理", ["电容存储电荷","触发器","二极管导通","电感储能"], 1, "答案：B (解析：SRAM（静态随机存取存储器）的存储单元采用6管CMOS触发器结构，触发器具有两个稳定的工作状态，分别对应二进制0和1，无需周期性刷新即可保持存储的数据；电容存储电荷是DRAM的存储原理，二极管导通是ROM的存储原理之一，电感储能与存储器存储原理无关)"],
    [1, "DMA(直接存储器访问)方式的优点是", ["无需 CPU 干预数据传输","传输速度慢","控制逻辑简单","适合少量数据传输"], 0, "答案：A (解析：DMA方式的核心优点是数据传输过程中无需CPU干预，由DMA控制器硬件直接控制设备与主存之间的数据传输，仅在传输开始和结束时向CPU发送中断信号，大幅提高数据传输速度和CPU的利用率；其传输速度快、控制逻辑复杂，适合大量数据传输（如磁盘I/O、数据通信）)"],
    [1, "相联存储器是按( )进行访问的", ["地址","内容","顺序","随机"], 1, "答案：B (解析：相联存储器是一种特殊的存储器，不按地址访问，而是按内容访问，即根据存储数据的部分内容或全部内容来查找对应的存储单元，常用于TLB（快表）、缓存、数据库索引等场景；普通存储器通常按地址访问，顺序访问是磁带的访问方式，随机访问是RAM的访问方式)"],
    [1, "总线的带宽是指", ["总线的物理宽度","总线可连接的设备数量","总线每秒传输的数据量","总线的工作频率"], 2, "答案：C (解析：总线的带宽又称数据传输率，是指总线每秒能够传输的最大数据量，单位通常为字节/秒（B/s）或比特/秒（bps）；总线的物理宽度是总线的线数，工作频率是总线的时钟频率，可连接设备数量是总线的负载能力，均与带宽不同)"],
    [1, "在操作系统运行下，CPU以虚拟地址访问主存，经过( )部件找出对应关系", ["MMU","页表","页表项","快表"], 0, "答案：A (解析：MMU（存储管理单元）是CPU内部的专用硬件部件，其核心功能是将CPU发出的虚拟地址（逻辑地址）转换为物理地址（实际内存地址），找出虚拟地址与物理地址的对应关系；页表、页表项、快表（TLB）是地址转换过程中使用的数据结构或缓存，并非核心转换部件，MMU通过访问这些结构完成地址转换)"],
    [1, "硬布线控制器的特点是", ["控制逻辑灵活","设计复杂","易于修改","适合复杂指令系统"], 1, "答案：B (解析：硬布线控制器采用组合逻辑电路和时序逻辑电路产生控制信号，其特点是控制信号产生速度快、执行效率高，但设计复杂、灵活性差、不易于修改和扩展，适合指令系统简单的计算机；微程序控制器控制逻辑灵活、易于修改，适合复杂指令系统)"],
      
      // --- 来源：题库解析 (混杂题) ---
    [0, "移码可以用于定点整数和小数的表示。", null, 0, "移码主要用于浮点数的阶码表示。解析：移码的数值大小与真值一致，且正数移码大于负数移码，便于阶码的比较和对阶操作，因此主要用于浮点数的阶码表示；定点整数和小数通常采用补码、原码表示，移码不适合用于定点数表示。"],
    [0, "定点数表示法约定计算机中所有数据的小数点不固定。", null, 0, "定点数的小数点是固定的。解析：定点数的核心特点是小数点位置固定不变，分为定点整数（小数点在最低位之后）和定点小数（小数点在符号位与最高数值位之间）；小数点位置不固定的是浮点数，而非定点数。"],
    [0, "设定点小数 x=x0x1...x5，其中 x0 为最高有效位。", null, 0, "x0通常是符号位。解析：定点小数的格式中，最高位x0为符号位，用于区分正负（0表示正数，1表示负数），x1~x5为数值位（尾数），表示小数的有效部分，因此x0不是最高有效位，而是符号位。"],
    [0, "设定点整数 x=x0x1...x5，其中 x1 代表小数点的位置。", null, 0, "小数点通常在最低位之后。解析：定点整数的小数点位置固定在最低数值位之后，即x5的右侧，所有位均为整数部分；x0为符号位，x1~x5为整数的数值位，x1并不代表小数点位置。"],
    [0, "定点数表示范围中的每一个数都可以对应数轴上的一个刻度。", null, 1, "正确。解析：定点数的表示范围是连续的整数或小数集合，每个可表示的数在数轴上都有唯一对应的点（刻度），且相邻刻度之间的间隔相等，符合数轴的刻度特性。"],
    [0, "如果一个大于0的纯小数超出定点小数的正值表示范围，那么发生了正下溢。", null, 1, "正确。解析：下溢是指运算结果的绝对值小于数据的最小可表示值；当正数纯小数超出定点小数的正值范围（即绝对值过小）时，属于正下溢，此时通常将结果置为机器零。"],
    [0, "浮点数中的小数点位置固定。", null, 0, "浮点数小数点位置不固定（浮动）。解析：浮点数的核心特点是小数点位置不固定（可浮动），通过阶码和尾数共同表示数值，阶码决定小数点的位置，尾数决定数值的有效数字；小数点固定的是定点数。"],
    [0, "二进制浮点数可表示成阶码和尾数两部分。", null, 1, "正确。解析：二进制浮点数的通用表示形式为N=尾数×2^阶码，其中尾数表示数值的有效数字，阶码表示小数点的位置，通过两者的组合可以表示大范围、高精度的数值。"],
    [0, "二进制浮点数中阶码是定点小数，而尾数是定点整数。", null, 0, "阶码通常是整数，尾数是小数。解析：二进制浮点数中，阶码通常采用定点整数表示（常用移码），用于表示小数点的偏移位数；尾数通常采用定点小数表示（常用补码或原码），用于表示数值的有效部分。"],
    [0, "IEEE754标准中的32位单精度浮点数具体由1位符号位、8位阶码、23位尾数构成。", null, 1, "正确。解析：IEEE754标准规定，32位单精度浮点数的格式为：1位符号位（0正1负）、8位阶码（采用移码表示，偏移量127）、23位尾数（隐含整数位1，实际有效位数24位）。"],
    [0, "SRAM的存取速度通常比DRAM快，是因为其无需地址译码过程。", null, 0, "错在原因，是因为SRAM基于触发器。解析：SRAM的存取速度比DRAM快的根本原因是SRAM采用6管触发器作为存储单元，无需周期性刷新，读写延迟低；DRAM采用单管+电容结构，需要刷新且读写延迟高；两者均需要地址译码过程，与译码无关。"],
    [0, "Flash存储器属于电可擦除可编程ROM(EEPROM)的一种变体。", null, 1, "正确。解析：Flash存储器（闪存）是EEPROM的一种变体，属于非易失性存储器，继承了EEPROM电可擦除、可编程的特性，同时优化了集成度和读写速度，广泛用于U盘、固态硬盘等设备。"],
    [0, "DRAM芯片的地址线数量通常是其存储单元地址位数的一半。", null, 1, "地址复用技术。解析：DRAM芯片采用地址复用技术，将地址分为行地址和列地址，通过同一组地址线分两次传输行地址和列地址，因此地址线数量仅为存储单元地址位数的一半，有效减少了芯片的引脚数量。"],
    [0, "PROM芯片在编程后，若发现错误可以通过电信号擦除后重新编程。", null, 0, "PROM是一次性编程。解析：PROM（可编程只读存储器）只能一次性编程，编程后数据永久固定，无法通过电信号或紫外线擦除；可电擦除的是EEPROM和Flash，可紫外线擦除的是EPROM。"],
    [0, "BIOS芯片通常采用EEPROM，允许用户在系统中更新固件。", null, 1, "正确。解析：BIOS芯片用于存储计算机的基本输入输出系统固件，通常采用EEPROM（电可擦除可编程ROM），支持在系统运行时通过电信号擦除和重写，方便用户更新BIOS固件。"],
    [0, "只读存储器(ROM)在正常工作状态下只能读取数据，不能写入数据。", null, 1, "正确。解析：ROM（只读存储器）的核心特性是正常工作状态下（计算机运行时）只能读取存储的数据，不能写入或修改；部分ROM（如PROM、EEPROM）可通过专用设备在特定条件下编程写入，但正常工作时仍为只读。"],
    [0, "SRAM和DRAM在读取操作时都需要先进行预充电操作。", null, 0, "DRAM需要。解析：DRAM的存储单元基于电容存储电荷，读取操作会破坏电容中的电荷，因此每次读取前需要对电容进行预充电，补充电荷以保证数据正确；SRAM基于触发器存储数据，读取操作不会破坏数据，无需预充电。"],
    [0, "SRAM和DRAM在读写操作时都需要进行刷新。", null, 0, "SRAM不需要刷新。解析：DRAM的电容会因漏电导致电荷流失，需要周期性刷新以保持数据；SRAM的触发器具有稳定的工作状态，无需刷新即可长期保持数据，这是SRAM与DRAM的核心区别之一。"],
    [0, "所谓边界对齐，就是按照数据类型的大小进行边界对齐。", null, 1, "正确。解析：边界对齐是指将数据存储在内存中时，使其起始地址为数据类型大小的整数倍（如4字节数据存储在地址为4的倍数的单元），这样可以减少CPU访问内存的次数，提高数据存取效率。"],
    [0, "存储字长都是字节的整倍数，主存通常按字节进行编址。", null, 1, "正确。解析：现代计算机的存储字长通常为8位（1字节）、16位（2字节）、32位（4字节）等，均为字节的整倍数；主存普遍采用按字节编址方式，每个字节对应一个唯一的内存地址，便于灵活访问不同长度的数据。"],
    [0, "按照信息保存的时间和条件不同，存储器分为双极型存储器和金属氧化物半导体存储器。", null, 0, "这是按材料分。解析：按信息保存时间和条件，存储器分为易失性存储器（断电数据丢失，如SRAM、DRAM）和非易失性存储器（断电数据保留，如ROM、Flash）；双极型和金属氧化物半导体是按制造材料分类的。"],
    [0, "外存储器用于存放CPU即将或经常要使用的指令和数据。", null, 0, "那是Cache/主存，外存是长期存储。解析：CPU即将或经常使用的指令和数据存放在Cache（高速缓存）和主存（内存）中，便于快速访问；外存储器（如硬盘、U盘）用于长期存储大量不常用的程序和数据，访问速度较慢。"],
    [0, "主存是单一的内存，并不包括BIOS、硬件端口等。", null, 0, "内存空间通常包含这些映射。解析：现代计算机的主存空间并非单一的内存区域，而是通过内存映射技术，将BIOS存储区域、硬件I/O端口等映射到内存地址空间中，CPU可通过访问内存地址的方式访问这些区域。"],
    [0, "半导体ROM、闪存、磁盘、光盘存储器等都属于易失性存储器。", null, 0, "属于非易失性。解析：易失性存储器断电后数据丢失，如SRAM、DRAM；半导体ROM、闪存、磁盘、光盘等断电后数据仍能保持，均属于非易失性存储器，可长期存储数据。"],
    [0, "设计大容量、高速度、低成本的存储系统是计算机发展追求的目标之一。", null, 1, "正确。解析：大容量满足海量数据存储需求，高速度提升数据存取效率，低成本降低硬件开销，这三者是计算机存储系统设计的核心目标，也是推动存储技术发展的关键方向。"],
    [0, "存储字长与数据字长一定相同。", null, 0, "不一定。解析：存储字长是存储器一次存取的二进制位数，数据字长是CPU一次能处理的二进制位数；两者可以不同，例如存储字长为8位，数据字长为32位，CPU需连续读取4个存储单元才能获取一个完整数据。"],
    [0, "为了提高数据访问效率，通常要考虑数据变量、数据结构在主存空间中的边界对齐问题。", null, 1, "正确。解析：数据边界对齐可使CPU通过一次内存访问即可获取完整数据，避免跨存储单元访问带来的多次读写操作，显著提高数据访问效率，因此编程和编译器优化中通常会考虑边界对齐问题。"],
    [0, "浮点运算结果不需要规格化。", null, 0, "需要。解析：浮点运算（加减乘除）后，结果可能不符合规格化表示形式（尾数的绝对值不在[1,2)范围内），因此需要进行规格化操作（左规或右规），将尾数调整到规格化范围，保证数值表示的唯一性和精度。"],
    [0, "运算器执行算术或逻辑运算，只输出运算结果。", null, 0, "还输出标志位。解析：运算器执行运算时，除了输出运算结果外，还会根据结果生成状态标志位（如进位标志、溢出标志、零标志、符号标志等），存储在状态寄存器中，供后续指令判断和使用。"],
    [0, "浮点运算对阶可以是大阶向小阶看齐，也可以是小阶向大阶看齐。", null, 0, "只能小阶向大阶看齐。解析：浮点运算对阶时，必须将阶码较小的数的尾数右移，使阶码与大阶对齐（小阶向大阶看齐）；若大阶向小阶看齐，会导致大阶数的尾数左移，丢失高位有效数字，严重降低精度。"],
    [0, "浮点运算尾数舍入可能引起误差。", null, 1, "正确。解析：浮点运算中，尾数右移（如对阶、右规）时会丢弃低位比特，需要进行舍入操作（如0舍1入、恒置1等），舍入会改变尾数的数值，从而引入一定的误差，影响计算精度。"],
    [0, "浮点数乘法运算，阶码相乘，尾数相加。", null, 0, "阶码相加，尾数相乘。解析：浮点数乘法的运算规则为：阶码=被乘数阶码+乘数阶码，尾数=被乘数尾数×乘数尾数；运算后还需进行规格化和舍入操作，确保结果符合浮点数表示规范。"],
    [0, "浮点数除法运算，阶码相加，尾数相除。", null, 0, "阶码相减，尾数相除。解析：浮点数除法的运算规则为：阶码=被除数阶码-除数阶码，尾数=被除数尾数÷除数尾数；与乘法类似，运算后需进行规格化和舍入操作，保证结果的正确性。"],
    [0, "右规可能引起阶码上溢。", null, 1, "正确。解析：右规是将尾数右移、阶码加1的规格化操作，当阶码本身已达到最大值时，右规导致阶码加1会超出阶码的表示范围，从而引起阶码上溢，此时运算结果超出浮点数的最大可表示值。"],
    [0, "浮点运算加减法运算结果需要规格化，浮点乘除法运算，结果不需要规格化。", null, 0, "都需要。解析：浮点加减、乘除运算的结果都可能不符合规格化形式，因此都需要进行规格化操作；例如乘法可能因尾数相乘结果大于等于2而需要右规，除法可能因尾数相除结果小于1而需要左规。"],
    [0, "左规时可能引起阶码下溢。", null, 1, "正确。解析：左规是将尾数左移、阶码减1的规格化操作，当阶码本身已达到最小值时，左规导致阶码减1会超出阶码的表示范围，从而引起阶码下溢，此时运算结果的绝对值小于浮点数的最小可表示值，通常置为机器零。"],
    [0, "尾数溢出时结果不一定溢出。", null, 1, "正确，可以右规。解析：浮点运算中，尾数溢出（绝对值大于等于2）时，可通过右规操作（尾数右移、阶码加1）将尾数调整到规格化范围，此时只要阶码未溢出，整个浮点数结果就不会溢出；只有阶码溢出时，才表示浮点数结果溢出。"],
    [0, "计算机系统由硬件系统和软件系统两大部分组成。", null, 1, "正确。解析：计算机系统的基本构成包括硬件系统和软件系统，硬件系统是物理基础（如CPU、存储器、外设），软件系统是功能实现（如操作系统、应用程序），两者缺一不可，协同工作完成计算任务。"],
    [0, "操作系统属于系统软件的范畴。", null, 1, "正确。解析：系统软件是管理计算机硬件和软件资源、为应用程序提供运行环境的软件，操作系统是系统软件的核心，负责进程管理、内存管理、设备管理等核心功能，是计算机运行的基础。"],
    [0, "机器语言是面向计算机硬件的语言，不同架构计算机的机器语言可通用。", null, 0, "不通用。解析：机器语言是计算机硬件能直接识别的二进制指令，与计算机的硬件架构（如CPU指令集）密切相关，不同架构的计算机（如x86和ARM）的机器语言指令格式、操作码完全不同，无法通用。"],
    [0, "汇编语言需要通过汇编程序翻译成机器语言才能被计算机执行。", null, 1, "正确。解析：汇编语言是机器语言的符号化表示，用助记符代替二进制指令，计算机硬件无法直接识别，必须通过汇编程序（汇编器）将其翻译成机器语言指令，才能被CPU执行。"],
    [0, "高级语言程序无需翻译就能直接被计算机硬件执行。", null, 0, "需要编译或解释。解析：高级语言（如C、Java）是面向问题的编程语言，与计算机硬件架构无关，无法被硬件直接识别，必须通过编译程序（编译器）翻译成机器语言，或通过解释程序（解释器）逐句解释执行。"],
    [0, "冯诺依曼体系结构的核心是“存储程序”和“程序控制”。", null, 1, "正确。解析：冯·诺依曼体系结构的核心思想是“存储程序”和“程序控制”，即将程序和数据存储在存储器中，计算机自动从存储器中取出指令并依次执行，实现程序的自动运行，这是现代计算机的基础架构思想。"],
    [0, "冯诺依曼体系计算机的指令和数据均以二进制形式表示。", null, 1, "正确。解析：冯·诺依曼体系计算机中，指令和数据都采用二进制形式存储和处理，二进制只有0和1两个状态，易于用电子器件实现（如高低电平），且运算规则简单，适合计算机的硬件实现。"],
    [0, "现代计算机大多遵循冯诺依曼体系结构的基本思想。", null, 1, "正确。解析：尽管现代计算机在性能、架构上有了巨大发展，但核心仍遵循冯·诺依曼体系结构的“存储程序”和“程序控制”基本思想，指令和数据存储在存储器中，CPU按顺序执行指令，这是计算机工作的基本模式。"],
    [0, "运算器的主要功能是进行算术运算和逻辑运算。", null, 1, "正确。解析：运算器是CPU的核心部件之一，其主要功能是执行算术运算（如加、减、乘、除）和逻辑运算（如与、或、非、异或），同时还能进行移位运算，为计算机提供数据处理能力。"],
    [0, "存储器仅用于存放计算机运行过程中需要处理的数据。", null, 0, "还有指令。解析：存储器的核心功能是存放程序（指令）和数据，计算机运行时，CPU从存储器中取出指令执行，同时从存储器中读取数据进行处理，并将处理结果写回存储器，因此存储器不仅存数据，还存指令。"],
    [0, "存储器按所处位置可分为内存储器和外存储器。", null, 1, "正确。解析：按所处位置分类，存储器可分为内存储器（主存、内存）和外存储器（辅存、外存）；内存储器位于计算机主机内部，速度快、容量小；外存储器位于主机外部，速度慢、容量大，用于长期存储。"],
    [0, "计算机的字长是指CPU一次能处理的二进制数据的位数。", null, 1, "正确。解析：计算机的字长（机器字长）是指CPU一次能处理的二进制数据的位数，与CPU寄存器、ALU的位数一致，决定了CPU一次能处理的数据宽度和运算精度，常见的字长有32位、64位等。"],
    [0, "机器语言是计算机硬件唯一能直接识别和执行的语言。", null, 1, "正确。解析：机器语言是用二进制表示的指令集合，与计算机硬件的指令集完全对应，是计算机硬件唯一能直接识别和执行的语言；汇编语言、高级语言都需要翻译为机器语言才能被执行。"],
    [0, "数据库管理系统(DBMS)属于应用软件，用于管理用户的数据。", null, 0, "DBMS通常属于系统软件。解析：数据库管理系统（DBMS）是用于管理数据库的软件，属于系统软件范畴，为应用程序提供数据存储、管理、查询等服务，是操作系统之上的基础软件，而非面向特定应用的应用软件。"],
    [0, "IPC是CPI的倒数，指每个时钟周期CPU能执行的指令条数。", null, 1, "正确。解析：IPC（Instructions Per Cycle）即每时钟周期执行的指令条数，CPI（Cycles Per Instruction）即每条指令执行所需的平均时钟周期数，两者互为倒数关系，即IPC=1/CPI，均是衡量CPU执行效率的核心指标。"],
    [0, "MIPS即每秒百万条指令。", null, 1, "正确。解析：MIPS（Million Instructions Per Second）是衡量CPU运算速度的指标，指每秒能执行的百万条指令数，MIPS值越高，说明CPU的指令执行速度越快，运算性能越强。"],
    [0, "补码的负数比正数多一个。", null, 1, "正确。解析：以n位补码为例，正数的表示范围是0~2^(n-1)-1，共2^(n-1)个；负数的表示范围是-2^(n-1)~-1，共2^(n-1)个，加上唯一的0，负数比正数多一个（如8位补码中，负数有128个，正数有127个）。"],
    [0, "补码的减法可以变换成加法，如：[X-Y]补=[X]补+[-Y]补。", null, 1, "正确。解析：补码的核心优势是将减法运算转换为加法运算，根据补码的运算规则，[X-Y]补=[X]补+[-Y]补，而[-Y]补可由[Y]补做求补操作得到，即对[Y]补按位取反后末位加1，因此该公式成立，计算机仅需加法器即可实现减法运算，大幅简化了硬件电路的设计。"],
    [0, "根据反码的编码规则，当真值为负数时，X反+|X|的值是一个全1的编码。", null, 1, "正确。解析：负数的反码是对其原码的数值位按位取反，符号位不变；设X为负数，|X|为其绝对值的二进制表示，则[X]反+|X|的结果为符号位1，数值位全1（即全1编码），符合反码的编码规则。"],
    [0, "补码又称模2的补码。", null, 1, "正确。解析：补码的本质是模运算的补数，对于n位二进制数，补码的模为2^n，通常简称为模2的补码；补码通过模运算将负数表示为正数，从而实现减法转加法，这是补码的数学基础。"],
    [0, "变形补码也称双符号补码，采用两个二进制位来表示数据的符号。", null, 1, "正确。解析：变形补码又称双符号位补码，采用两位二进制位表示符号位（00表示正数，11表示负数），主要用于定点数运算的溢出检测，当两位符号位不同时（01或10），表示运算结果产生了溢出。"],
    [0, "计算机中的位运算可以直接对二进制数的某一位进行置1、置0或翻转操作。", null, 1, "正确。解析：位运算直接操作二进制数的每一位，包括与、或、非、异或、移位等运算，通过这些运算可以实现对特定位的置1（或运算）、置0（与运算）、翻转（异或运算），广泛用于底层编程和硬件控制。"],
    [0, "补码加减法运算中，[X+Y]补=[X]补+[Y]补，该公式仅适用于两个正数相加的情况。", null, 0, "适用于所有情况。解析：补码的加减法运算公式[X+Y]补=[X]补+[Y]补具有通用性，无论X和Y是正数、负数还是零，该公式均成立，这是补码相比原码、反码的核心优势，统一了加减法运算规则。"],
    [0, "逻辑运算的结果只有“真”(1)和“假”(0)两种状态，与参与运算的数值大小无关。", null, 1, "正确。解析：逻辑运算基于二进制的逻辑值（1为真，0为假）进行，运算结果也只有真和假两种状态，仅关注每一位的逻辑关系，与参与运算的数值大小、正负无关，这是逻辑运算与算术运算的核心区别。"],
    [0, "定点加减法运算中，只要运算结果的绝对值超出了机器数的表示范围，就会产生溢出。", null, 1, "正确。解析：溢出是指运算结果超出了机器数的表示范围，对于定点加减法，当运算结果的绝对值大于机器数能表示的最大值时，就会产生溢出；溢出仅发生在同号数相加或异号数相减的情况下。"],
    [0, "双符号位法中，“01”表示运算结果为正且无溢出，“10”表示运算结果为负且无溢出。", null, 0, "01是正溢，10是负溢。解析：双符号位法中，两位符号位相同（00或11）表示无溢出，00为正，11为负；两位符号位不同表示溢出，01表示正溢出（正数相加结果超出范围），10表示负溢出（负数相加结果超出范围）。"],
    [0, "符号位进位法检测溢出时，若最高数值位有进位而符号位无进位，则表示发生了正溢出。", null, 1, "正确。解析：符号位进位法通过比较最高数值位的进位（Cn-1）和符号位的进位（Cn）来判断溢出：当Cn-1≠Cn时表示溢出，其中Cn-1=1且Cn=0时，为正溢出；Cn-1=0且Cn=1时，为负溢出。"],
    [0, "算术移位中，对于正数，左移一位相当于乘以2，右移一位相当于除以2。", null, 1, "正确。解析：正数的原码、反码、补码相同，算术移位时符号位保持不变，数值位移位；左移一位时，所有位左移，低位补0，相当于数值乘以2；右移一位时，所有位右移，高位补0，相当于数值除以2（整除）。"],
    [0, "补码减法运算转换为加法运算时，-Y补的求法是对Y补按位取反后直接得到。", null, 0, "取反加1。解析：补码减法中，[-Y]补的计算方法是对[Y]补按位取反（包括符号位）后加1，即“求补”操作；仅按位取反得到的是[Y]的反码，不是[-Y]的补码，直接使用会导致运算错误。"],
    [0, "两个补码表示的数相加，即使最高位产生进位，也不一定发生溢出。", null, 1, "正确（如负加负）。解析：补码相加时，最高位（符号位）产生进位并不一定表示溢出，例如两个负数相加，符号位均为1，相加后符号位产生进位，但结果仍为负数（符号位为1），属于正常运算，未溢出；溢出仅发生在符号位进位与最高数值位进位不同的情况。"],
    [0, "将n个一位全加器串联，低位进位输出送高位进位输入，即可得到n位串行加法器。", null, 1, "正确。解析：一位全加器可实现两个一位数和低位进位的加法，将n个一位全加器串联，低位全加器的进位输出连接到高位全加器的进位输入，即可构成n位串行加法器，实现n位二进制数的加法运算，进位逐位传递。"],
    [0, "无符号数的加法运算，溢出检测信号是最高位进位Cn。", null, 1, "正确。解析：无符号数的表示范围是0~2^n-1，加法运算中，若最高位（第n位）产生进位（Cn=1），表示运算结果超出了无符号数的表示范围，发生了溢出；因此最高位进位Cn可作为无符号数加法的溢出检测信号。"],
    [0, "无符号数的减法运算，溢出检测信号是最高位进位Cn。", null, 0, "通常是借位。解析：无符号数减法运算中，溢出是指被减数小于减数，此时需要向高位借位，因此溢出检测信号是借位信号（借位为1表示溢出）；最高位进位Cn是加法的溢出检测信号，减法中无实际意义。"],
    [0, "多位可控加减法电路可通过对减数Y各位进行异或运算，且最低位进位输入1来实现减法。", null, 1, "正确。解析：多位可控加减法电路基于补码减法原理，将减法转换为加法（X-Y=X+(-Y)）；通过对减数Y的每一位与控制信号（减法时为1）进行异或运算，实现按位取反，同时最低位进位输入1，等效于对Y求补，从而实现减法运算。"],
    [0, "根据Booth算法，补码一位乘的乘积符号位是通过乘数符号位和被乘数符号位的异或运算来实现的。", null, 0, "Booth算法自动处理符号位。解析：Booth算法（补码一位乘）无需单独处理符号位，通过对乘数和被乘数的补码直接运算，即可自动得到乘积的补码，符号位参与运算过程，无需额外的异或操作来确定乘积符号。"],
    [0, "原码一位乘的右移操作是部分积寄存器和乘数寄存器同步右移的。", null, 1, "正确。解析：原码一位乘的运算过程中，每次加法运算后，需要将部分积寄存器和乘数寄存器同步向右逻辑移位一位，将乘数的下一位移到最低位，作为下一次加法的判断依据，同时部分积右移为新的加法腾出高位空间。"],
    [0, "根据Booth算法，n位补码一位乘需要进行n次加法和n次右移操作。", null, 0, "有时不需要加法。解析：Booth算法中，根据乘数的相邻两位（Yn和Yn+1）的差值决定加法操作：当Yn-Yn+1=1时加[X]补，当Yn-Yn+1=-1时加[-X]补，当Yn-Yn+1=0时不加任何数，直接右移；因此n位补码一位乘最多进行n次加法，最少可能不进行加法，并非一定进行n次加法。"],
    [0, "根据Booth算法，补码一位乘是由乘数的Yn+1-Yn的大小来决定是否加上被乘数X、0或-X补后再右移的。", null, 1, "正确。解析：Booth算法的核心是根据乘数的相邻两位Yn（当前位）和Yn+1（低位，初始为0）的差值（Yn+1-Yn）决定操作：差值为1时加[X]补，差值为-1时加[-X]补，差值为0时不加，之后将部分积和乘数同步右移一位，重复n次得到乘积。"],
    [0, "n×n位阵列乘法器需要n×n个全加器才能实现相加数完全相加，求出相应的积。", null, 0, "不一定。解析：n×n位阵列乘法器的全加器数量并非固定为n×n个，而是根据阵列结构（如华莱士树阵列、波兹阵列）不同而变化；例如4×4位阵列乘法器通常需要8个全加器和4个半加器，而非16个全加器。"],
    [0, "在利用原码阵列乘法器构建补码阵列乘法器时，符号位通常不需要单独处理。", null, 0, "原码需要单独处理符号。解析：原码阵列乘法器仅处理数值位的乘法，符号位需要单独通过异或运算确定；因此用原码阵列乘法器构建补码阵列乘法器时，需要先将补码转换为原码，单独处理符号位，数值位相乘后再将结果转换为补码，符号位不能省略。"],
    [0, "-1的8位补码是10000001。", null, 0, "是11111111。解析：-1的8位原码是10000001，补码计算规则为原码的符号位不变，数值位取反加1；数值位0000001取反为1111110，加1后为1111111，因此-1的8位补码是11111111。"],
    [0, "正整数的原码、反码、补码是不相同的。", null, 0, "相同。解析：对于正整数，其原码、反码、补码的表示形式完全相同，符号位为0，数值位为该正数的二进制表示；只有负数的原码、反码、补码才不同，反码是原码数值位取反，补码是反码加1。"],
    [0, "从汇编语言的角度去看数据表示，这些操作数到底表示定点数还是浮点数，是有符号数还是无符号数完全取决于指令操作符。", null, 1, "正确。解析：汇编语言中，数据本身没有类型标识，操作数是定点数还是浮点数、有符号数还是无符号数，完全由所使用的指令操作符决定；例如ADD指令用于定点数加法，ADDP用于浮点数加法，不同指令对应不同的数据类型处理方式。"],
    [0, "一个16进制的数0xFFFF，表示有符号数的补码时，其真值对应是-1，对应无符号数时，其对应的真值是+1。", null, 0, "无符号是65535。解析：16位补码0xFFFF的真值是-1（对其求补得到0x0001，即1，加负号）；而作为无符号数时，0xFFFF是16位全1，对应十进制数2^16-1=65535，而非+1。"],
    [0, "将double转化为float型，一定会发生溢出，因为double型数据的尾数和阶码都比float型宽。", null, 0, "不一定溢出，可能精度丢失。解析：double（双精度）的尾数和阶码确实比float（单精度）宽，表示范围更大、精度更高；将double转为float时，若double的数值在float的表示范围内，不会溢出，但会丢失部分精度；只有当double的数值超出float的表示范围时，才会发生溢出。"],
    [0, "汉字编码双字节的最高位都为1，实际上采用14位二进制编码来表示汉字，但一个汉字输入码在计算机中占2个字节。", null, 1, "正确。解析：汉字机内码采用双字节表示，每个字节的最高位均为1，用于与ASCII码（最高位为0）区分；双字节共16位，其中2位用于标识汉字（最高位1），实际14位用于编码汉字，可表示16384个汉字；一个汉字输入码在计算机中存储为机内码，占2个字节。"],
    [0, "要提高数据编码的检错和纠错能力，就必须增大码距。", null, 1, "正确。解析：码距是指任意两个合法编码之间的最小二进制位数差异，码距越大，编码的检错和纠错能力越强；例如码距为2时可检1位错，码距为3时可检2位错并纠1位错，因此提高检错纠错能力的核心是增大码距。"],
    [0, "简单的奇偶校验只有一个校验组、一个校验位，能提供1位信息的检错能力，但无纠错能力。", null, 1, "正确。解析：简单奇偶校验通过添加一个校验位，使整个编码中1的个数为奇数（奇校验）或偶数（偶校验），只能检测出编码中的1位错误，但无法确定错误位置，因此不具备纠错能力；若发生2位错误，奇偶校验无法检测。"],
    [0, "海明校验码本质上是一个多重奇偶校验，它是一种既能检错也能纠错的校验码。", null, 1, "正确。解析：海明校验码通过将数据位分组，对每组进行奇偶校验，实现多重奇偶校验；其码距大于2，不仅能检测出1位或多位错误，还能确定1位错误的位置并自动纠正，是一种常用的检错纠错校验码。"],
    [0, "扩展海明校验码只能发现1位出错。", null, 0, "能发现2位。解析：扩展海明校验码在传统海明码的基础上增加了一个全局校验位，码距进一步增大，不仅能检测并纠正1位错误，还能检测出2位错误；传统海明码只能检测1位错误并纠正，无法检测2位错误。"],
    [0, "如果任意一组合法的二进制编码，其最下码距是2，那么该编码规则不具备检错能力。", null, 0, "具备检1位错能力。解析：码距为2时，任意两个合法编码至少有2位不同，当编码发生1位错误时，会变成非法编码，因此可以检测出1位错误；只有码距为1时，编码不具备检错能力，1位错误会变成另一个合法编码。"],
    [1, "存储器用来存放（ ）。", ["数据","程序","数据和程序","正在被执行的数据和程序"], 2, "答案：C (解析：存储器的核心功能是存放计算机运行所需的程序（指令）和数据，CPU从存储器中取出指令执行，同时读取数据进行处理，并将结果写回存储器；选项A、B不完整，选项D仅包含正在使用的部分，而非全部存储内容。)"],
    [1, "下面的描述中，正确的是（ ）。", ["控制器能够理解、解释并执行所有的指令及存储结果","一台计算机包括输入、输出、控制、存储及运算逻辑五个单元","所有的数据运算都在CPU的控制器中完成","以上答案都是正确的"], 1, "答案：B (解析：选项A错误，控制器负责解释指令并发送控制信号，执行指令和存储结果由运算器、存储器完成；选项B正确，计算机由输入、输出、控制、存储、运算逻辑五大基本单元组成，符合冯·诺依曼体系结构；选项C错误，数据运算由运算器完成，控制器不负责运算。)"],
    [1, "存储字长是指（ ）。", ["存放在一个存储单元中的二进制代码组合","存放在一个存储单元中的二进制代码位数","存储单元的个数","机器指令的位数"], 1, "答案：B (解析：存储字长是指存储器一个存储单元中能存储的二进制代码的位数，通常为8位、16位、32位等；选项A是存储内容，选项C是存储容量的指标，选项D是指令字长，均与存储字长不同。)"],
    [1, "我们通常所说的个人台式商用机属于（ ）。", ["巨型机","中型机","小型机","微型机"], 3, "答案：D (解析：计算机按规模和性能分为巨型机、大型机、中型机、小型机、微型机；个人台式商用机属于微型机，特点是体积小、价格低、适合个人和小型办公使用，是目前应用最广泛的计算机类型。)"],
    [1, "对计算机软、硬件资源进行管理，是（ ）的功能。", ["操作系统","数据库管理系统","语言处理程序","用户程序"], 0, "答案：A (解析：操作系统是系统软件的核心，主要功能包括进程管理、内存管理、设备管理、文件管理等，负责统一管理计算机的软硬件资源，为用户和应用程序提供便捷的使用接口；其他选项均无此核心功能。)"],
    [1, "微型计算机的发展以（ ）技术为标志。", ["操作系统","微处理器","外存储器","软件"], 1, "答案：B (解析：微型计算机的核心是微处理器（CPU），微处理器的技术进步（如制程、核心数、主频）直接决定了微型计算机的性能，因此微型计算机的发展以微处理器技术为标志；操作系统、外存储器、软件是配套发展，并非核心标志。)"],
    [1, "存储单元是指（ ）。", ["存放一个二进制信息位的存储元","存放一个机器字的所有存储元集合","存放一个字节的所有存储元集合","存放两个字节的所有存储元集合"], 1, "答案：B (解析：存储单元是存储器中用于存储一组二进制代码（通常为一个机器字）的基本单位，由多个存储元（存储一位二进制信息）组成；选项A是存储元，选项C、D是特定字节数的存储单元，并非通用定义。)"],
    [1, "完整的计算机应包括（ ）。", ["运算器、存储器、控制器","外部设备和主机","主机和实用程序","配套的硬件设备和软件系统"], 3, "答案：D (解析：完整的计算机系统由硬件系统和软件系统两部分组成，硬件系统包括主机和外部设备，软件系统包括系统软件和应用软件；选项A仅为CPU和主存，选项B仅为硬件，选项C仅为部分硬件和软件，均不完整。)"],
    [1, "运算器虽有许多部件组成，但核心部件是（ ）。", ["数据总线","算术逻辑运算单元","多路开关","累加寄存器"], 1, "答案：B (解析：运算器的核心部件是算术逻辑运算单元（ALU），负责执行所有算术运算（加、减、乘、除）和逻辑运算（与、或、非、异或）；数据总线是传输通道，多路开关用于选择数据来源，累加寄存器用于暂存运算结果，均为辅助部件。)"],
    [1, "运算器的主要功能是进行（ ）。", ["逻辑运算","算术运算","逻辑运算与算术运算","初等函数的运算"], 2, "答案：C (解析：运算器是计算机的数据处理核心，主要功能是执行算术运算（处理数值计算）和逻辑运算（处理逻辑判断），同时还能进行移位运算；初等函数运算通常通过算术运算和逻辑运算组合实现，并非运算器的独立核心功能。)"],
    [1, "从器件角度看，计算机经历了四代变化。但从系统结构看，至今绝大多数计算机仍属于（ ）型计算机。", ["并行","冯·诺依曼","智能","实时处理"], 1, "答案：B (解析：尽管计算机器件从电子管发展到超大规模集成电路，但系统结构仍遵循冯·诺依曼体系结构的核心思想——“存储程序”和“程序控制”，指令和数据存储在存储器中，CPU按顺序执行指令；并行、智能、实时处理是特定应用场景的架构，并非主流。)"],
    [1, "下列（ ）属于应用软件。", ["操作系统","编译系统","连接程序","文本处理"], 3, "答案：D (解析：应用软件是为满足特定应用需求而开发的软件，文本处理软件（如Word、WPS）用于文字编辑，属于应用软件；操作系统、编译系统、连接程序均属于系统软件，为应用程序提供运行环境和工具支持。)"],
    [1, "目前的计算机，从原理上讲（ ）。", ["指令以二进制形式存放，数据以十进制形式存放","指令以十进制形式存放，数据以二进制形式存放","指令和数据都以二进制形式存放","指令和数据都以十进制形式存放"], 2, "答案：C (解析：现代计算机基于二进制原理工作，指令和数据均以二进制形式存储和处理；二进制只有0和1两个状态，易于用电子器件实现，运算规则简单，是计算机硬件的基础表示形式，十进制仅用于用户交互时的显示。)"],
    [1, "至今为止，计算机中的所有信息仍以二进制方式表示的理由是（ ）。", ["节约元件","运算速度快","物理器件性能所至","信息处理方便"], 2, "答案：C (物理器件性能及方便性)。解析：计算机采用二进制的根本原因是物理器件的特性——电子器件（如晶体管）容易实现高低电平两种状态，分别对应0和1；同时二进制运算规则简单，易于硬件实现，信息处理方便；节约元件、运算速度快是二进制带来的优势，而非根本原因。)"],
    [1, "描述汇编语言特性的概念中，有错误的句子是（ ）。", ["对程序员的训练要求来说，需要硬件知识","汇编语言对机器的依赖性高","用汇编语言编制程序的难度比高级语言小","汇编语言编写的程序执行速度比高级语言快"], 2, "答案：C (难度大)。解析：汇编语言是机器语言的符号化表示，与计算机硬件架构密切相关，需要程序员具备硬件知识（如指令集、寄存器结构），编程难度比高级语言大；其优势是执行速度快（与机器语言接近），但开发效率低，因此选项C错误。)"],
    [1, "中央处理器(CPU)是指（ ）。", ["运算器","控制器","运算器、控制器和cache","运算器、控制器和主存储器"], 2, "答案：C (解析：CPU由运算器、控制器和高速缓存（Cache）三部分组成，运算器负责运算，控制器负责控制指令执行，Cache用于缓存常用数据和指令，提高CPU访问速度；主存储器位于CPU外部，不属于CPU的组成部分。)"],
    [1, "计算机与日常使用的袖珍计算器的本质区别在于（ ）。", ["运算速度的高低","存储器容量的大小","规模的大小","自动化程度的高低"], 3, "答案：D (解析：计算机与袖珍计算器的本质区别在于自动化程度：计算机能通过存储程序自动执行一系列指令，完成复杂任务；而袖珍计算器需要用户手动输入每一步操作，无法自动执行程序；运算速度、容量、规模是性能差异，并非本质区别。)"],
    [1, "计算机问世至今，不管怎样更新，依然保持“存储程序”的概念，最早提出这种概念的是（ ）。", ["帕斯卡","巴贝奇","冯·诺依曼","贝尔"], 2, "答案：C (解析：“存储程序”概念由冯·诺依曼在1945年提出，是冯·诺依曼体系结构的核心思想，奠定了现代计算机的基础；帕斯卡发明了机械计算器，巴贝奇设计了差分机和分析机，贝尔发明了电话，均未提出存储程序概念。)"],
    [1, "有些计算机将一部分软件固化存于只读存储器中，称之为（ ）。", ["硬件","软件","固件","辅助存储器"], 2, "答案：C (解析：固件是将软件程序固化在只读存储器（ROM、Flash）中的特殊形态，兼具硬件的物理特性和软件的功能特性，用于实现计算机的底层功能（如BIOS）；既不属于纯硬件，也不属于普通软件，辅助存储器是外存，与固件无关。)"],
    [1, "下列选项中，描述浮点数操作速度指标的是（ ）。", ["MIPS","CPI","IPC","MFLOPS"], 3, "答案：D (解析：MFLOPS（Million Floating-point Operations Per Second）是每秒百万次浮点运算次数，专门用于衡量计算机的浮点数操作速度；MIPS是每秒百万条指令数，CPI是每条指令的时钟周期数，IPC是每时钟周期的指令数，均为通用CPU性能指标，不针对浮点运算。)"],
    [1, "设计算机的字长为8位，则-9在计算机的补码表示(16进制表示)为（ ）。", ["F9H","F7H","89H","87H"], 1, "答案：B (-9 = -00001001 -> 11110111 = F7)。解析：8位字长下，-9的原码为10001001，补码计算为原码符号位不变，数值位取反加1；数值位0001001取反为1110110，加1后为1110111，因此补码为11110111，转换为十六进制为F7H。)"],
    [1, "补码（11111）2所表示的数是（ ）。", ["-0","0","-1","-15"], 2, "答案：C (解析：5位补码11111的真值计算：对补码求补（按位取反加1）得到00001，即十进制1，因此补码11111表示的真值为-1；注意5位补码中，10000表示-16，11111表示-1，符合补码负数比正数多一个的规则。)"],
    [1, "下面对IPC描述正确的是（ ）。", ["每个时钟周期CPU能执行的指令条数","每秒CPU能执行的指令条数","每个时钟周期浮点数运算的次数","每秒执行浮点数运算的次数"], 0, "答案：A (解析：IPC（Instructions Per Cycle）即每时钟周期CPU能执行的指令条数，是衡量CPU并行执行能力的指标；选项B是MIPS，选项C、D是浮点运算相关指标，均与IPC的定义不符。)"],
    [1, "若f为计算机的主频，则MIPS和CPI的关系是（ ）。", ["MIPS=f/CPI","MIPS=f*CPI","MIPS=1/CPI*f","MIPS=CPI/f"], 0, "答案：A (解析：MIPS（每秒百万条指令）的计算公式为：MIPS=主频（f，单位为MHz）/CPI（每条指令的时钟周期数）；因为主频表示每秒的时钟周期数，除以每条指令的周期数，得到每秒执行的指令数（百万条），因此MIPS=f/CPI。)"],
    [1, "设某计算机的字长为8位，则 x=-10101(2) 的补码是（ ）。", ["11101011","10010101","00110101","10001011"], 0, "答案：A (原10010101 -> 反11101010 -> 补11101011)。解析：x=-10101(2)是5位二进制负数，扩展为8位原码为10010101（符号位1，数值位0010101）；反码为符号位不变，数值位取反，即11101010；补码为反码加1，即11101010+1=11101011。)"],
    [1, "下面说法错误的是（ ）。", ["补码有两个0","原码有两个0","反码有两个0","移码有一个0"], 0, "答案：A (补码只有一个0)。解析：原码和反码中，零有两种表示形式（正零和负零），如8位原码中00000000表示+0，10000000表示-0；而补码中零的表示唯一，仅为00000000，不存在负零，因此选项A错误。)"],
    [1, "下列属于计算机中逻辑运算的是（ ）。", ["算术移位","异或运算","定点加法","浮点乘法"], 1, "答案：B (解析：逻辑运算包括与、或、非、异或、同或等，仅关注二进制位的逻辑关系，与数值大小无关；异或运算属于逻辑运算；算术移位、定点加法、浮点乘法均属于算术运算，涉及数值的计算和变换。)"],
    [1, "在C语言的运算类型中，以下哪种运算直接操作二进制位，不考虑数值的正负含义（ ）。", ["逻辑运算","算术运算","位运算","移位运算"], 2, "答案：C (解析：C语言中的位运算（如&、|、^、~、<<、>>）直接操作二进制数的每一位，仅处理位的状态，不考虑数值的正负含义；逻辑运算针对整个数值的真假，算术运算关注数值大小，移位运算中算术移位会考虑符号位，均不符合题意。)"],
    [1, "补码加法运算的核心特点是（ ）。", ["需先判断两数符号","无论两数正负，统一按加法规则计算","结果的符号位需单独计算","运算过程中会自动丢弃最高位的进位"], 1, "答案：B (解析：补码加法的核心优势是无需判断两数符号，无论X和Y是正数、负数还是零，均遵循[X+Y]补=[X]补+[Y]补的统一规则计算，符号位参与运算，无需单独处理；最高位进位自动丢弃，这是运算结果的处理方式，而非核心特点。)"],
    [1, "若X和Y均为补码表示的整数，关于[X-Y]补的计算，正确的是（ ）。", ["[X-Y]补=[X]补-[Y]补","[X-Y]补=[X]补+[Y]补","[X-Y]补=[X]补+[-Y]补","[X-Y]补=[-X]补+[Y]补"], 2, "答案：C。解析：补码的核心优势是将减法运算转换为加法运算，根据补码的运算规则，减法可转化为被减数加上减数的相反数的补码，即[X-Y]补=[X+(-Y)]补=[X]补+[-Y]补。其中[-Y]补需对[Y]补执行按位取反后末位加1的求补操作，并非直接对补码做减法或简单组合，因此只有选项C符合规则。"],
    [1, "定点加减法运算中，溢出产生的根本原因是（ ）。", ["运算过程中最高位产生了进位","运算结果的数值超出了计算机能表示的范围","两数符号位不同","运算时使用了不同的编码方式"], 1, "答案：B。解析：溢出的本质是运算结果超出了机器数的表示范围，导致无法正确存储和表示。选项A错误，最高位产生进位不一定溢出（如两个负数相加）；选项C错误，两数符号位不同相加不会溢出；选项D错误，定点加减法通常使用同一种编码（如补码），与编码方式无关。"],
    [1, "采用双符号位法检测溢出时，若运算数的双符号位分别为“00”和“11”，运算后结果的双符号位为“10”，则表示（ ）。", ["无溢出，正","无溢出，负","负溢出","正溢出"], 2, "答案：C。解析：双符号位法中，两位符号位相同（00或11）表示无溢出，00为正，11为负；两位符号位不同表示溢出，其中“01”表示正溢出（正数相加超出范围），“10”表示负溢出（负数相加超出范围）。本题中结果双符号位为“10”，属于负溢出。"],
    [1, "下列关于符号位进位法检测溢出的描述，正确的是（ ）。", ["仅需判断符号位是否产生进位","仅需判断最高数值位是否产生进位","需比较最高数值位的进位与符号位的进位，两者不同则溢出","需比较最高数值位的进位与符号位的进位，两者相同则溢出"], 2, "答案：C。解析：符号位进位法通过比较最高数值位的进位（Cn-1）和符号位的进位（Cn）判断溢出：当Cn-1≠Cn时表示溢出，其中Cn-1=1且Cn=0为正溢出，Cn-1=0且Cn=1为负溢出；当Cn-1=Cn时表示无溢出。仅判断单一进位无法确定溢出，因此选项C正确。"],
    [1, "在计算机的移位运算中，算术移位与逻辑移位的主要区别是（ ）。", ["算术仅对正数","算术移位时符号位保持不变","算术移位位数固定","算术移位用于数值"], 1, "答案：B。解析：算术移位和逻辑移位的核心区别在于符号位的处理：算术移位针对有符号数，移位时符号位保持不变，数值位按规则移动；逻辑移位针对无符号数，所有位（包括最高位）均参与移位，高位补0。选项A错误，算术移位可处理负数；选项C、D为次要特性，并非主要区别。"],
    [1, "若两个补码表示的正数相加，结果的符号位为1，这说明（ ）。", ["运算过程中产生了进位","发生了正溢出","结果为负数","符号位计算错误"], 1, "答案：B。解析：两个正数的补码符号位均为0，相加后符号位应为0（结果为正）。若结果符号位为1，表示运算结果超出了正数的表示范围，发生了正溢出，此时符号位的1并非表示负数，而是溢出标志。选项A错误，进位不一定导致溢出；选项C、D不符合补码运算规则。"],
    [1, "以下哪种情况一定不会产生溢出（ ）。", ["两个正数相加","两个负数相加","正数减去负数","正数减去正数，结果为正"], 3, "答案：D (一正一负相加(即正减正)不会溢出)。解析：溢出仅发生在同号数相加或异号数相减且结果超出范围的情况。选项D中正数减正数等价于正数加负数（异号数相加），异号数相加的结果绝对值一定小于较大数的绝对值，不会超出表示范围，因此一定不会溢出；选项A、B可能溢出，选项C等价于正数加正数，可能溢出。"],
    [1, "一个（ ）即可求出一位半加器的和，使算术运算变成逻辑电路。", ["异或门","与门","或门","非门"], 0, "答案：A。解析：半加器用于实现两个一位二进制数的加法，不考虑低位进位。半加器的和的逻辑表达式为S=A⊕B（异或运算），进位的逻辑表达式为C=A·B（与运算）。因此，异或门可直接输出半加器的和，将算术加法转换为逻辑运算。"],
    [1, "一个（ ）即可求出一位半加器的进位输出，使算术运算变成逻辑电路。", ["异或门","与门","或门","非门"], 1, "答案：B。解析：半加器的进位输出逻辑为：当两个输入位A和B均为1时，产生进位1，否则为0，符合与运算的逻辑特性（C=A·B）。因此，与门可直接输出半加器的进位，实现算术进位的逻辑化表示。"],
    [1, "有关n位二进制的原码一位乘，下列说法不正确的是（ ）。", ["原码一位乘可由循环累加与逻辑右移来实现","若 Yn 是乘数的最低位，X是被乘数，则循环累加的值为 Yn|X|","两个n位数参加乘法运算要进行n次加法和n次右移操作","循环的加法运算中间可能产生局部溢出，溢出数据应舍去"], 3, "答案：D。解析：原码一位乘的运算过程中，部分积累加时可能产生局部进位（高位溢出），但这些进位是乘法运算的中间结果，不能舍去，需保留在部分积的高位中，最终参与结果的形成。选项A、B、C均符合原码一位乘的运算规则，只有选项D错误。"],
    [1, "设 A=0.1011 ， B=-0.0101 ，则 A+B补 为（ ）。", ["0.0110","0.0111","1.0110","1.0111"], 0, "答案：A。解析：先将A、B转换为补码：A是正数，[A]补=0.1011；B是负数，[B]补=1.1011。补码相加：0.1011+1.1011=10.0110，丢弃最高位进位1，结果为0.0110，符号位为0，表示正数，符合A+B=0.1011-0.0101=0.0110的计算结果。"],
    [1, "设 A=-9 ， B=-5 ，则 A+B补 为（ ）。", ["1,0011","1,0010","0,0010","0,0011"], 1, "答案：B。解析：8位补码表示下，[A]补=11110111，[B]补=11111011。补码相加：11110111+11111011=11110010（最高位进位丢弃），结果符号位为1，表示负数，对应真值为-14，符合-9+(-5)=-14的计算结果。选项B的逗号为符号位与数值位分隔符，1,0010即11110010的简化表示。"],
    [1, "已知 x=-0.1110 ， y=0.1101 ，则 x×y原 为（ ）。", ["0.10110111","0.10110110","1.10110110","1.10110111"], 2, "答案：C。解析：原码乘法中，符号位单独处理，数值位取绝对值相乘。x的符号位为1，y的符号位为0，乘积符号位为1⊕0=1（负）；数值位|x|=0.1110，|y|=0.1101，相乘得0.10110110。因此[x×y]原=1.10110110，对应选项C。"],
    [1, "已知 x=+0.0011 ， y=-0.1011 ，求 x×y补 为（ ）。", ["0.11011110","0.11011111","1.11011110","1.11011111"], 3, "答案：D。解析：补码乘法可直接用补码运算，无需单独处理符号位。[x]补=0.0011，[y]补=1.0101，按补码乘法规则运算得[x×y]补=1.11011111，对应真值为-0.00100001，符合0.0011×(-0.1011)=-0.00100001的计算结果。"],
    [1, "在运算器中不包含（ ）。", ["状态寄存器","数据总线","ALU","地址寄存器"], 3, "答案：D。解析：运算器的核心组成包括算术逻辑运算单元（ALU）、累加寄存器、状态寄存器（标志寄存器）、数据总线等，用于完成数据运算和状态记录。地址寄存器属于控制器的组成部分，用于存储内存地址，不属于运算器，因此选项D正确。"],
    [1, "以下有关运算器的描述，（ ）是正确的。", ["只做加法运算","只做算术运算","算术运算与逻辑运算","只做逻辑运算"], 2, "答案：C。解析：运算器是计算机的数据处理核心，主要功能包括算术运算（加、减、乘、除、移位等数值计算）和逻辑运算（与、或、非、异或等逻辑判断），能满足计算机的各类数据处理需求。选项A、B、D均片面，只有选项C完整描述了运算器的功能。"],
    [1, "下列有关浮点数加减运算的叙述中，正确的是（ ）。", ["对阶操作不会引起阶码上溢或下溢","右规和尾数舍入都可能引起阶码上溢","左规时可能引起阶码下溢","I、II、III、IV"], 3, "答案：D。解析：①对阶时，小阶向大阶看齐，尾数右移，阶码增大，不会超出范围，因此不会引起阶码上溢或下溢；②右规是尾数右移、阶码加1，若阶码已达最大值，加1会导致上溢；尾数舍入可能使尾数再次溢出，需再次右规，也可能引发阶码上溢；③左规是尾数左移、阶码减1，若阶码已达最小值，减1会导致下溢。因此I、II、III均正确，选项D正确。"],
    [1, "在浮点数加减法的对阶过程中（ ）。", ["将被加(减)数的阶码向加(减)数的阶码看齐","将加(减)数的阶码向被加(减)数的阶码看齐","将较大的阶码向较小的阶码看齐","将较小的阶码向较大的阶码看齐"], 3, "答案：D。解析：浮点数对阶的原则是“小阶向大阶看齐”，即阶码较小的数的尾数右移，每右移一位，阶码加1，直到两个数的阶码相等。这样做可以避免尾数左移导致的有效数字丢失，保证计算精度；若大阶向小阶看齐，会丢失高位有效数字，精度严重下降。"],
    [1, "ALU属于（ ）。", ["时序电路","组合逻辑电路","控制器","寄存器"], 1, "答案：B。解析：组合逻辑电路的输出仅取决于当前输入，与电路的历史状态无关。ALU（算术逻辑运算单元）的运算结果仅由当前输入的操作数和运算控制信号决定，无记忆功能，属于组合逻辑电路。时序电路有记忆功能（如寄存器），控制器和寄存器均不属于组合逻辑电路。"],
    [1, "在浮点数的运算中，当运算结果的绝对值太大，以至于超过所能表示的数据时，称为浮点数的（ ）。", ["正上溢","上溢","正溢","正下溢"], 1, "答案：B。解析：浮点数的溢出分为上溢和下溢：上溢是指运算结果的绝对值大于浮点数能表示的最大值，包括正上溢和负上溢；下溢是指运算结果的绝对值小于浮点数能表示的最小值。选项A、C仅指正数溢出，不全面；选项D为下溢，不符合题意，因此选项B正确。"],
    [1, "在浮点数运算中，当数的绝对值太小，以至于小于所能表示的数据时，称为浮点数的（ ）。", ["正下溢","下溢","负溢","负上溢"], 1, "答案：B。解析：浮点数下溢是指运算结果的绝对值小于浮点数的最小可表示值，包括正下溢和负下溢，此时结果通常置为机器零。选项A仅指正数下溢，不全面；选项C、D为溢出的错误分类，不符合浮点数溢出的定义，因此选项B正确。"],
    [1, "以下哪项（ ）是顺序存储器。", ["SRAM","DAM","SAM","RAM"], 2, "答案：C。解析：顺序存储器（SAM）的特点是数据按顺序存取，必须按存储顺序访问，不能随机存取，如磁带存储器。SRAM（静态RAM）、RAM（随机存取存储器）均为随机存取存储器，可任意访问存储单元；DAM不是标准存储器类型，因此选项C正确。"],
    [1, "高速缓冲存储器一般采用静态（ ）构成。", ["ROM","RAM","SRAM","DRAM"], 2, "答案：C。解析：高速缓冲存储器（Cache）需要高速读写能力，SRAM（静态RAM）基于触发器存储数据，无需刷新，读写速度快，延迟低，适合作为Cache；DRAM（动态RAM）需要周期性刷新，读写速度较慢，适合作为主存；ROM为只读存储器，不适合用于需要频繁读写的Cache。"],
    [1, "主存储器简称主存，是CPU除寄存器外唯一能（ ）的存储器。", ["直接访问","间接访问","允许访问","拒绝访问"], 0, "答案：A。解析：CPU可通过地址总线直接访问主存，无需中间设备，因此主存是CPU除内部寄存器外唯一能直接访问的存储器；外存储器（如硬盘）需通过I/O接口间接访问，不能被CPU直接访问。选项B、C、D不符合主存的访问特性。"],
    [1, "字节表示法中，一个存储单元由（ ）个二进制位组成。", ["4","8","16","32"], 1, "答案：B。解析：字节（Byte）是计算机存储的基本单位，1字节固定由8个二进制位（bit）组成，可表示0~255的无符号数或-128~127的有符号数。选项A为半字节（ nibble），选项C、D为不同字长的存储单元，均不符合字节的定义。"],
    [1, "计算机一次能处理的二进制数的位数，称为（ ）。", ["存储字长","数据字长","存储速度","存储容量"], 1, "答案：B (通常指数据字长/机器字长)。解析：数据字长（机器字长）是指CPU一次能处理的二进制数据的位数，与CPU寄存器、ALU的位数一致，决定了CPU的运算精度；存储字长是存储器一次存取的二进制位数；存储速度和存储容量是存储器的性能指标，与CPU处理能力无关。"],
    [1, "存储器可以存储的（ ）信息总量称为存储容量。", ["二进制","八进制","十进制","十六进制"], 0, "答案：A。解析：计算机内部所有信息均以二进制形式存储，因此存储容量是指存储器能存储的二进制信息总量，单位通常为字节（Byte）、千字节（KB）等。八进制、十进制、十六进制仅用于用户交互时的表示，并非存储器的存储形式。"],

    [1, "请把真值+0.5，转成二进制定点小数（ ）。", ["0.1","0.2","1.1","0.11"], 0, "答案：A。解析：十进制0.5转换为二进制的方法是乘以2取整，0.5×2=1.0，整数部分为1，小数部分为0，因此二进制表示为0.1，对应定点小数的正数形式（符号位0，数值位1），选项A正确。"],

/* ======================= 状态持久化 ======================= */
const LS_KEY='practice_state_v1';
// 每次打开页面时清空历史答题记录（如需保留，请删除下一行）
localStorage.removeItem(LS_KEY);
let answered={},wrongSet=new Set();
function loadState(){
  try{const r=localStorage.getItem(LS_KEY);if(r){const o=JSON.parse(r);answered=o.answered||{};wrongSet=new Set(o.wrong||[]);}}
  catch{localStorage.removeItem(LS_KEY);answered={};wrongSet=new Set();}
}
function saveState(){
  try{localStorage.setItem(LS_KEY,JSON.stringify({answered,wrong:Array.from(wrongSet)}));}
  catch{console.warn('saveState failed');}
}
loadState();

// 知识点（Topic）筛选
let currentTopic = '';
// 分类器：把题目归为指定的九个知识点之一
function classifyQuestion(item){
  const [type,q,opts,ansIdx,analysis] = item;
  const text = ((q||'') + ' ' + (analysis||'') + ' ' + (Array.isArray(opts) ? opts.join(' ') : (opts||''))).toLowerCase();
  // 区分顺序：更具体的优先
  const rules = [
    ['指令流水线', /流水线|pipeline|阻塞/],
    ['输入/输出系统', /i\/o|io|dma|中断|设备|接口|打印机|键盘|输入设备|输出设备/],
    ['总线系统', /总线|pci|usb|总线仲裁|带宽|地址总线|数据总线|控制总线/],
    ['中央处理器', /cpu|中央处理器|控制器|寄存器组|寄存器/],
    ['指令系统', /指令系统|操作码|地址码|指令格式|指令集|取指|译码|执行/],
    ['存储系统', /存储|dram|sram|rom|flash|主存|cache|存储层次|缓冲/],
    ['运算方法与运算器', /运算器|算术|逻辑运算|移位|乘法器|加法|booth|阵列乘法器/],
    ['数据信息表示', /补码|原码|反码|浮点|定点|bcd|ascii|编码|表示/],
    ['计算机系统概述', /计算机系统|计算机组成|存储程序|计算机问世|主机|外部设备|计算机的主要组成/]
  ];
  for(const [label,regex] of rules){ if(regex.test(text)) return label; }
  return '未分类';
}
function getTopicsSet(){
  const s = new Set();
  db.forEach(it=>{
    // 如果题目已明确标注第6字段，保留；否则使用分类器
    const t = it[5];
    if(t){ if(Array.isArray(t)) t.forEach(x=>s.add(String(x))); else s.add(String(t)); }
    else s.add(classifyQuestion(it));
  });
  return s;
}
function populateTopicSelect(){
  const sel = document.getElementById('topic-select');
  if(!sel) return;
  sel.innerHTML = '<option value="">全部知识点</option>';
  Array.from(getTopicsSet()).sort().forEach(t=>{
    const o = document.createElement('option'); o.value = t; o.textContent = t; sel.appendChild(o);
  });
  sel.value = currentTopic || '';
}
const topicSelect = document.getElementById('topic-select');
if(topicSelect){
  topicSelect.addEventListener('change', e=>{ currentTopic = e.target.value; render(document.getElementById('search').value.trim()); });
  populateTopicSelect();

  // ===== 知识点统计面板 & 按钮 =====
  function computeTopicCounts(){
    const counts = {};
    db.forEach((it, idx)=>{
      const t = it[5] ? (Array.isArray(it[5])?it[5][0]:it[5]) : classifyQuestion(it);
      counts[t] = (counts[t]||0) + 1;
    });
    return counts;
  }
  function updateTopicStatsPanel(){
    const panel = document.getElementById('topic-stats'); if(!panel) return;
    const counts = computeTopicCounts();
    const items = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
    panel.innerHTML = '<strong>知识点统计</strong><div style="margin-top:6px;font-size:13px;color:#444"></div>';
    const list = document.createElement('div'); list.style.display='flex'; list.style.flexDirection='column'; list.style.gap='6px'; list.style.marginTop='8px';
    items.forEach(([t,c])=>{
      const row = document.createElement('div'); row.style.display='flex'; row.style.justifyContent='space-between'; row.style.alignItems='center';
      const left = document.createElement('span'); left.textContent = `${t}`; left.style.cursor='pointer'; left.style.color='#1a73e8'; left.title='点击筛选该知识点';
      left.onclick = ()=>{
        currentTopic = t; document.getElementById('topic-select').value = t; render(document.getElementById('search').value.trim());
        // 定位到该知识点的第一道题并高亮
        let firstIdx = -1;
        for(let idx=0; idx<db.length; idx++){
          const it = db[idx];
          const tt = it[5] ? (Array.isArray(it[5])?it[5][0]:it[5]) : classifyQuestion(it);
          if(tt === t){ firstIdx = idx; break; }
        }
        panel.style.display='none';
        if(firstIdx >= 0){
          // 等待 DOM 更新后滚动（render 已执行）
          setTimeout(()=>{
            const el = document.getElementById('q-'+firstIdx);
            if(el){ el.scrollIntoView({behavior:'smooth', block:'center'}); el.classList.add('highlight'); setTimeout(()=>el.classList.remove('highlight'),1200); }
          }, 50);
      } };
      const right = document.createElement('span'); right.textContent = ` ${c}题`; right.style.color='#666';
      row.appendChild(left); row.appendChild(right);
      list.appendChild(row);
    });
    panel.appendChild(list);
  }

  const statsBtn = document.createElement('button');
  statsBtn.className='btn'; statsBtn.style.marginLeft='8px'; statsBtn.textContent='知识点统计';
  const statsPanel = document.createElement('div'); statsPanel.id='topic-stats';
  statsPanel.style.cssText = 'display:none;position:absolute;right:20px;top:60px;background:#fff;padding:10px;border:1px solid #ddd;max-height:300px;overflow:auto;z-index:200;box-shadow:0 4px 10px rgba(0,0,0,.1)';
  document.querySelector('.navbar').appendChild(statsBtn);
  document.querySelector('.navbar').appendChild(statsPanel);
  statsBtn.addEventListener('click', e=>{ if(statsPanel.style.display==='none'){ updateTopicStatsPanel(); statsPanel.style.display='block'; } else statsPanel.style.display='none'; });
  document.addEventListener('click', e=>{ if(!document.querySelector('.navbar').contains(e.target)) statsPanel.style.display='none'; });
} 

/* ======================= 渲染 ======================= */
const listBox=document.getElementById('q-list');
function render(filterText=''){
  listBox.innerHTML='';
  let visible=0,done=0,correct=0;
  db.forEach((item,i)=>{
    const [type,q,opts,ansIdx,analysis] = item;
    if (filterText && !q.includes(filterText) && !(analysis||'').includes(filterText)) return;
    const topicArrCheck = Array.isArray(item[5]) ? item[5] : (item[5] ? [item[5]] : [classifyQuestion(item)]);
    if (currentTopic && !topicArrCheck.includes(currentTopic)) return;
    visible++;

    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `q-${i}`;

    // 安全构造选项 HTML（防止 opts 为 null/undefined）
    const safeOpts = Array.isArray(opts) ? opts : [];
    let optsHtml = '';
    if (type) {
      // 单选题
      if (safeOpts.length === 0) {
        optsHtml = '<div style="color:#666;font-style:italic">（该题暂无选项）</div>';
      } else {
        optsHtml = safeOpts.map((t,j) => `<button class="opt-btn" data-i="${i}" data-ans="${j}">${String.fromCharCode(65+j)}. ${t}</button>`).join('');
      }
    } else {
      // 判断题：按钮 data-ans 与答案索引保持一致（1 表示正确，0 表示错误）
      optsHtml = '<button class="opt-btn" data-i="'+i+'" data-ans="1">√ 正确</button><button class="opt-btn" data-i="'+i+'" data-ans="0">× 错误</button>';
    }

    const topicLabel = topicArrCheck.join(', ');
    card.innerHTML = `
      <div class="q-meta"><span>第 ${i+1} 题</span>
        <span class="tag ${type?'tag-mc':'tag-tf'}">${type?'单选':'判断'}</span>
        <span class="topic" style="margin-left:8px;color:#666;font-size:12px;">${topicLabel}</span>
      </div>
      <div class="q-content">${q}</div>
      <div class="options">${optsHtml}</div>
      <div class="analysis"><strong>答案：${type?String.fromCharCode(65+ansIdx):(ansIdx?'√ 正确':'× 错误')}</strong><br><br>${analysis||'暂无解析'}</div>`;

    listBox.appendChild(card);

    // 恢复已答状态（小心 null 检查）
    if (answered[i]) {
      const sel = answered[i].selected;
      const isCorr = !!answered[i].correct;
      // 禁用按钮（若存在）
      card.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
      const correctBtnVal = String(ansIdx);
      const correctBtnEl = card.querySelector(`.opt-btn[data-ans="${correctBtnVal}"]`);
      if (correctBtnEl) correctBtnEl.classList.add('correct-btn');
      if (!isCorr) {
        const selBtnEl = card.querySelector(`.opt-btn[data-ans="${String(sel)}"]`);
        if (selBtnEl) selBtnEl.classList.add('wrong-btn');
      }
      card.classList.add(isCorr ? 'solved-right' : 'solved-wrong');
      const ana = card.querySelector('.analysis'); if (ana) ana.style.display = 'block';
    }
  });
  // 使用全局 answered 计算已答与正确率，保证在搜索/过滤时统计一致
  const doneCount = Object.keys(answered).length;
  const correctCount = Object.values(answered).reduce((s, a) => s + ((a && a.correct) ? 1 : 0), 0);
  document.getElementById('done-cnt').textContent = doneCount;
  document.getElementById('acc-rate').textContent = doneCount ? Math.round(correctCount / doneCount * 100) + '%' : '0%';
}

/* ======================= 答题交互 ======================= */
listBox.addEventListener('click',e=>{
  const btn=e.target.closest('.opt-btn');
  if(!btn||btn.disabled)return;
  const i=+btn.dataset.i,ans=+btn.dataset.ans,type=db[i][0],real=db[i][3];
  const correct=type?ans===real:ans===real;
  answered[i]={selected:ans,correct};
  if(!correct)wrongSet.add(i);else wrongSet.delete(i);
  saveState();render(document.getElementById('search').value.trim());
});

/* ======================= 搜索 ======================= */
document.getElementById('search').addEventListener('input',e=>render(e.target.value.trim()));

/* ======================= 导出错题 TXT ======================= */
function exportWrongTxt(){
  if(wrongSet.size===0){alert('当前没有错题');return;}
  let lines = [];
  Array.from(wrongSet).sort((a,b)=>a-b).forEach(idx=>{
    const [type,q,opts,ansIdx,analysis] = db[idx];
    const typeTxt = type ? '单选题' : '判断题';
    const topic = db[idx] && db[idx][5] ? (Array.isArray(db[idx][5])?db[idx][5][0]:db[idx][5]) : classifyQuestion(db[idx]);
    const optText = type
      ? (Array.isArray(opts) ? opts.map((t,i)=>`${String.fromCharCode(65+i)}. ${t}`).join(' / ') : '') + ` | 答案：${String.fromCharCode(65+ansIdx)}`
      : `答案：${ansIdx?'正确':'错误'}`;
    lines.push(`序号: ${idx+1}`);
    lines.push(`知识点: ${topic}`);
    lines.push(`题型: ${typeTxt}`);
    lines.push(`题目: ${q}`);
    lines.push(`选项/答案: ${optText}`);
    lines.push(`解析: ${analysis || '—'}`);
    lines.push('--------------------------------------------------');
  });
  const blob = new Blob([lines.join('\n')], {type: 'text/plain;charset=utf-8'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = '计算机组成原理错题.txt'; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(a.href);
}

/* ======================= 导出错题 Word（纯原生 JS，无需外部依赖） ======================= */
function exportWrongWord(){ 
  if(wrongSet.size===0){alert('当前没有错题');return;}
  // 构建 HTML 内容，添加 Word 兼容的 mso 样式
  var html = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8">';
  html += '<!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View><w:Zoom>100</w:Zoom></w:WordDocument></xml><![endif]-->';
  html += '<style>@page{margin:2cm;}';
  html += 'body{font-family:"Microsoft YaHei",sans-serif;font-size:14px;color:#333;}';
  html += 'h2{text-align:center;margin-bottom:20px;}';
  html += 'table{border-collapse:collapse;width:100%;font-size:13px;}';
  html += 'th,td{border:1px solid #333;padding:6px 8px;text-align:left;vertical-align:top;}';
  html += 'th{background:#e8e8e8;font-weight:bold;}';
  html += 'tr:nth-child(even){background:#f9f9f9;}';
  html += '.topic-cell{white-space:nowrap;}.idx-cell{text-align:center;width:50px;}</style></head><body>';
  html += '<h2>计算机组成原理错题本（共 ' + wrongSet.size + ' 题）</h2>';
  html += '<table><thead><tr><th>序号</th><th>知识点</th><th>题型</th><th>题目</th><th>选项/答案</th><th>解析</th></tr></thead><tbody>';
  
  var sortedWrong = Array.from(wrongSet).sort(function(a,b){return a-b;});
  sortedWrong.forEach(function(idx){
    var item = db[idx];
    var type = item[0], q = item[1], opts = item[2], ansIdx = item[3], analysis = item[4];
    var topic = db[idx] && db[idx][5] ? (Array.isArray(db[idx][5])?db[idx][5][0]:db[idx][5]) : classifyQuestion(db[idx]);
    var typeTxt = type ? '单选题' : '判断题';
    var optHtml = type
      ? (Array.isArray(opts) ? opts.map(function(t,i){return String.fromCharCode(65+i) + '. ' + t;}).join('<br>') : '\u2014') + '<br><b>\u7b54\u6848\uff1a' + String.fromCharCode(65+ansIdx) + '</b>'
      : '\u6b63\u786e / \u9519\u8bef\u3000<b>\u7b54\u6848\uff1a' + (ansIdx ? '\u6b63\u786e' : '\u9519\u8bef') + '</b>';
    html += '<tr><td class="idx-cell">' + (idx+1) + '</td><td class="topic-cell">' + topic + '</td><td>' + typeTxt + '</td><td>' + q + '</td><td>' + optHtml + '</td><td>' + (analysis || '\u2014') + '</td></tr>';
  });
  html += '</tbody></table></body></html>';
  
  // 以 .doc 格式导出（Word 可直接打开 HTML 文件）
  var blob = new Blob(['\ufeff' + html], { type: 'application/msword;charset=utf-8' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '\u8ba1\u7b97\u673a\u7ec4\u6210\u539f\u7406\u9519\u9898\u672c.doc';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

/* ======================= 添加导出错题按钮 ======================= */
const navbar=document.querySelector('.navbar');
const exportTxtBtn=document.createElement('button');
exportTxtBtn.className='btn'; exportTxtBtn.style.marginLeft='10px'; exportTxtBtn.textContent='导出错题 TXT'; exportTxtBtn.onclick = exportWrongTxt; navbar.appendChild(exportTxtBtn);
const exportWordBtn=document.createElement('button'); exportWordBtn.className='btn';exportWordBtn.style.marginLeft='8px'; exportWordBtn.textContent='导出错题 Word'; exportWordBtn.onclick=exportWrongWord; navbar.appendChild(exportWordBtn);

/* ======================= 首次渲染 ======================= */
render();
if(document.getElementById('topic-stats') && typeof updateTopicStatsPanel === 'function') updateTopicStatsPanel();
</script>
