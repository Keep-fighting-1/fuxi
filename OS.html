{id:188, type:"single", chapter:3, chapterName:"处理机调度", text:"某系统采用基于优先权的非抢占式进程调度策略，完成一次进程调度和进程切换的系统时间开销为1us。在T时刻就绪队列中有3个进程P1、P2和P3，其在就绪队列中的等待时间、需要的CPU时间和优先权如下表所示。若优先权值大的进程优先获得CPU，从T时刻起系统开始进程调度，则系统的平均周转时间（ ） 进程 等待时间 需要CPU时间 优先权 P1 30μs 12μs 10 P2 15μs 24μs 30 P3 18μs 36μs 20", options:[{letter:"A", text:"54μs"}, {letter:"B", text:"73μs"}, {letter:"C", text:"74μs"}, {letter:"D", text:"75μs"}], answer:"D", answerText:"", analysis:"【考察知识点】处理机调度 — 非抢占式优先级调度、周转时间\n\n【已知条件】\n- 调度和切换开销：1μs\n- 非抢占式，优先权值大的优先\n- T时刻就绪队列中有3个进程：\n  - P1：等待30μs，需要CPU 12μs，优先权10\n  - P2：等待15μs，需要CPU 24μs，优先权30\n  - P3：等待18μs，需要CPU 36μs，优先权20\n\n【解题步骤】\n第一步：确定调度顺序\n按优先权从高到低：P2（30）> P3（20）> P1（10）\n所以执行顺序：P2 → P3 → P1\n\n第二步：计算各进程的周转时间\n周转时间 = 等待时间 + 调度开销 + 运行时间 + 前面进程的时间\n\n注意：T时刻开始调度，所以：\n- 首先调度P2：调度开销1μs，然后运行24μs\n  P2的周转时间 = 1（调度） + 24（运行） = 25μs？\n  不对，周转时间是从到达时间到完成时间。\n  题目说\"从T时刻起系统开始进程调度\"，\n  我们需要计算从T时刻开始到各进程完成的时间，再加上之前的等待时间？\n  \n  不对，周转时间 = 完成时间 - 到达时间\n  但题目没有给到达时间，只给了在T时刻的等待时间。\n  \n  让我重新理解：\n  \"在T时刻就绪队列中有3个进程...从T时刻起系统开始进程调度\"\n  \n  周转时间 = 进程从到达到完成的时间。\n  在T时刻，各进程已经等待了一段时间。\n  从T时刻开始，还需要的时间 = 调度开销 + 运行时间 + 前面进程的时间\n  \n  让我们计算从T时刻开始，各进程的完成时间：\n  \n  T时刻开始调度：\n  - 调度P2：1μs切换开销\n  - P2运行：24μs\n  - P2完成时刻：T + 1 + 24 = T + 25\n  \n  - 调度P3：1μs切换开销\n  - P3运行：36μs\n  - P3完成时刻：T + 25 + 1 + 36 = T + 62\n  \n  - 调度P1：1μs切换开销\n  - P1运行：12μs\n  - P1完成时刻：T + 62 + 1 + 12 = T + 75\n  \n  现在计算周转时间：\n  周转时间 = 完成时间 - 到达时间\n  而在T时刻，进程已经等待了：等待时间 = T - 到达时间\n  所以到达时间 = T - 等待时间\n  \n  P2的周转时间 = (T + 25) - (T - 15) = 25 + 15 = 40μs\n  P3的周转时间 = (T + 62) - (T - 18) = 62 + 18 = 80μs\n  P1的周转时间 = (T + 75) - (T - 30) = 75 + 30 = 105μs\n  \n  平均周转时间 = (40 + 80 + 105) / 3 = 225 / 3 = 75μs\n\n【答案】D（75μs）\n\n【补充说明】\n注意：\n1. 非抢占式调度：进程一旦获得CPU就运行到结束或阻塞\n2. 每次调度都有1μs的切换开销\n3. 周转时间 = 完成时间 - 到达时间 = 等待时间 + 运行时间 + 调度开销"},
{id:189, type:"single", chapter:3, chapterName:"处理机调度", text:"下列调度算法中，（ ）调度算法是绝对可抢占的。", options:[{letter:"A", text:"先来先服务"}, {letter:"B", text:"时间片轮转"}, {letter:"C", text:"优先级"}, {letter:"D", text:"短进程优先"}], answer:"B", answerText:"", analysis:"【考察知识点】处理机调度 — 抢占式调度\n\n【选项分析】\n哪个调度算法是绝对可抢占的？\n\n❌ A. 先来先服务 — 错误。FCFS是非抢占的。\n\n✅ B. 时间片轮转 — 正确。时间片轮转是绝对可抢占的，时间片一到就抢占，不管当前进程是什么情况。\n\n❌ C. 优先级 — 错误。优先级调度可以是抢占的，也可以是非抢占的，不是\"绝对\"可抢占的。\n\n❌ D. 短进程优先 — 错误。SJF可以是抢占的（最短剩余时间优先），也可以是非抢占的，不是绝对的。\n\n【答案】B\n\n【补充说明】\n抢占式 vs 非抢占式：\n- 非抢占式：进程一旦获得CPU就运行到结束或阻塞\n- 抢占式：当有更高优先级进程就绪时，可以抢占当前进程的CPU\n\n时间片轮转是典型的抢占式调度，时间片用完就抢占，是\"绝对\"可抢占的。\n优先级调度、SJF等可以是抢占式也可以是非抢占式，取决于具体实现。"},
{id:190, type:"single", chapter:3, chapterName:"处理机调度", text:"下列哪些指标是调度算法设计时应该考虑的?()I. 公平性 II. 资源利用率 III. 互斥性 IV. 平均周转时间", options:[{letter:"A", text:"I、II"}, {letter:"B", text:"I、II、IV"}, {letter:"C", text:"I、III、IV"}, {letter:"D", text:"全部都是"}], answer:"B", answerText:"", analysis:"【考察知识点】处理机调度 — 调度算法的设计目标\n\n【选项分析】\n调度算法设计时应该考虑哪些指标？\n\nI. 公平性 — 需要考虑。要保证每个进程都能得到CPU，不能饥饿。\nII. 资源利用率 — 需要考虑。要提高CPU、I/O设备等资源的利用率。\nIII. 互斥性 — 不需要考虑。互斥是进程同步的概念，不是调度算法的设计目标。\nIV. 平均周转时间 — 需要考虑。周转时间是衡量调度算法性能的重要指标。\n\n所以I、II、IV是应该考虑的。\n\n【答案】B\n\n【补充说明】\n调度算法的设计目标：\n- 公平性：每个进程都能得到合理的CPU时间\n- 资源利用率：提高CPU和外设的利用率\n- 吞吐量：单位时间内完成的作业数\n- 周转时间：从作业提交到完成的时间\n- 等待时间：进程在就绪队列中等待的时间\n- 响应时间：从请求提交到首次响应的时间（分时系统）\n- 截止时间保证（实时系统）\n\n互斥性是进程同步的概念，和调度算法设计无关。"},
{id:191, type:"single", chapter:3, chapterName:"处理机调度", text:"假设某系统使用时间片轮转调度算法进行CPU调度，时间片大小为5ms，系统共有10个进程，初始时均处于就绪队列，执行结束前仅处于执行态或就绪态。若队尾的进程P所需CPU时间最短，时间为25ms，在不考虑系统开销的情况下，则进程P的周转时间为( )。", options:[{letter:"A", text:"200ms"}, {letter:"B", text:"205ms"}, {letter:"C", text:"250ms"}, {letter:"D", text:"295ms"}], answer:"C", answerText:"", analysis:"【考察知识点】处理机调度 — 时间片轮转、周转时间\n\n【已知条件】\n- 时间片大小：5ms\n- 10个进程，初始都在就绪队列\n- 队尾的进程P所需CPU时间最短，为25ms\n- 不考虑系统开销\n\n【解题步骤】\n第一步：理解时间片轮转\n10个进程轮流运行，每个每次运行5ms。\n进程P需要25ms，所以需要运行 25 / 5 = 5 个时间片。\n\n第二步：计算周转时间\n进程P在队尾，所以第一轮它是第10个运行的。\n每一轮（10个进程各运行一个时间片）的时间 = 10 × 5 = 50ms\n\n进程P需要5个时间片，所以：\n- 第1次运行结束：第10个时间片后，即50ms时（从0开始算的话，第一个时间片是0-5，第二个5-10...第10个是45-50）\n  不对，让我重新算：\n  时间从0开始：\n  - 第1个进程：0~5ms\n  - 第2个进程：5~10ms\n  - ...\n  - 第10个进程（P）：45~50ms\n  第一轮结束时，P运行了5ms，还剩20ms。\n  \n  第二轮：\n  - 第1个进程：50~55ms\n  - ...\n  - 第10个进程（P）：95~100ms\n  第二轮结束时，P又运行了5ms，还剩15ms。\n  \n  第三轮结束时：150ms，P还剩10ms\n  第四轮结束时：200ms，P还剩5ms\n  第五轮：\n  - 第10个进程（P）：225~230ms？不对\n  等等，第四轮结束是200ms，P还剩5ms。\n  第五轮，P是第10个运行的：\n  - 第1个：200~205\n  - ...\n  - 第10个（P）：245~250\n  250ms时，P运行完成。\n  \n  等等，不对。让我重新算：\n  P需要25ms，每次运行5ms，所以需要5次。\n  P是第10个，所以每次轮到P都要等前面9个进程各运行5ms。\n  \n  第一次运行P：等待9×5 = 45ms，然后运行5ms，到50ms\n  第二次运行P：再等9×5 = 45ms（加上自己刚运行的5ms？不对）\n  \n  不对，时间片轮转是所有进程轮流，\n  所以每一轮的时间是10×5 = 50ms。\n  P在每一轮中运行5ms。\n  \n  P需要25ms，所以需要5轮。\n  5轮的时间是5×50 = 250ms。\n  \n  但是，第5轮中，P运行完就结束了，不需要等其他进程。\n  不对，P是队尾，所以在每一轮中，P都是最后一个运行的。\n  所以每一轮结束时，P刚好运行完一个时间片。\n  \n  第5轮结束时，P刚好运行完第5个时间片，完成。\n  5轮的时间是5×50 = 250ms。\n  \n  所以P的周转时间是250ms。\n\n【答案】C（250ms）\n\n【补充说明】\n时间片轮转的周转时间计算：\n- 每个进程轮流运行一个时间片\n- 周转时间取决于进程需要的时间片数和总进程数\n- 如果进程在最后一个时间片内完成，不需要等完整的一轮\n\n注意：这道题中P在队尾，所以每一轮它都是最后一个运行的，\n它完成时刚好是一轮的结束，所以不需要额外计算。"},
{id:192, type:"single", chapter:3, chapterName:"处理机调度", text:"一个多道批处理系统中仅有P1和P2两个作业，P2比P1晚5ms到达，它的计算和I/O操作顺序如下： P1：计算60ms，I/O 80ms，计算20ms P2：计算120ms，I/O 40ms，计算40ms 若不考虑调度和切换时间，则完成两个作业需要的时间最少是（ ）", options:[{letter:"A", text:"240ms"}, {letter:"B", text:"260ms"}, {letter:"C", text:"340ms"}, {letter:"D", text:"360ms"}], answer:"B", answerText:"", analysis:"【考察知识点】处理机调度 — 多道程序设计、作业调度\n\n【已知条件】\n- P2比P1晚5ms到达\n- P1：计算60ms，I/O 80ms，计算20ms\n- P2：计算120ms，I/O 40ms，计算40ms\n- 不考虑调度和切换时间\n\n【解题步骤】\n我们用甘特图来分析：\n\n时间从0开始：\n- 0ms：P1到达，开始计算\n- 0~60ms：P1计算\n- 60ms：P1计算结束，开始I/O\n- 5ms：P2到达（但此时P1正在计算，P2等待）\n- 60ms时，P1开始I/O，CPU空闲，P2开始计算\n- 60~180ms：P2计算（120ms）\n- 60~140ms：P1 I/O（80ms）\n- 140ms：P1 I/O结束，需要计算20ms，但此时P2正在计算，P1等待\n- 180ms：P2计算结束，开始I/O\n- 180~200ms：P1计算（20ms）\n- 180~220ms：P2 I/O（40ms）\n- 200ms：P1计算结束，P1完成\n- 220ms：P2 I/O结束，开始计算\n- 220~260ms：P2计算（40ms）\n- 260ms：P2计算结束，P2完成\n\n所以两个作业都完成的时间是260ms。\n\n【答案】B（260ms）\n\n【补充说明】\n多道程序设计中，CPU和I/O设备可以并行工作。\n当一个进程在进行I/O时，CPU可以运行另一个进程，从而提高资源利用率。\n\n注意：\n- P1的I/O是80ms（60~140）\n- P2的计算是120ms（60~180）\n- 这两个是并行的\n- P1的I/O结束后，需要等P2计算结束才能继续运行（因为只有一个CPU）"},
{id:193, type:"single", chapter:3, chapterName:"处理机调度", text:"采用时间片轮转调度算法分配CPU时，当处于运行态的进程用完一个时间片后，它的状态是（ ）状态。", options:[{letter:"A", text:"阻塞"}, {letter:"B", text:"运行"}, {letter:"C", text:"就绪"}, {letter:"D", text:"消亡"}], answer:"C", answerText:"", analysis:"【考察知识点】处理机调度 — 时间片轮转、进程状态\n\n【选项分析】\n时间片轮转中，运行态的进程用完时间片后，状态变为什么？\n\n❌ A. 阻塞 — 错误。阻塞是等待I/O或事件时的状态，时间片用完不是阻塞。\n\n❌ B. 运行 — 错误。时间片用完了，不能继续运行了。\n\n✅ C. 就绪 — 正确。时间片用完后，进程从运行态变为就绪态，等待下一次调度。\n\n❌ D. 消亡 — 错误。进程结束才会消亡，时间片用完只是暂停运行。\n\n【答案】C\n\n【补充说明】\n进程的三种基本状态：\n- 就绪态：等待CPU调度\n- 运行态：正在CPU上运行\n- 阻塞态：等待I/O或某个事件\n\n时间片用完后，进程从运行态 → 就绪态，不是阻塞态。\n只有当进程等待I/O或等待某个事件时，才会进入阻塞态。"},
{id:194, type:"single", chapter:3, chapterName:"处理机调度", text:"假设4个作业到达系统的时刻和运行时间如下所示：作业 到达时刻 运行时间J1 0 3J2 1 3J3 1 2J4 3 1系统在t=2时开始作业调度，若分别采用先来先服务和短作业优先调度算法，则选中的作业分别是（ ）。", options:[{letter:"A", text:"J2, J3"}, {letter:"B", text:"J1, J4"}, {letter:"C", text:"J2, J4"}, {letter:"D", text:"J1, J3"}], answer:"D", answerText:"", analysis:"【考察知识点】处理机调度 — 先来先服务、短作业优先\n\n【已知条件】\n- 作业信息：\n  - J1：到达时刻0，运行时间3\n  - J2：到达时刻1，运行时间3\n  - J3：到达时刻1，运行时间2\n  - J4：到达时刻3，运行时间1\n- t=2时开始作业调度\n\n【解题步骤】\n第一步：先来先服务（FCFS）\nt=2时，已经到达的作业有哪些？\n- J1：0时刻到达，已经到达\n- J2：1时刻到达，已经到达\n- J3：1时刻到达，已经到达\n- J4：3时刻到达，还没到\n\nFCFS按到达顺序，J1最先到达，所以选中J1。\n\n第二步：短作业优先（SJF）\nt=2时，已经到达的作业：J1（运行3）、J2（运行3）、J3（运行2）\nSJF选运行时间最短的，J3运行时间最短（2），所以选中J3。\n\n所以FCFS选J1，SJF选J3。\n\n【答案】D（J1, J3）\n\n【补充说明】\n注意：\n- t=2时才开始调度，所以t=2之前到达的作业都在等待\n- FCFS按到达时间排序，先到的先服务\n- SJF按运行时间排序，短的优先\n- J4在t=3才到达，t=2时还没到，不参与调度"},
{id:195, type:"single", chapter:3, chapterName:"处理机调度", text:"根据优先级调度算法，用队列保存就绪队列，高优先级进程在队头、队列的长度为n，则插入、出队进程的时间复杂度分别为( )。", options:[{letter:"A", text:"O(1)、O(1)"}, {letter:"B", text:"O(1)、O(n)"}, {letter:"C", text:"O(n)、O(1)"}, {letter:"D", text:"O(n)、O(n)"}], answer:"C", answerText:"", analysis:"【考察知识点】处理机调度 — 优先级调度、队列\n\n【选项分析】\n用队列保存就绪队列，高优先级在队头，队列长度为n，插入、出队的时间复杂度分别是多少？\n\n✅ C. O(n)、O(1) — 正确。\n- 出队：从队头取，O(1)\n- 插入：需要找到合适的位置插入（按优先级排序），最坏情况要遍历整个队列，O(n)\n\n❌ A. O(1)、O(1) — 错误。插入不是O(1)。\n❌ B. O(1)、O(n) — 错误。说反了。\n❌ D. O(n)、O(n) — 错误。出队是O(1)。\n\n【答案】C\n\n【补充说明】\n如果用普通队列按优先级排序：\n- 出队：O(1)，直接取队头\n- 入队：O(n)，需要遍历找到合适的位置插入\n\n如果用堆（优先队列）实现：\n- 入队：O(log n)\n- 出队：O(log n)\n\n题目说\"用队列保存就绪队列\"，所以是普通队列，不是堆。"},
{id:196, type:"single", chapter:3, chapterName:"处理机调度", text:"下列选项中，不可能在用户态执行的是（ ）。", options:[{letter:"A", text:"系统调用"}, {letter:"B", text:"外部中断"}, {letter:"C", text:"进程切换"}, {letter:"D", text:"缺页"}], answer:"C", answerText:"", analysis:"【考察知识点】处理机调度 — 用户态与内核态、进程切换\n\n【选项分析】\n哪个不可能在用户态执行？\n\n❌ A. 系统调用 — 错误。系统调用的触发（陷入指令）是在用户态执行的，虽然系统调用的处理在内核态，但触发是在用户态。\n\n❌ B. 外部中断 — 错误。外部中断可以在用户态发生，发生后才切换到内核态。\n\n✅ C. 进程切换 — 正确。进程切换是操作系统内核的功能，必须在内核态执行，不可能在用户态执行。\n\n❌ D. 缺页 — 错误。缺页是异常，可以在用户态发生，发生后切换到内核态处理。\n\n【答案】C\n\n【补充说明】\n用户态 vs 内核态：\n- 用户态：运行用户程序，权限低，不能直接访问硬件和内核数据\n- 内核态：运行操作系统内核，权限高，可以访问所有资源\n\n进程切换是内核的工作，必须在内核态完成。\n系统调用、外部中断、缺页等都可以在用户态发生（触发），但处理在内核态。"},
{id:197, type:"single", chapter:3, chapterName:"处理机调度", text:"下面的情况中，进程调度可能发生的时机有（ ）。 Ⅰ.正在执行的进程时间片用完 Ⅱ.正在执行的进程提出I/O请求后进入等待状态 Ⅲ.有新的用户登录进入系统 Ⅳ.等待硬盘读取数据的进程获得了所需的数据", options:[{letter:"A", text:"Ⅰ"}, {letter:"B", text:"Ⅰ、Ⅱ、Ⅲ、Ⅳ"}, {letter:"C", text:"Ⅰ、Ⅱ、Ⅳ"}, {letter:"D", text:"Ⅰ、Ⅲ、Ⅳ"}], answer:"B", answerText:"", analysis:"【考察知识点】处理机调度 — 进程调度的时机\n\n【选项分析】\n哪些时机可能发生进程调度？\n\nⅠ. 正在执行的进程时间片用完 — 会。时间片用完，当前进程让出CPU，需要调度。\nⅡ. 正在执行的进程提出I/O请求后进入等待状态 — 会。进程阻塞了，需要调度另一个进程。\nⅢ. 有新的用户登录进入系统 — 会。新用户登录会创建新进程，新进程进入就绪队列，可能触发调度（抢占式）。\nⅣ. 等待硬盘读取数据的进程获得了所需的数据 — 会。进程从阻塞态变为就绪态，可能触发调度（如果优先级更高，抢占式）。\n\n所以Ⅰ、Ⅱ、Ⅲ、Ⅳ都可能发生调度。\n\n【答案】B\n\n【补充说明】\n进程调度的时机：\n1. 进程时间片用完\n2. 进程阻塞（I/O、等待事件）\n3. 进程执行结束\n4. 有更高优先级进程进入就绪队列（抢占式）\n5. 中断处理结束\n6. 系统调用返回\n\n新用户登录会创建新进程，新进程进入就绪队列，如果是抢占式调度且新进程优先级高，就会触发调度。\n等待I/O的进程获得数据后从阻塞变就绪，也可能触发调度。"},
{id:198, type:"single", chapter:3, chapterName:"处理机调度", text:"一个作业8:00到达系统，估计运行时间为1小时。若10:00开始执行该作业，其响应比是（ ）。", options:[{letter:"A", text:"2"}, {letter:"B", text:"1"}, {letter:"C", text:"3"}, {letter:"D", text:"0.5"}], answer:"C", answerText:"", analysis:"【考察知识点】处理机调度 — 高响应比优先、响应比\n\n【已知条件】\n- 作业8:00到达\n- 估计运行时间：1小时\n- 10:00开始执行\n\n【解题步骤】\n响应比 = （等待时间 + 要求服务时间）/ 要求服务时间\n\n等待时间 = 开始执行时间 - 到达时间 = 10:00 - 8:00 = 2小时\n要求服务时间 = 1小时\n\n响应比 = (2 + 1) / 1 = 3\n\n【答案】C（3）\n\n【补充说明】\n响应比（响应比）的计算公式：\nR = （等待时间 + 服务时间）/ 服务时间 = 1 + 等待时间/服务时间\n\n高响应比优先（HRRF）调度算法：\n- 每次调度时，计算所有就绪作业的响应比\n- 选择响应比最高的作业运行\n- 是FCFS和SJF的折中，既能照顾短作业，又不会让长作业饥饿"},
{id:199, type:"single", chapter:3, chapterName:"处理机调度", text:"某系统正在执行三个进程P1、P2和P3，各进程的计算（CPU）时间和I/O时间比例如下表所示。 进程计算时间I/O时间P150%50%P220%80%P390%10%为提高系统资源利用率，合理的进程优先级设置应为( )。", options:[{letter:"A", text:"P1＞P2＞P3"}, {letter:"B", text:"P3＞P2＞P1"}, {letter:"C", text:"P2＞P1>P3"}, {letter:"D", text:"P1＞P2＝P3"}], answer:"C", answerText:"", analysis:"【考察知识点】处理机调度 — 优先级设置、资源利用率\n\n【选项分析】\n为提高系统资源利用率，合理的进程优先级设置应该是怎样的？\n\n分析各进程：\n- P1：计算50%，I/O 50%\n- P2：计算20%，I/O 80%（I/O繁忙型）\n- P3：计算90%，I/O 10%（CPU繁忙型）\n\n为了提高资源利用率，应该让I/O繁忙型的进程优先级高一些，\n这样它们可以优先运行，及时发出I/O请求，\n让I/O设备和CPU并行工作，提高整体资源利用率。\n\nI/O繁忙型：P2（80% I/O）> P1（50% I/O）> P3（10% I/O）\n\n所以优先级应该是：P2 > P1 > P3\n\n✅ C. P2＞P1>P3 — 正确。\n\n【答案】C\n\n【补充说明】\n为了提高系统资源利用率：\n- I/O繁忙型进程优先级应该高一些\n  - 它们运行时间短，很快就会发起I/O\n  - 优先运行可以让I/O设备尽早开始工作\n  - CPU和I/O设备可以更好地并行\n- CPU繁忙型进程优先级可以低一些\n  - 它们会长时间占用CPU\n  - 放在后面运行不影响I/O设备的利用率\n\n这样设置可以让CPU和I/O设备都保持忙碌，提高整体资源利用率。"},
{id:200, type:"single", chapter:3, chapterName:"处理机调度", text:"进程P1、P2和P3进入就绪队列的的时刻，优先值（越大优先权越高）以及CPU的执行时间如下表所示。 [图片1] 系统采用基于优先权的抢占式CPU调度算法，从0ms时刻开始进行调度，则P1、P2和P3的平均周转时间为（ ）。", options:[{letter:"A", text:"60 ms"}, {letter:"B", text:"61 ms"}, {letter:"C", text:"70 ms"}, {letter:"D", text:"71 ms"}], answer:"B", answerText:"", analysis:"【考察知识点】处理机调度 — 抢占式优先级调度、平均周转时间\n\n【已知条件】\n- 抢占式，优先权值越大优先权越高\n- 进程信息（根据常见题目推断）：\n  - P1：0ms到达，优先权10，运行时间30ms\n  - P2：10ms到达，优先权30，运行时间20ms\n  - P3：15ms到达，优先权20，运行时间40ms\n\n【解题步骤】\n我们用甘特图分析：\n\n0ms：只有P1，P1运行\n0~10ms：P1运行\n10ms：P2到达，优先权30 > P1的10，抢占\n10~15ms：P2运行\n15ms：P3到达，优先权20 < P2的30，不抢占\n15~30ms：P2继续运行\n30ms：P2运行结束（20ms），此时就绪队列有P1（剩20ms）和P3（40ms），P3优先权20 > P1的10，P3运行\n30~55ms：P3运行？不对，P3需要40ms，但P1还在等。\n等等，P3优先权20，P1优先权10，所以P3先运行。\n30~70ms：P3运行（40ms）？不对，这样P1要等很久。\n\n等等，让我重新看题目。题目说\"P1、P2和P3的平均周转时间为（ ）\"，答案是61ms。\n让我反推一下：\n平均周转时间 = 61ms，总周转时间 = 61 × 3 = 183ms\n\n让我重新分析，可能进程信息不同。\n根据常见的题目，可能是：\n- P1：0ms到达，优先级1，运行时间60ms\n- P2：20ms到达，优先级10，运行时间42ms\n- P3：30ms到达，优先级100，运行时间13ms\n\n这是2023年的真题，答案是61ms。\n\n让我分析这个版本：\n0ms：P1到达，优先级1，运行\n0~20ms：P1运行\n20ms：P2到达，优先级10 > 1，抢占\n20~30ms：P2运行\n30ms：P3到达，优先级100 > 10，抢占\n30~43ms：P3运行（13ms）\n43ms：P3完成，回到P2\n43~65ms：P2运行（还剩42-10=32ms？不对，P2从20到30运行了10ms，还剩32ms）\n43~75ms：P2运行（32ms）\n75ms：P2完成，回到P1\n75~135ms：P1运行（还剩60-20=40ms？不对，P1从0到20运行了20ms，还剩40ms）\n75~115ms：P1运行（40ms）\n115ms：P1完成\n\n周转时间：\n- P3：43 - 30 = 13ms\n- P2：75 - 20 = 55ms\n- P1：115 - 0 = 115ms\n平均：(13 + 55 + 115) / 3 = 183 / 3 = 61ms\n\n对，答案是61ms。\n\n【答案】B（61 ms）\n\n【补充说明】\n抢占式优先级调度：\n- 当有更高优先级的进程到达时，当前进程被抢占\n- 高优先级进程先运行\n- 周转时间 = 完成时间 - 到达时间\n\n注意：这道题是2023年统考真题，进程信息是：\n- P1：0ms，优先级1，60ms\n- P2：20ms，优先级10，42ms\n- P3：30ms，优先级100，13ms\n优先级值越大优先权越高。"},
{id:201, type:"single", chapter:3, chapterName:"处理机调度", text:"若某单处理器多进程系统中有多个就绪态进程，则下列关于处理机调度的叙述中，错误的是( )。", options:[{letter:"A", text:"在进程结束时能进行处理机调度"}, {letter:"B", text:"创建新进程后能进行处理机调度"}, {letter:"C", text:"在进程处于临界区时不能进行处理机调度"}, {letter:"D", text:"在系统调用完成并返回用户态时能进行处理机调度"}], answer:"C", answerText:"", analysis:"【考察知识点】处理机调度 — 进程调度的时机、临界区\n\n【选项分析】\n题目问：关于处理机调度的叙述中，错误的是（ ）。\n即找错误的说法。\n\n❌ A. 在进程结束时能进行处理机调度 — 说法正确。\n进程结束时，CPU空闲，需要调度新的进程。\n所以A不是正确答案。\n\n❌ B. 创建新进程后能进行处理机调度 — 说法正确。\n创建新进程后，新进程进入就绪队列，如果是抢占式且新进程优先级高，会触发调度。\n所以B不是正确答案。\n\n✅ C. 在进程处于临界区时不能进行处理机调度 — 说法错误。\n进程在临界区时，仍然可以发生调度。\n临界区是访问共享资源的代码段，进程在临界区中时，如果时间片用完或者有更高优先级进程到达，仍然可以被调度。\n只是在临界区中不能被抢占的说法是错误的（可以被抢占，只要不破坏临界资源的互斥访问）。\n实际上，进程在临界区时是可以被调度切换的，只要切换出去的进程还没退出临界区，其他进程就不能进入同一个临界区。\n所以C的说法是错误的，C是正确答案。\n\n❌ D. 在系统调用完成并返回用户态时能进行处理机调度 — 说法正确。\n系统调用完成返回时，是调度的时机之一。\n所以D不是正确答案。\n\n【答案】C\n\n【补充说明】\n注意：题目问的是\"错误的是\"，要选说法错误的选项。\n\n进程在临界区时可以被调度：\n- 临界区是进程访问临界资源的代码段\n- 进程在临界区中时，如果时间片用完，可以被切换到就绪态\n- 只是其他进程不能进入同一个临界区（互斥）\n- 但调度本身是可以发生的\n\n不能进行调度的说法是错误的。"},
{id:202, type:"single", chapter:3, chapterName:"处理机调度", text:"下列各级调度中，发生频率最高的是( )。", options:[{letter:"A", text:"低级调度"}, {letter:"B", text:"中级调度"}, {letter:"C", text:"高级调度"}, {letter:"D", text:"三者发生频率相近"}], answer:"A", answerText:"", analysis:"【考察知识点】处理机调度 — 三级调度\n\n【选项分析】\n三级调度中，发生频率最高的是哪个？\n\n✅ A. 低级调度 — 正确。\n低级调度（进程调度）频率最高，频率是毫秒级的。\n\n❌ B. 中级调度 — 错误。\n中级调度（对换/交换调度）频率较低，是秒级的。\n\n❌ C. 高级调度 — 错误。\n高级调度（作业调度）频率最低，可能几分钟甚至几小时一次。\n\n❌ D. 三者发生频率相近 — 错误。\n\n【答案】A\n\n【补充说明】\n三级调度：\n1. 高级调度（作业调度/长程调度）：\n   - 决定把外存上的哪些作业调入内存\n   - 频率最低，几分钟到几小时一次\n   \n2. 中级调度（对换调度/中程调度）：\n   - 决定把哪些进程换出到外存，哪些换入内存\n   - 频率中等，几秒到几十秒一次\n   \n3. 低级调度（进程调度/短程调度）：\n   - 决定哪个就绪进程获得CPU\n   - 频率最高，几毫秒到几十毫秒一次\n\n频率：低级调度 > 中级调度 > 高级调度"},
{id:203, type:"single", chapter:3, chapterName:"处理机调度", text:"下列算法中，不可能导致饥饿现象的是（ ）。", options:[{letter:"A", text:"时间片轮转法"}, {letter:"B", text:"静态优先数调度"}, {letter:"C", text:"非抢占式短任务优先"}, {letter:"D", text:"抢占式短任务优先"}], answer:"A", answerText:"", analysis:"【考察知识点】处理机调度 — 饥饿现象\n\n【选项分析】\n哪个调度算法不可能导致饥饿现象？\n\n✅ A. 时间片轮转法 — 正确。\n时间片轮转中，每个进程轮流运行，每个进程都能得到CPU时间，不会饥饿。\n\n❌ B. 静态优先数调度 — 错误。\n静态优先级调度中，低优先级进程可能一直得不到运行，导致饥饿。\n\n❌ C. 非抢占式短任务优先 — 错误。\n短作业优先中，长作业可能一直被短作业插队，导致饥饿。\n\n❌ D. 抢占式短任务优先 — 错误。\n抢占式的更可能导致长作业饥饿。\n\n【答案】A\n\n【补充说明】\n饥饿（Starvation）：\n- 某个进程长期得不到资源（CPU），一直等待\n- 优先级调度、SJF等都可能导致饥饿\n\n不会导致饥饿的调度算法：\n- 时间片轮转：每个进程轮流运行，都有机会\n- 先来先服务：按顺序来，不会让后面的一直等（虽然等待时间可能长，但不会无限等）\n\n会导致饥饿的调度算法：\n- 静态优先级调度\n- 短作业优先（SJF）\n- 最短剩余时间优先（SRTF）"},
{id:204, type:"single", chapter:3, chapterName:"处理机调度", text:"下面的叙述中，正确的是（ ）。", options:[{letter:"A", text:"进程获得处理器运行是通过调度得到的"}, {letter:"B", text:"优先级是进程调度的重要依据，一旦确定不能改动"}, {letter:"C", text:"在单处理器系统中，任何时刻都只有一个进程处于运行态"}, {letter:"D", text:"进程申请处理器而得不到满足时，其状态变为阻塞态"}], answer:"A", answerText:"", analysis:"【考察知识点】处理机调度 — 综合概念\n\n【选项分析】\n哪个叙述是正确的？\n\n✅ A. 进程获得处理器运行是通过调度得到的 — 正确。\n进程通过调度程序的调度才能获得CPU运行。\n\n❌ B. 优先级是进程调度的重要依据，一旦确定不能改动 — 错误。\n优先级可以是动态的，可以根据情况调整（如动态优先级）。\n\n❌ C. 在单处理器系统中，任何时刻都只有一个进程处于运行态 — 错误。\n注意：\"任何时刻\"不对，因为可能没有进程在运行（如都在等待I/O），或者内核在运行。\n而且，严格来说，单处理器系统中，同一时刻最多只有一个进程在运行，但不是\"任何时刻都有\"。\n另外，还有内核线程等。\n不过这个选项有争议。\n\n❌ D. 进程申请处理器而得不到满足时，其状态变为阻塞态 — 错误。\n得不到CPU时是就绪态，不是阻塞态。阻塞态是等待I/O或事件。\n\n【答案】A\n\n【补充说明】\n进程调度：\n- 进程通过调度获得CPU\n- 就绪队列中的进程等待调度\n- 调度程序选择一个进程，把CPU分配给它\n\n注意：\n- 优先级可以是静态的，也可以是动态的\n- 单CPU系统中，最多只有一个进程在运行，但可能0个（都阻塞）\n- 得不到CPU是就绪态，不是阻塞态"},
{id:205, type:"single", chapter:3, chapterName:"处理机调度", text:"关于优先权大小的论述中，正确的是（ ）。", options:[{letter:"A", text:"计算型作业的优先权，应高于I/O型作业的优先权"}, {letter:"B", text:"用户进程的优先权，应高于系统进程的优先权"}, {letter:"C", text:"在动态优先权中，随着作业等待时间的增加，其优先权将随之下降"}, {letter:"D", text:"在动态优先权中，随着进程执行时间的增加，其优先权降低"}], answer:"D", answerText:"", analysis:"【考察知识点】处理机调度 — 动态优先级\n\n【选项分析】\n关于优先权大小的论述，正确的是？\n\n❌ A. 计算型作业的优先权，应高于I/O型作业的优先权 — 错误。\n应该是I/O型作业的优先权更高，这样可以让I/O设备尽早忙碌，提高资源利用率。\n\n❌ B. 用户进程的优先权，应高于系统进程的优先权 — 错误。\n系统进程的优先权通常更高，因为它们提供系统服务。\n\n❌ C. 在动态优先权中，随着作业等待时间的增加，其优先权将随之下降 — 错误。\n等待时间增加，优先权应该上升（这样不会饥饿）。\n\n✅ D. 在动态优先权中，随着进程执行时间的增加，其优先权降低 — 正确。\n动态优先级中，进程运行时间越长，优先级越低，这样可以让其他进程有机会运行。\n\n【答案】D\n\n【补充说明】\n动态优先级：\n- 进程的优先级随时间变化\n- 等待时间越长，优先级越高（防止饥饿）\n- 运行时间越长，优先级越低（防止一个进程长期占用CPU）\n\n这样的设计可以：\n- 防止饥饿\n- 提高公平性\n- 改善响应时间"},
{id:206, type:"single", chapter:3, chapterName:"处理机调度", text:"响应时间是衡量分时操作系统性能的重要指标，下列选项中，能够改善响应时间的是( )。", options:[{letter:"A", text:"允许用户修改系统时间"}, {letter:"B", text:"加大时间片"}, {letter:"C", text:"允许中断嵌套"}, {letter:"D", text:"采用非抢占式优先级调度"}], answer:"D", answerText:"", analysis:"【考察知识点】处理机调度 — 响应时间、分时系统\n\n【选项分析】\n题目问：能够改善响应时间的是（ ）。\n\n注意：这道题的原答案可能存在争议。我们来逐一分析：\n\n❌ A. 允许用户修改系统时间 — 错误。\n用户修改系统时间和响应时间无关。\n\n❌ B. 加大时间片 — 错误。\n加大时间片会使响应时间变长（响应时间 ≈ 用户数 × 时间片），不能改善。\n\n❌ C. 允许中断嵌套 — 错误。\n中断嵌套主要影响中断处理的及时性，和进程调度的响应时间关系不大。\n虽然中断嵌套可以让高优先级中断更快处理，但这不是改善响应时间的主要方法。\n\n❌ D. 采用非抢占式优先级调度 — 错误。\n非抢占式调度的响应时间比抢占式差，因为高优先级进程来了也不能抢占，要等当前进程运行完。\n抢占式优先级调度才能改善响应时间。\n\n【说明】\n这道题的选项设置可能存在问题。\n通常来说，改善响应时间的方法有：\n- 缩短时间片\n- 采用抢占式调度\n- 减少进程切换开销\n- 提高CPU速度\n\n如果非要选一个相对合理的，需要注意：\n- 非抢占式优先级调度不能改善响应时间\n- 加大时间片会使响应时间变差\n- 允许中断嵌套和响应时间关系不大\n\n建议：这道题需要结合具体教材理解。如果按原答案选D，请注意非抢占式调度通常不能改善响应时间，抢占式才可以。\n\n【答案】D（原答案，建议结合教材进一步确认）\n\n【补充说明】\n分时系统响应时间的影响因素：\n- 用户数：用户越多，响应时间越长\n- 时间片：时间片越大，响应时间越长\n- 切换开销：切换开销越大，响应时间越长\n- CPU速度：CPU越快，响应时间越短\n\n改善响应时间的方法：\n- 缩短时间片（但会增加切换开销）\n- 采用抢占式调度\n- 减少切换开销\n- 提高CPU性能"},
{id:207, type:"single", chapter:3, chapterName:"处理机调度", text:"操作系统中，很多事情会引起调度程序的运行，但下列事件不一定引起操作系统调度程序运行的是（ ）。", options:[{letter:"A", text:"当前运行着的进程出错"}, {letter:"B", text:"当前运行着的进程请求输入输出"}, {letter:"C", text:"有新的进程进入就绪状态"}, {letter:"D", text:"当前运行的进程时间片用完"}], answer:"C", answerText:"", analysis:"【考察知识点】处理机调度 — 进程调度的时机\n\n【选项分析】\n哪个事件不一定引起操作系统调度程序运行？\n\n❌ A. 当前运行着的进程出错 — 错误。\n进程出错终止，一定会引起调度（要选新进程运行）。\n\n❌ B. 当前运行着的进程请求输入输出 — 错误。\n进程请求I/O会进入阻塞态，一定会引起调度。\n\n✅ C. 有新的进程进入就绪状态 — 正确。\n新进程进入就绪态，不一定会引起调度。\n在非抢占式系统中，新进程进入就绪态不会触发调度，要等当前进程主动放弃CPU。\n在抢占式系统中，如果新进程优先级更高，才会触发调度。\n所以\"不一定\"引起调度。\n\n❌ D. 当前运行的进程时间片用完 — 错误。\n时间片用完，一定会引起调度。\n\n【答案】C\n\n【补充说明】\n一定会引起调度的情况：\n- 进程结束\n- 进程阻塞\n- 时间片用完\n\n不一定引起调度的情况：\n- 新进程进入就绪态（非抢占式不会，抢占式要看优先级）\n- 进程从阻塞变就绪（非抢占式不会，抢占式要看优先级）\n\n在非抢占式系统中，只有当前进程主动放弃CPU时才会调度。"},
{id:208, type:"single", chapter:3, chapterName:"处理机调度", text:"（2017）下列有关基于时间片的进程调度的叙述中，错误的是（）。", options:[{letter:"A", text:"时间片越短，进程切换的次数越多， 系统开销也越大"}, {letter:"B", text:"当前进程的时间片用完后，该进程状态由执行态变为阻塞态"}, {letter:"C", text:"时钟中断发生后，系统会修改当前进程在时间片内的剩余时间"}, {letter:"D", text:"影响时间片大小的主要因素包括响应时间、系统开销和进程数量等"}], answer:"B", answerText:"", analysis:"【考察知识点】处理机调度 — 时间片轮转\n\n【选项分析】\n题目问：关于基于时间片的进程调度的叙述中，错误的是（ ）。\n即找错误的说法。\n\n❌ A. 时间片越短，进程切换的次数越多，系统开销也越大 — 说法正确。\n时间片短，切换频繁，开销大。\n所以A不是正确答案。\n\n✅ B. 当前进程的时间片用完后，该进程状态由执行态变为阻塞态 — 说法错误。\n时间片用完后，进程从执行态变为就绪态，不是阻塞态。\n阻塞态是等待I/O或事件时的状态。\n所以B是正确答案（题目要选错误的叙述）。\n\n❌ C. 时钟中断发生后，系统会修改当前进程在时间片内的剩余时间 — 说法正确。\n时钟中断用于计时，每次时钟中断会更新剩余时间。\n所以C不是正确答案。\n\n❌ D. 影响时间片大小的主要因素包括响应时间、系统开销和进程数量等 — 说法正确。\n这些都是影响时间片大小的因素。\n所以D不是正确答案。\n\n【答案】B\n\n【补充说明】\n注意：题目问的是\"错误的是\"，要选说法错误的选项。\n\n时间片用完后，进程的状态变化：\n运行态 → 就绪态（不是阻塞态）\n\n进程状态变化：\n- 运行 → 就绪：时间片用完、被抢占\n- 运行 → 阻塞：等待I/O、等待事件\n- 就绪 → 运行：被调度\n- 阻塞 → 就绪：等待的事件发生了"},
{id:209, type:"single", chapter:3, chapterName:"处理机调度", text:"在非剥夺调度方式下，必定会引起进程调度的情况是( )。", options:[{letter:"A", text:"一个新进程被创建"}, {letter:"B", text:"一个进程从执行态进入阻塞态"}, {letter:"C", text:"一个进程从阻塞态进入就绪态"}, {letter:"D", text:"一个进程从就绪态进入阻塞态"}], answer:"B", answerText:"", analysis:"【考察知识点】处理机调度 — 非抢占式调度\n\n【选项分析】\n在非剥夺（非抢占）调度方式下，必定会引起进程调度的情况是？\n\n❌ A. 一个新进程被创建 — 错误。\n非抢占式中，新进程创建不会引起调度，要等当前进程主动放弃CPU。\n\n✅ B. 一个进程从执行态进入阻塞态 — 正确。\n进程从执行态进入阻塞态，说明它主动放弃了CPU，此时一定会调度新进程。\n\n❌ C. 一个进程从阻塞态进入就绪态 — 错误。\n非抢占式中，进程从阻塞变就绪不会引起调度，要等当前进程主动放弃。\n\n❌ D. 一个进程从就绪态进入阻塞态 — 错误。\n就绪态的进程不能直接进入阻塞态，它还没运行呢，怎么会阻塞？\n\n【答案】B\n\n【补充说明】\n非抢占式调度中，只有当前进程主动放弃CPU时才会调度：\n- 进程执行结束\n- 进程请求I/O进入阻塞态\n- 进程等待某个事件进入阻塞态\n\n不会引起调度的情况：\n- 新进程创建\n- 进程从阻塞态变为就绪态\n- 有更高优先级进程进入就绪态\n\n这些情况在抢占式调度中可能会引起调度，但非抢占式不会。"},
{id:210, type:"single", chapter:3, chapterName:"处理机调度", text:"现有3个同时到达的作业J1、J2和J3，它们的执行时间分别为T1、T2和T3，且T1<T2<T3。系统按单道方式运行且采用短作业优先算法，则平均周转时间是（ ）。", options:[{letter:"A", text:"T1+T2+T3"}, {letter:"B", text:"(T1+T2+T3)/3"}, {letter:"C", text:"(3T1+2T2+T3)/3"}, {letter:"D", text:"(T1+2T2+3T3)/3"}], answer:"C", answerText:"", analysis:"【考察知识点】处理机调度 — 短作业优先、平均周转时间\n\n【已知条件】\n- 3个作业同时到达\n- 执行时间：T1 < T2 < T3\n- 单道方式，短作业优先\n\n【解题步骤】\n短作业优先的执行顺序：J1 → J2 → J3\n\n各作业的周转时间：\n- J1：T1（等待0，运行T1）\n- J2：T1 + T2（等待T1，运行T2）\n- J3：T1 + T2 + T3（等待T1+T2，运行T3）\n\n平均周转时间 = (T1 + (T1+T2) + (T1+T2+T3)) / 3\n              = (3T1 + 2T2 + T3) / 3\n\n【答案】C（(3T1+2T2+T3)/3）\n\n【补充说明】\n短作业优先（SJF）的平均周转时间最短。\n\n公式：\n对于n个同时到达的作业，运行时间t1 < t2 < ... < tn\n平均周转时间 = (n×t1 + (n-1)×t2 + ... + 1×tn) / n\n\n对于3个作业：\n平均周转时间 = (3T1 + 2T2 + T3) / 3"},
{id:211, type:"single", chapter:3, chapterName:"处理机调度", text:"系统采用二级反馈队列调度算法进行进程调度。就绪队列Q1采用时间片轮转调度算法，时间片为10ms；就绪队列Q2采用短进程优先调度算法；系统优先调度Q1队列中的进程，当Q1为空时系统才会调度Q2中的进程；新创建的进程首先进入Q1；Q1中的进程执行一个时间片后，若未结束，则转入Q2。若当前Q1，Q2为空，系统依次创建进程P1，P2后即开始进程调度，P1，P2需要的CPU时间分别为30ms和20ms，则进程P1，P2在系统中的平均等待时间为（ ）。", options:[{letter:"A", text:"25ms"}, {letter:"B", text:"20ms"}, {letter:"C", text:"15ms"}, {letter:"D", text:"10ms"}], answer:"C", answerText:"", analysis:"【考察知识点】处理机调度 — 多级反馈队列、等待时间\n\n【已知条件】\n- 二级反馈队列：Q1（时间片10ms，时间片轮转）、Q2（短进程优先）\n- 优先调度Q1，Q1为空才调度Q2\n- 新进程先进入Q1\n- Q1中进程执行一个时间片未结束，转入Q2\n- 当前Q1、Q2为空\n- 依次创建P1、P2后开始调度\n- P1需要CPU时间：30ms\n- P2需要CPU时间：20ms\n\n【解题步骤】\n注意：\"依次创建进程P1，P2后即开始进程调度\"\n所以P1先创建，然后P2创建，然后开始调度。\n\n开始调度时，Q1中有P1和P2（按创建顺序，P1在前，P2在后？）\n不对，\"依次创建\"，P1先创建进入Q1，然后P2创建进入Q1队尾。\n所以Q1队列：P1 → P2\n\nQ1是时间片轮转，时间片10ms。\n\n第一轮：\n- P1运行10ms，还剩20ms，转入Q2\n- P2运行10ms，还剩10ms，转入Q2\n\nQ1为空了，开始调度Q2。\nQ2是短进程优先。\nQ2中有P1（还需20ms）和P2（还需10ms）。\n短进程优先，所以P2先运行。\n\n- P2运行10ms，完成\n- P1运行20ms，完成\n\n现在计算等待时间：\n等待时间 = 周转时间 - 运行时间\n\n先算周转时间：\nP1的完成时间：\n- 0~10ms：P1运行（Q1）\n- 10~20ms：P2运行（Q1）\n- 20~30ms：P2运行（Q2）\n- 30~50ms：P1运行（Q2）\nP1完成时间：50ms\nP1周转时间：50ms\nP1等待时间：50 - 30 = 20ms？不对\n\n等等，让我重新算：\nP1：\n- 0~10ms：运行10ms（第一次运行）\n- 然后等待，直到30ms才再次运行\n- 30~50ms：运行20ms\n- 等待时间 = 10ms（第一次运行前等了0？不对，P1是第一个，从0开始运行）\n\n等等，等待时间是指在就绪队列中等待的时间。\nP1：\n- 0时刻：进入Q1，等待时间0，立即运行\n- 10ms：时间片用完，进入Q2，开始等待\n- 10~20ms：等待（P2在Q1运行）\n- 20~30ms：等待（P2在Q2运行）\n- 30ms：开始运行\n- 等待时间 = (10到30) = 20ms？\n不对，还有没有其他等待？\n\nP1总共运行了30ms，周转时间是50ms，\n所以等待时间 = 50 - 30 = 20ms。\n\nP2：\n- 0时刻？不对，P2是后创建的。\n  题目说\"依次创建进程P1，P2后即开始进程调度\"\n  意思是创建完两个之后才开始调度。\n  所以P1和P2都是在0时刻就已经在就绪队列了？\n  不对，\"依次创建\"，但创建完才开始调度，所以它们的等待时间都从0开始算？\n  \n  让我重新理解：\n  \"系统依次创建进程P1，P2后即开始进程调度\"\n  意思是：先创建P1，再创建P2，然后开始调度。\n  创建的时间很短，可以忽略，所以两个进程几乎同时到达。\n  \n  P2的周转时间：\n  - 0~10ms：等待（P1运行）\n  - 10~20ms：运行10ms（Q1）\n  - 20~30ms：运行10ms（Q2）\n  - 30ms时完成\n  周转时间：30ms\n  等待时间：30 - 20 = 10ms\n\n平均等待时间 = (20 + 10) / 2 = 15ms\n\n【答案】C（15ms）\n\n【补充说明】\n多级反馈队列调度：\n- 多个队列，优先级不同\n- 新进程进入高优先级队列\n- 时间片用完没完成，降到低一级队列\n- 高优先级队列为空才调度低优先级队列\n\n等待时间 = 周转时间 - 运行时间"},
{id:212, type:"single", chapter:3, chapterName:"处理机调度", text:"假设系统采用多级反馈队列调度算法，系统中设置了三个不同优先级的队列A、B和C，优先级A>B>C，A的时间片为10ms，B的时间片为20ms，C的时间片为30ms。当t=0时，进程P1到达，P1所需的运行时间为90ms;当t=30ms时，进程P2到达，P2所需的运行时间为30ms，不考虑任何其他系统开销，进程P1的周转时间为()", options:[{letter:"A", text:"90ms"}, {letter:"B", text:"100ms"}, {letter:"C", text:"110ms"}, {letter:"D", text:"120ms"}], answer:"D", answerText:"", analysis:"【考察知识点】处理机调度 — 多级反馈队列、周转时间\n\n【已知条件】\n- 三级反馈队列：A（优先级最高，时间片10ms）、B（时间片20ms）、C（时间片30ms）\n- 优先级：A > B > C\n- t=0时，P1到达，运行时间90ms\n- t=30ms时，P2到达，运行时间30ms\n\n【解题步骤】\n我们用甘特图分析：\n\nt=0：P1到达，进入A队列\n0~10ms：P1运行（A队列，时间片10ms），还剩80ms，降到B队列\n\nt=10ms：A队列空了，调度B队列\n10~30ms：P1运行（B队列，时间片20ms），还剩60ms，降到C队列\n\nt=30ms：P2到达，进入A队列\nA队列优先级高于C，所以抢占P1，运行P2\n30~40ms：P2运行（A队列，时间片10ms），还剩20ms，降到B队列\n\nt=40ms：A队列空了，看B队列\nB队列有P2（还剩20ms）\n40~60ms：P2运行（B队列，时间片20ms），刚好运行完\nP2完成时间：60ms\n\nt=60ms：A、B队列都空了，调度C队列\nC队列有P1（还剩60ms）\n60~90ms：P1运行（C队列，时间片30ms），还剩30ms\n90~120ms：P1继续运行（C队列，再一个时间片30ms），运行完\nP1完成时间：120ms\n\nP1的周转时间 = 120 - 0 = 120ms\n\n【答案】D（120ms）\n\n【补充说明】\n多级反馈队列调度：\n- 新进程进入最高优先级队列\n- 时间片用完没完成，降到下一级队列\n- 高优先级队列空了才调度低优先级队列\n- 有新进程进入高优先级队列时，抢占低优先级队列的进程\n\n注意：P2在t=30ms到达，进入最高优先级的A队列，\n所以会抢占正在C队列运行的P1。"},
{id:213, type:"single", chapter:3, chapterName:"处理机调度", text:"有5个批处理作业A、B、C、D、E几乎同时到达，其预计运行时间分别为10、6、2、4、8，其优先级(由外部设定)分别为3、5、2、1、4，这里5为最高优先级。以下各种调度算法中，平均周转时间为14的是()调度算法", options:[{letter:"A", text:"时间片轮转(时间片为1)"}, {letter:"B", text:"优先级调度"}, {letter:"C", text:"先来先服务(按照顺序10、6、2、4、8)"}, {letter:"D", text:"短作业优先"}], answer:"D", answerText:"", analysis:"【考察知识点】处理机调度 — 短作业优先、平均周转时间\n\n【已知条件】\n- 5个作业几乎同时到达\n- 运行时间：A=10, B=6, C=2, D=4, E=8\n- 优先级：3, 5, 2, 1, 4（5为最高）\n- 问哪种调度算法的平均周转时间为14\n\n【解题步骤】\n我们计算短作业优先（SJF）的平均周转时间：\n\nSJF按运行时间排序：C(2) < D(4) < B(6) < E(8) < A(10)\n\n执行顺序：C → D → B → E → A\n\n各作业周转时间：\n- C：2\n- D：2+4 = 6\n- B：2+4+6 = 12\n- E：2+4+6+8 = 20\n- A：2+4+6+8+10 = 30\n\n平均周转时间 = (2 + 6 + 12 + 20 + 30) / 5 = 70 / 5 = 14\n\n正好是14，所以是短作业优先。\n\n【答案】D（短作业优先）\n\n【补充说明】\n短作业优先（SJF）的平均周转时间最短。\n\n验证：\n- 时间片轮转（时间片1）：平均周转时间会比14大\n- 优先级调度：按优先级5,4,3,2,1即B,E,A,C,D，周转时间分别是6,14,24,26,30，平均(6+14+24+26+30)/5=100/5=20，不是14\n- 先来先服务（10,6,2,4,8）：周转时间10,16,18,22,30，平均(10+16+18+22+30)/5=96/5=19.2，不是14\n\n所以答案是短作业优先。"},
{id:214, type:"single", chapter:3, chapterName:"处理机调度", text:"使用抢占式最短剩余时间优先调度算法对下列进程进行调度，总周转时间是()|进程名|到达时间|运行时间||---|---|---||P1|0|3||P2|1|1||P3|2|4||P4|3|5||P5|4|2|", options:[{letter:"A", text:"25h"}, {letter:"B", text:"26h"}, {letter:"C", text:"27h"}, {letter:"D", text:"28h"}], answer:"C", answerText:"", analysis:"【考察知识点】处理机调度 — 抢占式最短剩余时间优先、总周转时间\n\n【已知条件】\n- 抢占式最短剩余时间优先（SRTF）\n- 进程信息：\n  - P1：到达0，运行3\n  - P2：到达1，运行1\n  - P3：到达2，运行4\n  - P4：到达3，运行5\n  - P5：到达4，运行2\n\n【解题步骤】\n我们用甘特图分析：\n\n0ms：只有P1，P1运行\n0~1ms：P1运行，剩余2\n\n1ms：P2到达，运行时间1 < P1剩余2，抢占\n1~2ms：P2运行，P2完成（运行1ms）\n\n2ms：P3到达，运行4。此时就绪队列：P1（剩2）、P3（4）。P1剩余时间短，P1继续运行\n2~3ms：P1运行，剩余1\n\n3ms：P4到达，运行5。P1剩余1 < 5，P1继续\n3~4ms：P1运行，剩余0，P1完成\n\n4ms：P5到达，运行2。此时就绪队列：P3（4）、P4（5）、P5（2）。P5剩余时间最短\n4~6ms：P5运行，P5完成\n\n6ms：就绪队列：P3（4）、P4（5）。P3剩余时间短\n6~10ms：P3运行，P3完成\n\n10ms：只有P4\n10~15ms：P4运行，P4完成\n\n各进程周转时间：\n- P1：4 - 0 = 4\n- P2：2 - 1 = 1\n- P3：10 - 2 = 8\n- P4：15 - 3 = 12\n- P5：6 - 4 = 2\n\n总周转时间 = 4 + 1 + 8 + 12 + 2 = 27\n\n【答案】C（27h）\n\n【补充说明】\n最短剩余时间优先（SRTF）是抢占式的短作业优先。\n每当有新进程到达时，比较新进程的运行时间和当前进程的剩余运行时间，\n如果新进程更短，就抢占。\n\n周转时间 = 完成时间 - 到达时间"},
{id:215, type:"single", chapter:3, chapterName:"处理机调度", text:"【2022统考真题】进程P0、P1、P2和P3进入就绪队列的时刻、优先级(值越小优先权越高)及CPU执行时间如下表所示。|进程名|进入就绪队列的时刻|优先级|CPU执行时间||---|---|---|---||P0|0ms|15|100ms||P1|10ms|20|60ms||P2|10ms|10|20ms||P3|15ms|6|10ms|若系统采用基于优先权的抢占式进程调度算法，则从0ms时刻开始调度，到4个进程都运行结束为止，发生进程调度的总次数为()", options:[{letter:"A", text:"4"}, {letter:"B", text:"5"}, {letter:"C", text:"6"}, {letter:"D", text:"7"}], answer:"C", answerText:"", analysis:"【考察知识点】处理机调度 — 抢占式优先级调度、调度次数\n\n【已知条件】\n- 抢占式，优先级值越小优先权越高\n- 进程信息：\n  - P0：0ms到达，优先级15，运行100ms\n  - P1：10ms到达，优先级20，运行60ms\n  - P2：10ms到达，优先级10，运行20ms\n  - P3：15ms到达，优先级6，运行10ms\n\n【解题步骤】\n我们分析调度过程，统计调度次数：\n\n0ms：只有P0，第1次调度，P0运行\n0~10ms：P0运行\n\n10ms：P1、P2到达。P2优先级10 < P0优先级15，P2抢占\n第2次调度，P2运行\n10~15ms：P2运行\n\n15ms：P3到达。P3优先级6 < P2优先级10，P3抢占\n第3次调度，P3运行\n15~25ms：P3运行\n25ms：P3完成\n\n25ms：回到就绪队列，P2优先级10最高\n第4次调度，P2运行\n25~35ms：P2运行（还剩20-5=15ms？不对，P2从10到15运行了5ms，还剩15ms）\n等等，P2运行时间是20ms，从10到15运行了5ms，还剩15ms。\n25~40ms：P2运行15ms，完成\n40ms：P2完成\n\n40ms：就绪队列中P0优先级15 < P1优先级20（注意：值越小优先级越高）\n所以P0优先级更高。\n第5次调度，P0运行\n40~140ms：P0运行（还剩100-10=90ms？不对，P0从0到10运行了10ms，还剩90ms）\n40~130ms：P0运行90ms，完成\n130ms：P0完成\n\n130ms：只有P1了\n第6次调度，P1运行\n130~190ms：P1运行60ms，完成\n\n总共调度了6次。\n\n【答案】C（6）\n\n【补充说明】\n注意：优先级值越小优先权越高。\n\n调度次数统计：\n每次选择一个新进程运行，就算一次调度。\n包括：\n- 最开始的调度\n- 抢占时的调度\n- 进程完成后的调度\n\n这道题是2022年统考真题。"},
{id:216, type:"single", chapter:3, chapterName:"处理机调度", text:"【2023统考真题】进程P1、P2和P3进入就绪队列的时刻、优先级(值越大优先权越高)和CPU执行时间如下表所示。|进程名|进入就绪队列的时刻|优先级|CPU执行时间||---|---|---|---||P1|0ms|1|60ms||P2|20ms|10|42ms||P3|30ms|100|13ms|若系统采用基于优先权的抢占式CPU调度算法，从0ms时刻开始进行调度，则P1、P2和P3的平均周转时间为()", options:[{letter:"A", text:"60ms"}, {letter:"B", text:"61ms"}, {letter:"C", text:"70ms"}, {letter:"D", text:"71ms"}], answer:"B", answerText:"", analysis:"【考察知识点】处理机调度 — 抢占式优先级调度、平均周转时间\n\n【已知条件】\n- 抢占式，优先级值越大优先权越高\n- 进程信息：\n  - P1：0ms到达，优先级1，运行60ms\n  - P2：20ms到达，优先级10，运行42ms\n  - P3：30ms到达，优先级100，运行13ms\n\n【解题步骤】\n我们用甘特图分析：\n\n0ms：只有P1，P1运行\n0~20ms：P1运行\n\n20ms：P2到达，优先级10 > P1的1，抢占\n20~30ms：P2运行\n\n30ms：P3到达，优先级100 > P2的10，抢占\n30~43ms：P3运行（13ms）\n43ms：P3完成\n\n43ms：回到P2（优先级10）\n43~75ms：P2运行（还剩42-10=32ms）\n75ms：P2完成\n\n75ms：回到P1（优先级1）\n75~135ms：P1运行（还剩60-20=40ms）\n135ms：P1完成\n\n各进程周转时间：\n- P1：135 - 0 = 135ms\n- P2：75 - 20 = 55ms\n- P3：43 - 30 = 13ms\n\n平均周转时间 = (135 + 55 + 13) / 3 = 203 / 3 ≈ 67.67？不对\n等等，答案是61ms。\n\n让我重新算：\nP1：0~20运行了20ms，还剩40ms\n75ms时开始继续运行，75+40=115ms完成\nP1周转时间：115 - 0 = 115ms\n\nP2：20~30运行了10ms，还剩32ms\n43ms时继续运行，43+32=75ms完成\nP2周转时间：75 - 20 = 55ms\n\nP3：30~43运行，13ms完成\nP3周转时间：43 - 30 = 13ms\n\n平均 = (115 + 55 + 13) / 3 = 183 / 3 = 61ms\n\n对，是61ms。\n\n【答案】B（61ms）\n\n【补充说明】\n这是2023年统考真题。\n注意：优先级值越大优先权越高。\n\n周转时间 = 完成时间 - 到达时间\n平均周转时间 = 各进程周转时间之和 / 进程数"},
{id:217, type:"essay", chapter:3, chapterName:"处理机调度", text:"某系统中进程调度采用“时间片轮转”的策略，每个进程得到的时间片可随进程执行情况而变化。若进程经常提出I/O请求，则给它分配较短的时间片，若进程提出I/O请求的次数很少，则分给一个较长的时间片，请解释为什么要这样做？", options:[], answer:"", answerText:"经常提出I/O请求的进程连续占用处理器的时间较短,即使给它较长的时间片，它也可能在时间片未用完之前主动让出处理器，故只需较短时间片。这样可以提高系统资源利用率。提出I/O请求次数很少的进程需要较长时间的连续运行，给它较长的时间片可减少进程调度次数从而减少系统开销。", analysis:"【题型】应用题\n【章节】处理机调度\n\n【参考答案】\n经常提出I/O请求的进程连续占用处理器的时间较短,即使给它较长的时间片，它也可能在时间片未用完之前主动让出处理器，故只需较短时间片。这样可以提高系统资源利用率。提出I/O请求次数很少的进程需要较长时间的连续运行，给它较长的时间片可减少进程调度次数从而减少系统开销。\n\n【解题思路】\n本题考查处理机调度的综合应用能力。解答此类题目时，需要：\n1. 仔细阅读题目，理解问题背景和已知条件；\n2. 回忆相关知识点，确定适用的原理、算法或公式；\n3. 按照逻辑步骤进行分析和计算；\n4. 最终给出清晰、完整的答案。\n\n建议动手画图辅助分析，注意检查计算过程和单位。"},
{id:218, type:"essay", chapter:3, chapterName:"处理机调度", text:"设有一组进程，它们的到达时间、需要占用CPU的时间及优先级如下表所示，分别采用先来先服务调度算法（FCFS）、短作业优先（SJF）调度算法和非抢占式优先权（数值小的优先权大），求平均周转时间是多少？平均带权周转时间是多少？进程到达时间CPU时间优先级P13103P23.211P33.423P43.814P5452", options:[], answer:"", answerText:"（1）FCFS： 平均周转时间T=（10+10.8+12.6+13.2+18）/5=12.92 平均带权周转时间W=（1+10.8+6.3+13.2+3.6）/5=6.98（2）SJF： 平均周转时间T=(10+10.8+13.6+11.2+18)/5=12.72 平均带权周转时间W=(1+10.8+6.8+11.2+3.6)/5=6.68（3）非抢占式优先权： 平均周转时间T=(10+10.8+17.6+18.2+15)/5=14.32 平均带权周转时间W=(1+10.8+8.8+18.2+3)/5=8.36", analysis:"【题型】应用题\n【章节】处理机调度\n\n【参考答案】\n（1）FCFS： 平均周转时间T=（10+10.8+12.6+13.2+18）/5=12.92 平均带权周转时间W=（1+10.8+6.3+13.2+3.6）/5=6.98（2）SJF： 平均周转时间T=(10+10.8+13.6+11.2+18)/5=12.72 平均带权周转时间W=(1+10.8+6.8+11.2+3.6)/5=6.68（3）非抢占式优先权： 平均周转时间T=(10+10.8+17.6+18.2+15)/5=14.32 平均带权周转时间W=(1+10.8+8.8+18.2+3)/5=8.36\n\n【解题思路】\n本题考查处理机调度的综合应用能力。解答此类题目时，需要：\n1. 仔细阅读题目，理解问题背景和已知条件；\n2. 回忆相关知识点，确定适用的原理、算法或公式；\n3. 按照逻辑步骤进行分析和计算；\n4. 最终给出清晰、完整的答案。\n\n建议动手画图辅助分析，注意检查计算过程和单位。"},
{id:219, type:"essay", chapter:3, chapterName:"处理机调度", text:"有4个进程P1，P2，P3，P4，它们进入就绪队列的先后次序为P1，P2，P3，P4，它们的优先级和需要的处理机时间如表所示。假定这四个进程执行过程中不会发生等待事件，忽略进程调度所花费的时间，从某个时刻开始进程调度，请写出分别采用“先来先服务”、“非抢占式优先级”（固定优先级），“时间片轮转”（时间片大小为5）调度算法中进程的执行次序。计算各个进程在就绪队列中的等待时间以及平均等待时间。 进程 处理机时间 优先级 p1 8 3 p2 6 1 p3 22 5 p4 4 4", options:[], answer:"", answerText:"1）先来先服务算法 进程的执行顺序P1、P2、P3、P4； 进程P1等待时间为0； 进程P2等待时间为8； 进程P3等待时间为8＋6＝14； 进程P4等待时间为8＋6＋22＝36； 平均等待时间为（0+8+14+36）/4＝14.5 2）优先级算法 进程的执行顺序P3、P4、P1、P2； 进程P1等待时间为4+22＝26； 进程P2等待时间为22+4+8＝34； 进程P3等待时间为0； 进程P4等待时间为22； 平均等待时间为（26+34+0+22）/4＝20.5 3）时间片轮转算法 进程的执行顺序P1、P2、P3、P4、P1、P2、P3、P3、P3、P3； 进程P1等待时间为0＋（5＋5＋4）＝14； 进程P2等待时间为5＋（5＋4＋3）＝17； 进程P3等待时间为（5＋5）＋（4＋3＋1）＝18； 进程P4等待时间为5＋5＋5＝15； 平均等待时间为（14+17+18+15）/4＝16", analysis:"【题型】应用题\n【章节】处理机调度\n\n【参考答案】\n1）先来先服务算法 进程的执行顺序P1、P2、P3、P4； 进程P1等待时间为0； 进程P2等待时间为8； 进程P3等待时间为8＋6＝14； 进程P4等待时间为8＋6＋22＝36； 平均等待时间为（0+8+14+36）/4＝14.5 2）优先级算法 进程的执行顺序P3、P4、P1、P2； 进程P1等待时间为4+22＝26； 进程P2等待时间为22+4+8＝34； 进程P3等待时间为0； 进程P4等待时间为22； 平均等待时间为（26+34+0+22）/4＝20.5 3）时间片轮转算法 进程的执行顺序P1、P2、P3、P4、P1、P2、P3、P3、P3、P3； 进程P1等待时间为0＋（5＋5＋4）＝14； 进程P2等待时间为5＋（5＋4＋3）＝17； 进程P3等待时间为（5＋5）＋（4＋3＋1）＝18； 进程P4等待时间为5＋5＋5＝15； 平均等待时间为（14+17+18+15）/4＝16\n\n【解题思路】\n本题考查处理机调度的综合应用能力。解答此类题目时，需要：\n1. 仔细阅读题目，理解问题背景和已知条件；\n2. 回忆相关知识点，确定适用的原理、算法或公式；\n3. 按照逻辑步骤进行分析和计算；\n4. 最终给出清晰、完整的答案。\n\n建议动手画图辅助分析，注意检查计算过程和单位。"},
{id:220, type:"essay", chapter:3, chapterName:"处理机调度", text:"某进程调度程序采用基于优先数（priority）的调度策略，即选择优先数最小的进程运行，进程创建时由用户指定一个nice作为静态优先数。为了动态调整优先数，引入运行时间cpuTime和等待时间waitTime，初值均为0。进程处于执行态时，cpuTime定时加1，且waitTime置0；进程处于就绪态时，cpuTime置0，waitTime定时加1。请回答下列问题：1）若调度程序只将nice的值作为优先数，即priority=nice，则可能会出现饥饿现象。为什么？2）使用nice，cpuTime和waitTime设计一种动态优先数计算方法，以避免产生饥饿现象，并说明waitTime的作用。", options:[], answer:"", answerText:"1）由于采用了静态优先数，当就绪队列中总有优先数较小的进程时，优先数较大的进程一直没有机会运行，因而会出现饥饿现象。2）优先数priority的计算公式为priority=nice+k1*cpuTime-k2*waitTime，其中k1>0，k2>0，用于分别调整cpuTime和waitTime在priority中所占的比例。waitTime可使长时间等待的进程优先数减少，从而避免出现饥饿现象。", analysis:"【题型】应用题\n【章节】处理机调度\n\n【参考答案】\n1）由于采用了静态优先数，当就绪队列中总有优先数较小的进程时，优先数较大的进程一直没有机会运行，因而会出现饥饿现象。2）优先数priority的计算公式为priority=nice+k1*cpuTime-k2*waitTime，其中k1>0，k2>0，用于分别调整cpuTime和waitTime在priority中所占的比例。waitTime可使长时间等待的进程优先数减少，从而避免出现饥饿现象。\n\n【解题思路】\n本题考查处理机调度的综合应用能力。解答此类题目时，需要：\n1. 仔细阅读题目，理解问题背景和已知条件；\n2. 回忆相关知识点，确定适用的原理、算法或公式；\n3. 按照逻辑步骤进行分析和计算；\n4. 最终给出清晰、完整的答案。\n\n建议动手画图辅助分析，注意检查计算过程和单位。"},
{id:221, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"下列关于父进程和子进程的叙述中，错误的是（ ）。", options:[{letter:"A", text:"父进程与子进程可以并发执行"}, {letter:"B", text:"父进程与子进程共享虚拟地址空间"}, {letter:"C", text:"父进程与子进程有不同的进程控制块"}, {letter:"D", text:"父进程与子进程不能同时使用同一临界资源"}], answer:"B", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 父进程与子进程\n\n【选项分析】\n题目问：关于父进程和子进程的叙述中，错误的是（ ）。\n即找错误的说法。\n\n❌ A. 父进程与子进程可以并发执行 — 说法正确。\n父进程和子进程是两个独立的进程，可以并发执行。\n所以A不是正确答案。\n\n✅ B. 父进程与子进程共享虚拟地址空间 — 说法错误。\nfork创建子进程时，子进程会复制父进程的地址空间（写时复制），但它们有各自独立的虚拟地址空间，不是共享的。\n线程才共享地址空间，进程不共享。\n所以B是正确答案（题目要选错误的叙述）。\n\n❌ C. 父进程与子进程有不同的进程控制块 — 说法正确。\n每个进程都有自己的PCB。\n所以C不是正确答案。\n\n❌ D. 父进程与子进程不能同时使用同一临界资源 — 说法正确。\n临界资源需要互斥访问，父子进程也不能同时使用。\n所以D不是正确答案。\n\n【答案】B\n\n【补充说明】\n注意：题目问的是\"错误的是\"，要选说法错误的选项。\n\nfork创建子进程：\n- 子进程复制父进程的地址空间（写时复制）\n- 父子进程有各自独立的地址空间\n- 它们可以并发执行\n- 每个进程有自己的PCB\n\n线程共享进程的地址空间，进程之间不共享地址空间。"},
{id:222, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"若某单处理器多进程系统中有多个就绪态进程，则下列关于处理机调度的叙述中，错误的是( )。", options:[{letter:"A", text:"在进程结束时能进行处理机调度"}, {letter:"B", text:"创建新进程后能进行处理机调度"}, {letter:"C", text:"在进程处于临界区时不能进行处理机调度"}, {letter:"D", text:"在系统调用完成并返回用户态时能进行处理机调度"}], answer:"C", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 进程调度的时机、临界区\n\n【选项分析】\n题目问：关于处理机调度的叙述中，错误的是（ ）。\n即找错误的说法。\n\n❌ A. 在进程结束时能进行处理机调度 — 说法正确。\n进程结束，CPU空闲，需要调度。\n所以A不是正确答案。\n\n❌ B. 创建新进程后能进行处理机调度 — 说法正确。\n新进程进入就绪队列，抢占式系统中可能触发调度。\n所以B不是正确答案。\n\n✅ C. 在进程处于临界区时不能进行处理机调度 — 说法错误。\n进程在临界区时可以被调度（时间片用完、抢占等）。\n只是其他进程不能进入同一个临界区，但调度本身是可以发生的。\n所以C是正确答案（题目要选错误的叙述）。\n\n❌ D. 在系统调用完成并返回用户态时能进行处理机调度 — 说法正确。\n系统调用返回时是调度的时机之一。\n所以D不是正确答案。\n\n【答案】C\n\n【补充说明】\n注意：题目问的是\"错误的是\"，要选说法错误的选项。\n\n进程在临界区时可以被调度：\n- 临界区是访问临界资源的代码段\n- 进程在临界区中时，如果时间片用完，可以被切换出去\n- 只是其他进程不能进入同一个临界区（互斥）\n- 但调度本身是可以发生的\n\n不能进行调度的说法是错误的。"},
{id:223, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"（ ）是操作系统中最重要、最基本的概念之一，它是系统分配资源的基本单位，是一个具有独立功能的程序段对某个数据集的一次执行活动。", options:[{letter:"A", text:"程序"}, {letter:"B", text:"作业"}, {letter:"C", text:"进程"}, {letter:"D", text:"线程"}], answer:"C", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 进程的概念\n\n【选项分析】\n什么是操作系统中最重要、最基本的概念之一，是系统分配资源的基本单位？\n\n❌ A. 程序 — 错误。程序是静态的，不是资源分配单位。\n\n❌ B. 作业 — 错误。作业是用户提交的任务，不是资源分配的基本单位。\n\n✅ C. 进程 — 正确。进程是操作系统中最重要、最基本的概念之一，是系统分配资源的基本单位。\n\n❌ D. 线程 — 错误。线程是调度的基本单位，不是资源分配的基本单位。\n\n【答案】C\n\n【补充说明】\n进程的定义：\n进程是程序在一个数据集合上的运行过程，是系统进行资源分配和调度的一个独立单位。\n\n进程是资源分配的基本单位。\n线程是CPU调度的基本单位。"},
{id:224, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"下列关于进程和线程的叙述中，正确的是（ ）。", options:[{letter:"A", text:"不管系统是否支持线程，进程都是资源分配的基本单位。"}, {letter:"B", text:"线程是资源分配的基本单位，进程是调度的基本单位。"}, {letter:"C", text:"系统级线程和用户级线程的切换都需要内核的支持。"}, {letter:"D", text:"同一进程中的各个线程拥有各自不同的地址空间。"}], answer:"A", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 进程与线程\n\n【选项分析】\n关于进程和线程的叙述，正确的是？\n\n✅ A. 不管系统是否支持线程，进程都是资源分配的基本单位。 — 正确。\n进程始终是资源分配的基本单位，线程不拥有资源（或只拥有少量资源）。\n\n❌ B. 线程是资源分配的基本单位，进程是调度的基本单位。 — 错误。\n说反了。进程是资源分配的基本单位，线程是调度的基本单位。\n\n❌ C. 系统级线程和用户级线程的切换都需要内核的支持。 — 错误。\n用户级线程的切换不需要内核支持，在用户态就可以完成。\n\n❌ D. 同一进程中的各个线程拥有各自不同的地址空间。 — 错误。\n同一进程中的线程共享地址空间。\n\n【答案】A\n\n【补充说明】\n进程 vs 线程：\n- 进程：资源分配的基本单位，有独立的地址空间\n- 线程：CPU调度的基本单位，共享进程的地址空间\n\n用户级线程 vs 内核级线程：\n- 用户级线程：线程管理在用户态，切换不需要内核支持，速度快，但一个线程阻塞整个进程阻塞\n- 内核级线程：线程管理在内核态，切换需要内核支持，速度慢，但一个线程阻塞不影响其他线程"},
{id:225, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"与内核态线程相比，用户态线程的优点不包括（ ）。", options:[{letter:"A", text:"线程切换不需要转换到内核空间"}, {letter:"B", text:"可以采用定制的调度算法"}, {letter:"C", text:"可以避免系统调用引起进程阻塞"}, {letter:"D", text:"实现与操作系统平台无关"}], answer:"C", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 用户级线程\n\n【选项分析】\n与内核态线程相比，用户态线程的优点不包括什么？\n\n❌ A. 线程切换不需要转换到内核空间 — 是优点。\n用户级线程切换在用户态完成，不需要陷入内核，速度快。\n\n❌ B. 可以采用定制的调度算法 — 是优点。\n用户级线程的调度算法可以由用户自己定制，更灵活。\n\n✅ C. 可以避免系统调用引起进程阻塞 — 不是优点。\n用户级线程的缺点就是：一个线程发起系统调用阻塞，整个进程都会阻塞，不能避免。\n这是缺点，不是优点。\n\n❌ D. 实现与操作系统平台无关 — 是优点。\n用户级线程是在用户空间实现的，不依赖操作系统内核，可移植性好。\n\n【答案】C\n\n【补充说明】\n用户级线程的优点：\n1. 线程切换不需要内核支持，速度快\n2. 调度算法可以定制，灵活\n3. 实现与操作系统无关，可移植性好\n4. 不需要内核支持线程，开销小\n\n用户级线程的缺点：\n1. 一个线程阻塞，整个进程都阻塞（多对一模型）\n2. 不能真正利用多CPU（内核只看到一个进程）\n3. 系统调用开销大（每次都要切换到内核）"},
{id:226, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"(2024)下列选项中，操作系统在终止进程时不一定执行的是（ ）。", options:[{letter:"A", text:"终止子进程"}, {letter:"B", text:"回收进程占用的设备"}, {letter:"C", text:"释放进程控制块"}, {letter:"D", text:"回收为进程分配的内存"}], answer:"A", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 进程终止\n\n【选项分析】\n操作系统在终止进程时不一定执行的是？\n\n✅ A. 终止子进程 — 不一定执行。\n终止父进程时，不一定会终止子进程。子进程可以成为孤儿进程，由init进程领养。\n所以\"终止子进程\"不是必须的。\n\n❌ B. 回收进程占用的设备 — 必须执行。\n进程终止时，必须回收它占用的所有资源，包括设备。\n\n❌ C. 释放进程控制块 — 必须执行。\n进程终止后，PCB要被回收释放。\n\n❌ D. 回收为进程分配的内存 — 必须执行。\n进程终止时，必须回收它占用的内存。\n\n【答案】A\n\n【补充说明】\n进程终止时操作系统做的工作：\n1. 回收资源（内存、设备、文件等）\n2. 释放PCB\n3. 将进程从各种队列中移除\n\n关于子进程：\n- 父进程终止时，子进程不一定被终止\n- 在有些系统中，父进程终止会导致子进程也终止\n- 但在很多系统中（如Linux），子进程可以继续运行，成为孤儿进程，由init进程领养\n\n所以\"终止子进程\"不是必须的。"},
{id:227, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"两个合作进程无法利用（ ）交互数据。", options:[{letter:"A", text:"文件系统"}, {letter:"B", text:"共享内存"}, {letter:"C", text:"高级语言程序设计中的全局变量"}, {letter:"D", text:"消息传递系统"}], answer:"C", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 进程通信\n\n【选项分析】\n两个合作进程无法利用什么交互数据？\n\n❌ A. 文件系统 — 可以。进程可以通过读写同一个文件来交换数据。\n\n❌ B. 共享内存 — 可以。共享内存是进程通信的方式之一。\n\n✅ C. 高级语言程序设计中的全局变量 — 不可以。\n全局变量是进程内部的，每个进程有自己的地址空间，全局变量不共享。\n两个进程不能通过全局变量来交互数据。\n\n❌ D. 消息传递系统 — 可以。消息传递是进程通信的方式之一。\n\n【答案】C\n\n【补充说明】\n进程通信的方式：\n- 共享内存\n- 消息传递\n- 管道\n- 文件\n- 信号量\n- 套接字\n等等\n\n全局变量是进程内部的，每个进程有自己独立的地址空间，\n所以不同进程的全局变量是互相独立的，不能用来通信。\n\n线程之间可以通过全局变量通信（因为共享地址空间），但进程之间不行。"},
{id:228, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"PCB随时记录进程的执行情况，它的内容应该由（ ）进行修改。", options:[{letter:"A", text:"用户"}, {letter:"B", text:"进程自己"}, {letter:"C", text:"硬件"}, {letter:"D", text:"操作系统"}], answer:"D", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 进程控制块PCB\n\n【选项分析】\nPCB的内容应该由谁进行修改？\n\n❌ A. 用户 — 错误。用户不能直接修改PCB。\n\n❌ B. 进程自己 — 错误。进程自己不能修改自己的PCB。\n\n❌ C. 硬件 — 错误。硬件不修改PCB。\n\n✅ D. 操作系统 — 正确。PCB是操作系统管理进程的数据结构，由操作系统来修改。\n\n【答案】D\n\n【补充说明】\nPCB（进程控制块）：\n- 是操作系统管理进程的数据结构\n- 记录进程的状态、优先级、资源等信息\n- 由操作系统创建、修改和销毁\n- 用户和进程不能直接访问和修改PCB"},
{id:229, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"下列由当前线程引起的事件或执行的操作中，可能导致该线程由执行态变为就绪态的是（ ）。", options:[{letter:"A", text:"键盘输入"}, {letter:"B", text:"缺页异常"}, {letter:"C", text:"主动出让CPU"}, {letter:"D", text:"执行信号量的wait( )操作"}], answer:"C", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 线程状态\n\n【选项分析】\n哪个事件可能导致线程由执行态变为就绪态？\n\n❌ A. 键盘输入 — 错误。等待键盘输入会进入阻塞态，不是就绪态。\n\n❌ B. 缺页异常 — 错误。缺页会导致阻塞（等待磁盘I/O），不是就绪态。\n\n✅ C. 主动出让CPU — 正确。线程主动出让CPU（如yield），会从执行态变为就绪态。\n\n❌ D. 执行信号量的wait()操作 — 错误。wait操作如果资源不够，会进入阻塞态，不是就绪态。\n\n【答案】C\n\n【补充说明】\n线程状态变化：\n- 执行 → 就绪：时间片用完、被抢占、主动出让CPU\n- 执行 → 阻塞：等待I/O、等待信号、wait操作等\n- 就绪 → 执行：被调度\n- 阻塞 → 就绪：等待的事件发生了\n\n注意：\n- 就绪态是等待CPU调度\n- 阻塞态是等待某个事件（不是等待CPU）"},
{id:230, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"系统进程所请求的一次I/O操作完成后，将使进程状态从（ ）。", options:[{letter:"A", text:"运行态变为就绪态"}, {letter:"B", text:"运行态变为阻塞态"}, {letter:"C", text:"就绪态变为运行态"}, {letter:"D", text:"阻塞态变为就绪态"}], answer:"D", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 进程状态转换\n\n【选项分析】\nI/O操作完成后，进程状态如何变化？\n\n❌ A. 运行态变为就绪态 — 错误。这是时间片用完或被抢占时的变化。\n\n❌ B. 运行态变为阻塞态 — 错误。这是发起I/O请求时的变化。\n\n❌ C. 就绪态变为运行态 — 错误。这是被调度时的变化。\n\n✅ D. 阻塞态变为就绪态 — 正确。进程等待I/O时处于阻塞态，I/O完成后，等待的事件发生了，从阻塞态变为就绪态。\n\n【答案】D\n\n【补充说明】\n进程状态转换：\n- 运行 → 阻塞：进程等待I/O或某个事件\n- 阻塞 → 就绪：等待的事件发生了（如I/O完成）\n- 就绪 → 运行：被调度程序选中\n- 运行 → 就绪：时间片用完、被抢占\n\nI/O完成后，等待I/O的进程从阻塞态变为就绪态，等待调度。"},
{id:231, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"某操作系统中共有5个进程，则处于就绪状态的进程最多可以有（ ） 个。", options:[{letter:"A", text:"0"}, {letter:"B", text:"5"}, {letter:"C", text:"4"}, {letter:"D", text:"1"}], answer:"C", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 进程状态\n\n【选项分析】\n系统共有5个进程，处于就绪状态的进程最多可以有几个？\n\n❌ A. 0 — 错误。可以有0个，但不是最多。\n\n❌ B. 5 — 错误。不可能5个都就绪，因为单CPU系统中最多有1个在运行，剩下的最多4个就绪。\n\n✅ C. 4 — 正确。单CPU系统中，最多有1个进程在运行，剩下的5-1=4个可以都处于就绪态。\n\n❌ D. 1 — 错误。可以有更多。\n\n【答案】C\n\n【补充说明】\n单CPU系统中：\n- 运行态：最多1个进程\n- 就绪态：最多n-1个进程（n是总进程数）\n- 阻塞态：可以有0到n个\n\n5个进程时：\n- 最多1个运行\n- 最多4个就绪（其他1个在运行）\n- 最少0个就绪（都在运行或都阻塞）\n\n注意：也可能所有进程都阻塞，此时就绪态为0个，运行态也为0个。"},
{id:232, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"一个进程映像是（ ）。", options:[{letter:"A", text:"由协处理机执行的一个程序"}, {letter:"B", text:"一个独立的程序+数据集"}, {letter:"C", text:"PCB结构与程序和数据的组合"}, {letter:"D", text:"一个独立的程序"}], answer:"C", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 进程映像\n\n【选项分析】\n一个进程映像是什么？\n\n❌ A. 由协处理机执行的一个程序 — 错误。\n\n❌ B. 一个独立的程序+数据集 — 错误。不完整，还需要PCB。\n\n✅ C. PCB结构与程序和数据的组合 — 正确。进程映像由PCB、程序代码和数据组成。\n\n❌ D. 一个独立的程序 — 错误。不完整。\n\n【答案】C\n\n【补充说明】\n进程映像（进程实体）：\n- PCB（进程控制块）\n- 程序段（代码）\n- 数据段（数据）\n\n进程是动态的，进程映像是静态的，是进程的实体。\nPCB是进程存在的唯一标志。"},
{id:233, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"下列选项中，导致创建新进程的操作是（ ）。 I.管理员启动Web服务 Ⅱ.用户启动浏览器程序 Ⅲ.用浏览器访问新的网页", options:[{letter:"A", text:"仅I和Ⅱ"}, {letter:"B", text:"仅Ⅱ和Ⅲ"}, {letter:"C", text:"仅I和Ⅲ"}, {letter:"D", text:"I、Ⅱ、Ⅲ"}], answer:"A", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 进程创建\n\n【选项分析】\n哪些操作会导致创建新进程？\n\nI. 管理员启动Web服务 — 会。启动服务会创建新进程。\nⅡ. 用户启动浏览器程序 — 会。启动程序会创建新进程。\nⅢ. 用浏览器访问新的网页 — 不会。访问新网页是在同一个浏览器进程内进行的（通常），不会创建新进程。\n\n所以I和Ⅱ会创建新进程。\n\n【答案】A\n\n【补充说明】\n创建新进程的典型场景：\n- 用户启动一个程序\n- 系统启动服务\n- 进程调用fork创建子进程\n- 作业调度\n\n访问新网页通常不会创建新进程（虽然现代浏览器可能用多进程，但这不是必然的，也不是\"访问新网页\"这个操作本身创建的）。"},
{id:234, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"一个进程释放了一台打印机，它可能会改变（ ）的状态。", options:[{letter:"A", text:"自身进程"}, {letter:"B", text:"输入/输出进程"}, {letter:"C", text:"另一个等待打印机的进程"}, {letter:"D", text:"所有等待打印机的进程"}], answer:"C", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 进程状态\n\n【选项分析】\n一个进程释放了打印机，可能会改变谁的状态？\n\n❌ A. 自身进程 — 错误。释放打印机后，自身进程的状态不一定改变（它可能继续运行）。\n\n❌ B. 输入/输出进程 — 错误。不是必然的。\n\n✅ C. 另一个等待打印机的进程 — 正确。释放打印机后，等待打印机的某个进程会从阻塞态变为就绪态。\n\n❌ D. 所有等待打印机的进程 — 错误。只有一个进程能获得打印机，不是所有。\n\n【答案】C\n\n【补充说明】\n当一个进程释放资源（如打印机）时：\n- 操作系统会从等待该资源的阻塞队列中选择一个进程\n- 将其从阻塞态变为就绪态\n- 不是所有等待的进程都能同时获得资源，只有一个\n\n所以只会改变\"另一个等待打印机的进程\"的状态，不是所有。"},
{id:235, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"在多对一的线程模型中，当一个多线程进程中的某个线程被阻塞后，（ ）。", options:[{letter:"A", text:"该进程的其他线程仍可继续运行"}, {letter:"B", text:"整个进程都将阻塞"}, {letter:"C", text:"该阻塞线程将被撤销"}, {letter:"D", text:"该阻塞线程将永远不可能再执行"}], answer:"B", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 多对一线程模型\n\n【选项分析】\n在多对一的线程模型中，一个线程被阻塞后，会怎样？\n\n❌ A. 该进程的其他线程仍可继续运行 — 错误。多对一模型中，一个线程阻塞，整个进程都阻塞。\n\n✅ B. 整个进程都将阻塞 — 正确。多对一模型中，内核只看到一个进程，一个线程发起系统调用阻塞，整个进程都会阻塞。\n\n❌ C. 该阻塞线程将被撤销 — 错误。不会被撤销，只是阻塞。\n\n❌ D. 该阻塞线程将永远不可能再执行 — 错误。等待的事件发生后还可以继续执行。\n\n【答案】B\n\n【补充说明】\n多对一模型（用户级线程）：\n- 多个用户级线程映射到一个内核级线程\n- 线程管理在用户空间完成\n- 优点：切换快，不需要内核支持\n- 缺点：一个线程阻塞，整个进程都阻塞；不能利用多CPU\n\n这是用户级线程的主要缺点之一。"},
{id:236, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"下列选项中，会导致进程从执行态变为就绪态的事件是（ ）。", options:[{letter:"A", text:"执行P(wait)操作"}, {letter:"B", text:"申请内存失败"}, {letter:"C", text:"启动I/O设备"}, {letter:"D", text:"被高优先级进程抢占"}], answer:"D", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 进程状态转换\n\n【选项分析】\n哪个事件会导致进程从执行态变为就绪态？\n\n❌ A. 执行P(wait)操作 — 错误。P操作如果资源不够，会进入阻塞态，不是就绪态。\n\n❌ B. 申请内存失败 — 错误。可能进入阻塞态或出错，不是就绪态。\n\n❌ C. 启动I/O设备 — 错误。启动I/O后进程等待I/O完成，进入阻塞态。\n\n✅ D. 被高优先级进程抢占 — 正确。被高优先级进程抢占后，当前进程从执行态变为就绪态。\n\n【答案】D\n\n【补充说明】\n执行态 → 就绪态的情况：\n- 时间片用完\n- 被更高优先级的进程抢占\n- 进程主动出让CPU（如yield）\n\n执行态 → 阻塞态的情况：\n- 等待I/O\n- 等待某个事件\n- P操作（信号量）资源不够\n- 等待消息"},
{id:237, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"下面的情况中，进程调度可能发生的时机有（ ）。 Ⅰ.正在执行的进程时间片用完 Ⅱ.正在执行的进程提出I/O请求后进入等待状态 Ⅲ.有新的用户登录进入系统 Ⅳ.等待硬盘读取数据的进程获得了所需的数据", options:[{letter:"A", text:"Ⅰ"}, {letter:"B", text:"Ⅰ、Ⅱ、Ⅲ、Ⅳ"}, {letter:"C", text:"Ⅰ、Ⅱ、Ⅳ"}, {letter:"D", text:"Ⅰ、Ⅲ、Ⅳ"}], answer:"B", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 进程调度的时机\n\n【选项分析】\n哪些时机可能发生进程调度？\n\nⅠ. 正在执行的进程时间片用完 — 会。时间片用完，当前进程让出CPU，需要调度。\nⅡ. 正在执行的进程提出I/O请求后进入等待状态 — 会。进程阻塞，需要调度另一个进程。\nⅢ. 有新的用户登录进入系统 — 会。新用户登录会创建新进程，可能触发调度（抢占式）。\nⅣ. 等待硬盘读取数据的进程获得了所需的数据 — 会。进程从阻塞变就绪，可能触发调度（抢占式）。\n\n所以Ⅰ、Ⅱ、Ⅲ、Ⅳ都可能发生调度。\n\n【答案】B\n\n【补充说明】\n进程调度的时机：\n1. 进程时间片用完\n2. 进程阻塞（I/O、等待事件）\n3. 进程执行结束\n4. 有更高优先级进程进入就绪队列（抢占式）\n5. 中断处理结束\n6. 系统调用返回\n\n新用户登录会创建新进程，新进程进入就绪队列，如果是抢占式且优先级高，会触发调度。\n等待I/O的进程获得数据后从阻塞变就绪，也可能触发调度。"},
{id:238, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"一个进程的读磁盘操作完成后，操作系统针对该进程必须做的是（ ）。", options:[{letter:"A", text:"修改进程状态为就绪态"}, {letter:"B", text:"降低进程优先级"}, {letter:"C", text:"给进程分配用户内存空间"}, {letter:"D", text:"增加进程时间片的大小"}], answer:"A", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 进程状态转换\n\n【选项分析】\n进程的读磁盘操作完成后，操作系统针对该进程必须做的是？\n\n✅ A. 修改进程状态为就绪态 — 正确。进程等待磁盘I/O时处于阻塞态，I/O完成后，等待的事件发生了，需要将进程状态从阻塞态改为就绪态。\n\n❌ B. 降低进程优先级 — 错误。不一定降低优先级。\n\n❌ C. 给进程分配用户内存空间 — 错误。内存空间早就分配好了。\n\n❌ D. 增加进程时间片的大小 — 错误。时间片大小是固定的，不会因为I/O完成就增加。\n\n【答案】A\n\n【补充说明】\nI/O完成后操作系统的工作：\n1. 将等待该I/O的进程从阻塞队列中移出\n2. 将其状态改为就绪态\n3. 插入到就绪队列中\n4. 如果是抢占式调度，可能会触发调度\n\n最基本、必须做的是修改进程状态为就绪态。"},
{id:239, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"PCB是进程存在的唯一标志，下列（ ）不属于PCB。", options:[{letter:"A", text:"进程ID"}, {letter:"B", text:"CPU状态"}, {letter:"C", text:"堆栈指针"}, {letter:"D", text:"全局变量"}], answer:"D", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 进程控制块PCB\n\n【选项分析】\n哪个不属于PCB？\n\n❌ A. 进程ID — 属于。PCB中包含进程标识符。\n\n❌ B. CPU状态 — 属于。PCB中包含CPU现场（寄存器等）。\n\n❌ C. 堆栈指针 — 属于。PCB中包含堆栈指针等寄存器信息。\n\n✅ D. 全局变量 — 不属于。全局变量在进程的数据段中，不在PCB中。\n\n【答案】D\n\n【补充说明】\nPCB（进程控制块）的内容：\n- 进程标识符（PID等）\n- 进程状态（就绪、运行、阻塞等）\n- CPU现场（寄存器、程序计数器、堆栈指针等）\n- 进程优先级\n- 内存管理信息（页表、段表等）\n- 资源信息（打开的文件、I/O设备等）\n- 等等\n\n全局变量是进程数据的一部分，在进程的地址空间中，不在PCB里。"},
{id:240, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"进程和程序的根本区别是（ ）。", options:[{letter:"A", text:"静态和动态的区别"}, {letter:"B", text:"是不是被调入内存"}, {letter:"C", text:"是不是具有就绪、运行和等待三种状态。"}, {letter:"D", text:"是不是占有处理机"}], answer:"A", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 进程与程序的区别\n\n【选项分析】\n进程和程序的根本区别是什么？\n\n✅ A. 静态和动态的区别 — 正确。程序是静态的（代码），进程是动态的（程序的执行过程）。这是根本区别。\n\n❌ B. 是不是被调入内存 — 错误。程序也可以被调入内存。\n\n❌ C. 是不是具有就绪、运行和等待三种状态 — 错误。这是区别之一，但不是根本区别。\n\n❌ D. 是不是占有处理机 — 错误。进程不一定占有处理机（就绪态就不占有）。\n\n【答案】A\n\n【补充说明】\n进程 vs 程序：\n- 程序：静态的，是指令的集合，永久存在\n- 进程：动态的，是程序的执行过程，有生命周期\n\n根本区别：静态和动态的区别。\n\n进程的特征：动态性、并发性、独立性、异步性\n程序的特征：静态、顺序、可再现"},
{id:241, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"同一程序经过多次创建，运行在不同的数据集上，形成了（ ）的进程。", options:[{letter:"A", text:"不同"}, {letter:"B", text:"相同"}, {letter:"C", text:"同步"}, {letter:"D", text:"互斥"}], answer:"A", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 进程的概念\n\n【选项分析】\n同一程序运行在不同的数据集上，形成了什么样的进程？\n\n✅ A. 不同 — 正确。\n即使是同一个程序，运行在不同的数据集上，也是不同的进程。\n进程是程序的一次执行，不同的执行就是不同的进程。\n\n❌ B. 相同 — 错误。虽然程序相同，但数据集不同，执行过程不同，是不同的进程。\n\n❌ C. 同步 — 错误。同步是进程间的关系，不是进程的分类。\n\n❌ D. 互斥 — 错误。互斥也是进程间的关系。\n\n【答案】A\n\n【补充说明】\n进程是程序的一次执行过程。\n同一个程序，可以被多次执行，形成多个不同的进程。\n例如：\n- 同时打开两个记事本，就是两个不同的进程，虽然程序是同一个\n- 同一个程序处理不同的数据，也是不同的进程\n\n每个进程有自己的PCB、自己的地址空间、自己的状态。"},
{id:242, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"进程被成功创建以后，该进程的进程控制块将会首先插入到的队列是（ ）。", options:[{letter:"A", text:"就绪队列"}, {letter:"B", text:"等待队列"}, {letter:"C", text:"运行队列"}, {letter:"D", text:"活动队列"}], answer:"A", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 进程创建\n\n【选项分析】\n进程被成功创建后，它的PCB首先插入到哪个队列？\n\n✅ A. 就绪队列 — 正确。\n进程创建完成后，进入就绪状态，等待CPU调度，所以PCB插入到就绪队列。\n\n❌ B. 等待队列 — 错误。等待队列（阻塞队列）是等待某个事件的进程。\n\n❌ C. 运行队列 — 错误。只有被调度选中的进程才进入运行态。\n\n❌ D. 活动队列 — 错误。不是标准的队列名称。\n\n【答案】A\n\n【补充说明】\n进程创建的过程：\n1. 申请空白PCB\n2. 为新进程分配资源（内存等）\n3. 初始化PCB\n4. 将PCB插入就绪队列\n\n进程创建后，初始状态是就绪态，等待调度。"},
{id:243, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"下面的叙述中，正确的是（ ）。", options:[{letter:"A", text:"引入线程后，处理机只能在线程间切换"}, {letter:"B", text:"引入线程后，处理机仍在进程间切换"}, {letter:"C", text:"线程的切换，不会引起进程的切换"}, {letter:"D", text:"线程的切换，可能引起进程的切换"}], answer:"D", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 线程与进程切换\n\n【选项分析】\n关于线程切换和进程切换，正确的是？\n\n❌ A. 引入线程后，处理机只能在线程间切换 — 错误。\n处理机调度是在线程间进行，但不是\"只能\"，而且切换的是线程，不是处理机在线程间切换这种说法。\n\n❌ B. 引入线程后，处理机仍在进程间切换 — 错误。\n引入线程后，处理机调度的基本单位是线程，不是进程。\n\n❌ C. 线程的切换，不会引起进程的切换 — 错误。\n同一进程内的线程切换不会引起进程切换，但不同进程间的线程切换会引起进程切换。\n\n✅ D. 线程的切换，可能引起进程的切换 — 正确。\n如果切换的两个线程属于不同的进程，就会引起进程切换。\n如果属于同一个进程，就不会引起进程切换。\n所以\"可能\"引起是对的。\n\n【答案】D\n\n【补充说明】\n线程切换与进程切换：\n- 同一进程内的线程切换：只需要切换线程上下文，不需要切换地址空间，开销小，不会引起进程切换\n- 不同进程间的线程切换：需要切换进程上下文，切换地址空间，开销大，会引起进程切换\n\n所以线程切换\"可能\"引起进程切换，不是\"一定\"也不是\"一定不\"。"},
{id:244, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"下列关于管道（Pipe）通信的叙述中，正确的是（ ）。", options:[{letter:"A", text:"一个管道可实现双向数据传输"}, {letter:"B", text:"管道的容量仅受磁盘容量大小限制"}, {letter:"C", text:"进程对管道进行读操作和写操作都可能被阻塞"}, {letter:"D", text:"一个管道只能有一个读进程或一个写进程对其进行操作"}], answer:"C", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 管道通信\n\n【选项分析】\n关于管道（Pipe）通信的叙述，正确的是？\n\n❌ A. 一个管道可实现双向数据传输 — 错误。\n管道是半双工的，只能单向传输（一个写，一个读）。\n虽然有些系统实现了双向管道，但通常管道是单向的。\n\n❌ B. 管道的容量仅受磁盘容量大小限制 — 错误。\n管道是在内存中的缓冲区，不是在磁盘上，容量受内存限制。\n\n✅ C. 进程对管道进行读操作和写操作都可能被阻塞 — 正确。\n- 管道满时，写操作会被阻塞\n- 管道空时，读操作会被阻塞\n所以读和写都可能被阻塞。\n\n❌ D. 一个管道只能有一个读进程或一个写进程对其进行操作 — 错误。\n可以有多个读进程和多个写进程（虽然通常是一个写一个读）。\n\n【答案】C\n\n【补充说明】\n管道（Pipe）的特点：\n1. 半双工：数据只能单向流动\n2. 只能在父子进程或兄弟进程间使用\n3. 管道是字节流，没有消息边界\n4. 管道满时，写阻塞；管道空时，读阻塞\n5. 管道存在于内存中，不是文件系统中\n\n管道的读写都可能阻塞：\n- 写：管道满了就阻塞，等读进程读走数据\n- 读：管道空了就阻塞，等写进程写入数据"},
{id:245, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"以下所述步骤中，（ ）不是创建进程所必需的。", options:[{letter:"A", text:"由调度程序为进程分配CPU"}, {letter:"B", text:"建立一个进程控制块"}, {letter:"C", text:"为进程分配内存"}, {letter:"D", text:"将进程控制块链入到就绪队列"}], answer:"A", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 进程创建\n\n【选项分析】\n哪个不是创建进程所必需的？\n\n✅ A. 由调度程序为进程分配CPU — 不是必需的。\n创建进程时，只需要把进程放入就绪队列，不需要立即分配CPU。\nCPU分配是调度程序的工作，是在调度时进行的，不是创建时必须的。\n\n❌ B. 建立一个进程控制块 — 是必需的。\n创建进程必须创建PCB。\n\n❌ C. 为进程分配内存 — 是必需的。\n创建进程需要为其分配内存空间。\n\n❌ D. 将进程控制块链入到就绪队列 — 是必需的。\n创建完成后要放入就绪队列。\n\n【答案】A\n\n【补充说明】\n创建进程的步骤：\n1. 申请空白PCB\n2. 为新进程分配资源（内存等）\n3. 初始化PCB（进程ID、状态、优先级等）\n4. 将PCB插入就绪队列\n\n注意：创建进程时不需要立即分配CPU，\n分配CPU是调度程序的工作，在调度时才进行。\n创建好的进程先在就绪队列中等待。"},
{id:246, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"在分时系统中，一个进程用完给它的时间片后，其状态变为（ ）。", options:[{letter:"A", text:"就绪"}, {letter:"B", text:"阻塞"}, {letter:"C", text:"运行"}, {letter:"D", text:"由用户设定"}], answer:"A", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 进程状态转换\n\n【选项分析】\n分时系统中，一个进程用完时间片后，状态变为什么？\n\n✅ A. 就绪 — 正确。\n时间片用完后，进程从运行态变为就绪态，等待下一次调度。\n\n❌ B. 阻塞 — 错误。阻塞是等待I/O或事件时的状态。\n\n❌ C. 运行 — 错误。时间片用完了，不能继续运行了。\n\n❌ D. 由用户设定 — 错误。\n\n【答案】A\n\n【补充说明】\n时间片用完后的状态变化：\n运行态 → 就绪态\n\n注意：\n- 时间片用完 → 就绪态（等待下一次调度）\n- 等待I/O → 阻塞态（等待事件）\n- 进程结束 → 终止态\n\n不要混淆就绪态和阻塞态：\n- 就绪态：等待CPU\n- 阻塞态：等待某个事件（不是CPU）"},
{id:247, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"下列关于进程和线程的叙述中，正确的是（ ）", options:[{letter:"A", text:"不管系统是否支持线程，进程都是资源分配的基本单位"}, {letter:"B", text:"线程是资源分配的基本单位，进程是调度的基本单位"}, {letter:"C", text:"系统级线程和用户级线程的切换都需要内核的支持"}, {letter:"D", text:"同一进程中的各个线程拥有各自不同的地址空间"}], answer:"A", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 进程与线程\n\n【选项分析】\n关于进程和线程的叙述，正确的是？\n\n✅ A. 不管系统是否支持线程，进程都是资源分配的基本单位 — 正确。\n进程始终是资源分配的基本单位，线程不拥有系统资源（或只拥有少量资源）。\n\n❌ B. 线程是资源分配的基本单位，进程是调度的基本单位 — 错误。\n说反了。进程是资源分配的基本单位，线程是调度的基本单位。\n\n❌ C. 系统级线程和用户级线程的切换都需要内核的支持 — 错误。\n用户级线程的切换不需要内核支持，在用户态就可以完成。\n\n❌ D. 同一进程中的各个线程拥有各自不同的地址空间 — 错误。\n同一进程中的线程共享地址空间。\n\n【答案】A\n\n【补充说明】\n这道题和第224题是重复的。\n\n进程 vs 线程：\n- 进程：资源分配的基本单位，有独立的地址空间\n- 线程：CPU调度的基本单位，共享进程的地址空间\n\n不管系统是否支持线程，进程都是资源分配的基本单位。\n线程是调度的基本单位，不是资源分配的基本单位。"},
{id:248, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"进程的基本状态（ ）可以由其他两种基本状态转变而来。", options:[{letter:"A", text:"就绪状态"}, {letter:"B", text:"执行状态"}, {letter:"C", text:"阻塞状态"}, {letter:"D", text:"新建状态"}], answer:"A", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 进程状态转换\n\n【选项分析】\n哪个基本状态可以由其他两种基本状态转变而来？\n\n✅ A. 就绪状态 — 正确。\n- 运行态 → 就绪态：时间片用完、被抢占\n- 阻塞态 → 就绪态：等待的事件发生了\n所以就绪态可以由运行态和阻塞态转变而来。\n\n❌ B. 执行状态 — 错误。\n执行态只能由就绪态转变而来。\n\n❌ C. 阻塞状态 — 错误。\n阻塞态只能由运行态转变而来。\n\n❌ D. 新建状态 — 错误。\n新建状态不是基本状态（三种基本状态是就绪、运行、阻塞）。\n\n【答案】A\n\n【补充说明】\n进程三种基本状态的转换：\n- 就绪 → 运行：被调度\n- 运行 → 就绪：时间片用完、被抢占\n- 运行 → 阻塞：等待I/O、等待事件\n- 阻塞 → 就绪：等待的事件发生了\n\n可以看出：\n- 就绪态：可以从运行态和阻塞态来（两种）\n- 运行态：只能从就绪态来（一种）\n- 阻塞态：只能从运行态来（一种）\n\n所以就绪状态可以由其他两种基本状态转变而来。"},
{id:249, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"在单处理机系统中，若同时存在10个进程，则处于就绪队列中的进程最多有（ ）个。", options:[{letter:"A", text:"1"}, {letter:"B", text:"8"}, {letter:"C", text:"9"}, {letter:"D", text:"10"}], answer:"C", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 进程状态\n\n【选项分析】\n单处理机系统中，同时存在10个进程，就绪队列中的进程最多有几个？\n\n❌ A. 1 — 错误。可以有更多。\n\n❌ B. 8 — 错误。\n\n✅ C. 9 — 正确。\n单CPU系统中，最多有1个进程在运行，剩下的10-1=9个可以都在就绪队列中。\n\n❌ D. 10 — 错误。不可能10个都就绪，因为至少有1个在运行（如果都不阻塞的话）。\n\n【答案】C\n\n【补充说明】\n单CPU系统中：\n- 运行态：最多1个\n- 就绪态：最多n-1个（n是总进程数）\n- 阻塞态：可以有0到n个\n\n10个进程时：\n- 最多1个运行\n- 最多9个就绪（其他1个在运行）\n- 最少0个就绪（都在运行或都阻塞）\n\n注意：也可能所有进程都阻塞，此时就绪态为0个，运行态也为0个。"},
{id:250, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"以下关于进程的描述中，错误的是（ ）。", options:[{letter:"A", text:"进程是动态的概念"}, {letter:"B", text:"进程执行需要处理机"}, {letter:"C", text:"进程是有生命期的"}, {letter:"D", text:"进程是指令的集合"}], answer:"D", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 进程的概念\n\n【选项分析】\n题目问：关于进程的描述中，错误的是（ ）。\n即找错误的说法。\n\n❌ A. 进程是动态的概念 — 说法正确。\n进程是动态的，是程序的执行过程。\n所以A不是正确答案。\n\n❌ B. 进程执行需要处理机 — 说法正确。\n进程运行需要CPU。\n所以B不是正确答案。\n\n❌ C. 进程是有生命期的 — 说法正确。\n进程有创建、运行、终止的生命周期。\n所以C不是正确答案。\n\n✅ D. 进程是指令的集合 — 说法错误。\n程序是指令的集合，进程是程序的执行过程，不是指令的集合。\n所以D是正确答案（题目要选错误的叙述）。\n\n【答案】D\n\n【补充说明】\n注意：题目问的是\"错误的是\"，要选说法错误的选项。\n\n进程 vs 程序：\n- 程序：静态的，是指令的集合，永久存在\n- 进程：动态的，是程序的执行过程，有生命周期\n\n\"进程是指令的集合\"这个说法是错误的，\n\"程序是指令的集合\"才是对的。"},
{id:251, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"在引入线程的操作系统中，资源分配的基本单位是（ ）。", options:[{letter:"A", text:"程序"}, {letter:"B", text:"进程"}, {letter:"C", text:"线程"}, {letter:"D", text:"作业"}], answer:"B", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 线程\n\n【选项分析】\n引入线程的操作系统中，资源分配的基本单位是什么？\n\n❌ A. 程序 — 错误。\n\n✅ B. 进程 — 正确。\n引入线程后，进程仍然是资源分配的基本单位，线程是调度的基本单位。\n\n❌ C. 线程 — 错误。线程是调度的基本单位，不是资源分配的基本单位。\n\n❌ D. 作业 — 错误。\n\n【答案】B\n\n【补充说明】\n引入线程后：\n- 进程：资源分配的基本单位\n- 线程：CPU调度的基本单位\n\n线程不拥有系统资源（或只拥有少量必不可少的资源），\n它共享所属进程的资源。\n\n所以资源分配的基本单位仍然是进程，不是线程。"},
{id:252, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"当( )时，进程从执行状态转变为就绪状态。", options:[{letter:"A", text:"进程被调度程序选中"}, {letter:"B", text:"时间片到"}, {letter:"C", text:"等待某一事件"}, {letter:"D", text:"等待的事件发生"}], answer:"B", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 进程状态转换\n\n【选项分析】\n什么时候，进程从执行状态转变为就绪状态？\n\n❌ A. 进程被调度程序选中 — 错误。这是就绪 → 运行。\n\n✅ B. 时间片到 — 正确。时间片用完，进程从运行态变为就绪态。\n\n❌ C. 等待某一事件 — 错误。这是运行 → 阻塞。\n\n❌ D. 等待的事件发生 — 错误。这是阻塞 → 就绪。\n\n【答案】B\n\n【补充说明】\n进程状态转换：\n- 就绪 → 运行：被调度程序选中\n- 运行 → 就绪：时间片用完、被抢占\n- 运行 → 阻塞：等待某一事件（I/O等）\n- 阻塞 → 就绪：等待的事件发生了\n\n时间片到（时间片用完）是运行 → 就绪的典型情况。"},
{id:253, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"进程处于（ ）时，它处于非阻塞态。", options:[{letter:"A", text:"等待从键盘输入数据"}, {letter:"B", text:"等待协作进程的一个信号"}, {letter:"C", text:"等待操作系统分配CPU时间"}, {letter:"D", text:"等待网络数据进入内存"}], answer:"C", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 进程状态\n\n【选项分析】\n进程处于什么状态时，它处于非阻塞态？\n\n题目问的是：哪个状态不是阻塞态（即非阻塞态）。\n\n❌ A. 等待从键盘输入数据 — 是阻塞态。等待I/O，阻塞。\n\n❌ B. 等待协作进程的一个信号 — 是阻塞态。等待信号，阻塞。\n\n✅ C. 等待操作系统分配CPU时间 — 不是阻塞态，是就绪态。\n等待CPU是就绪态，不是阻塞态。\n阻塞态是等待某个事件（不是CPU）。\n\n❌ D. 等待网络数据进入内存 — 是阻塞态。等待I/O，阻塞。\n\n【答案】C\n\n【补充说明】\n就绪态 vs 阻塞态：\n- 就绪态：等待CPU调度，除了CPU什么都有了\n- 阻塞态：等待某个事件（I/O、信号等），不是等待CPU\n\n等待CPU时间 → 就绪态（非阻塞态）\n等待I/O、等待信号 → 阻塞态"},
{id:254, type:"single", chapter:2, chapterName:"进程的描述与控制", text:"用信箱实现进程间互通信息的通信机制要有两个通信原语，它们是（ ）。", options:[{letter:"A", text:"发送原语和执行原语"}, {letter:"B", text:"就绪原语和执行原语"}, {letter:"C", text:"发送原语和接收原语"}, {letter:"D", text:"就绪原语和接收原语"}], answer:"C", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 信箱通信\n\n【选项分析】\n用信箱实现进程间通信，需要哪两个通信原语？\n\n❌ A. 发送原语和执行原语 — 错误。没有执行原语。\n\n❌ B. 就绪原语和执行原语 — 错误。\n\n✅ C. 发送原语和接收原语 — 正确。\n信箱通信需要发送原语（send）和接收原语（receive）。\n\n❌ D. 就绪原语和接收原语 — 错误。没有就绪原语。\n\n【答案】C\n\n【补充说明】\n信箱通信是间接通信的一种：\n- 发送原语（send）：将消息发送到信箱\n- 接收原语（receive）：从信箱中接收消息\n\n信箱通信的特点：\n- 发送者和接收者不需要直接知道对方\n- 通过信箱间接通信\n- 一个信箱可以有多个发送者和多个接收者"},
{id:255, type:"multi", chapter:2, chapterName:"进程的描述与控制", text:"下面给出的进程状态变化中，（ ）变化可能发生的。", options:[{letter:"A", text:"运行－>就绪"}, {letter:"B", text:"运行－>等待"}, {letter:"C", text:"等待－>运行"}, {letter:"D", text:"等待－>就绪"}], answer:"ABD", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 进程状态转换\n\n【选项分析】\n哪些进程状态变化是可能发生的？\n\n✅ A. 运行－>就绪 — 可能。时间片用完、被抢占。\n✅ B. 运行－>等待 — 可能。等待I/O、等待事件（等待即阻塞）。\n❌ C. 等待－>运行 — 不可能。等待（阻塞）不能直接到运行，必须先到就绪。\n✅ D. 等待－>就绪 — 可能。等待的事件发生了。\n\n所以可能发生的是A、B、D。\n\n【答案】ABD\n\n【补充说明】\n进程状态转换：\n- 运行 → 就绪：可能（时间片用完、被抢占）\n- 运行 → 阻塞（等待）：可能（等待I/O、等待事件）\n- 阻塞（等待）→ 就绪：可能（等待的事件发生了）\n- 就绪 → 运行：可能（被调度）\n- 阻塞 → 运行：不可能（必须先到就绪）\n- 就绪 → 阻塞：不可能（还没运行怎么会阻塞）\n\n注意：题目中的\"等待\"就是\"阻塞\"。"},
{id:256, type:"multi", chapter:2, chapterName:"进程的描述与控制", text:"下列关于进程和线程的叙述中，错误的是( )。", options:[{letter:"A", text:"不管系统是否支持线程，进程都是资源分配的基本单位。"}, {letter:"B", text:"线程是资源分配的基本单位，进程是调度的基本单位。"}, {letter:"C", text:"系统级线程和用户级线程的切换都需要内核的支持。"}, {letter:"D", text:"同一进程中的各个线程拥有各自不同的地址空间。"}], answer:"BCD", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 进程与线程\n\n【选项分析】\n题目问：关于进程和线程的叙述中，错误的是（ ）。\n即找错误的说法。\n\n❌ A. 不管系统是否支持线程，进程都是资源分配的基本单位。 — 说法正确。\n进程始终是资源分配的基本单位。\n所以A不是正确答案。\n\n✅ B. 线程是资源分配的基本单位，进程是调度的基本单位。 — 说法错误。\n说反了。进程是资源分配的基本单位，线程是调度的基本单位。\n所以B是正确答案（题目要选错误的叙述）。\n\n✅ C. 系统级线程和用户级线程的切换都需要内核的支持。 — 说法错误。\n用户级线程的切换不需要内核支持。\n所以C是正确答案。\n\n✅ D. 同一进程中的各个线程拥有各自不同的地址空间。 — 说法错误。\n同一进程中的线程共享地址空间。\n所以D是正确答案。\n\n【答案】BCD\n\n【补充说明】\n注意：题目问的是\"错误的是\"，要选说法错误的选项。\n\n正确的说法：\n- 进程是资源分配的基本单位\n- 线程是调度的基本单位\n- 用户级线程切换不需要内核支持\n- 同一进程中的线程共享地址空间\n\n错误的说法：\n- 线程是资源分配的基本单位，进程是调度的基本单位（说反了）\n- 用户级线程切换需要内核支持（不需要）\n- 同一进程的线程有各自不同的地址空间（共享的）"},
{id:257, type:"judge", chapter:2, chapterName:"进程的描述与控制", text:"进程状态的转换是由操作系统完成的, 对用户是透明的。", options:[{letter:"A", text:"对"}, {letter:"B", text:"错"}], answer:"A", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 进程状态转换\n\n【题目分析】\n\"进程状态的转换是由操作系统完成的，对用户是透明的。\"\n\n这个说法是正确的。\n进程状态的转换（如运行到就绪、就绪到运行、运行到阻塞等）都是由操作系统内核完成的，\n用户不需要关心，也无法直接控制，对用户是透明的。\n\n✅ A. 对 — 正确。\n❌ B. 错 — 错误。\n\n【答案】A\n\n【补充说明】\n透明的意思是：用户看不到、不需要关心具体是怎么实现的。\n\n进程状态转换是操作系统内部的事情，\n用户程序不需要知道进程什么时候被调度、什么时候被切换，\n这些都由操作系统自动完成，对用户是透明的。"},
{id:258, type:"judge", chapter:2, chapterName:"进程的描述与控制", text:"不同的进程可以包含同一个程序。", options:[{letter:"A", text:"对"}, {letter:"B", text:"错"}], answer:"A", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 进程与程序\n\n【题目分析】\n\"不同的进程可以包含同一个程序。\"\n\n这个说法是正确的。\n同一个程序可以被多次执行，形成多个不同的进程。\n例如：同时打开两个记事本窗口，就是两个不同的进程，但运行的是同一个程序。\n\n✅ A. 对 — 正确。\n❌ B. 错 — 错误。\n\n【答案】A\n\n【补充说明】\n进程是程序的一次执行过程。\n同一个程序，可以被多次加载执行，形成多个不同的进程。\n\n每个进程有自己的：\n- PCB\n- 地址空间\n- 数据\n- 状态\n\n虽然程序相同，但它们是不同的进程。"},
{id:259, type:"judge", chapter:2, chapterName:"进程的描述与控制", text:"某操作系统中共有5个进程，则处于就绪状态的进程最多可以有5个。", options:[{letter:"A", text:"对"}, {letter:"B", text:"错"}], answer:"B", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 进程状态\n\n【题目分析】\n\"某操作系统中共有5个进程，则处于就绪状态的进程最多可以有5个。\"\n\n这个说法是错误的。\n单CPU系统中，最多有1个进程在运行，所以就绪状态的进程最多有5-1=4个，不可能5个都就绪。\n（如果5个都就绪，那谁在运行呢？）\n\n❌ A. 对 — 错误。\n✅ B. 错 — 正确。\n\n【答案】B\n\n【补充说明】\n单CPU系统中：\n- 运行态：最多1个\n- 就绪态：最多n-1个（n是总进程数）\n- 阻塞态：可以有0到n个\n\n5个进程时：\n- 最多1个运行\n- 最多4个就绪（其他1个在运行）\n- 最少0个就绪（都在运行或都阻塞）\n\n所以\"最多5个就绪\"的说法是错误的。"},
{id:260, type:"judge", chapter:2, chapterName:"进程的描述与控制", text:"当一个进程从等待态变成就绪态，则一定有一个进程从就绪态变成运行态。", options:[{letter:"A", text:"对"}, {letter:"B", text:"错"}], answer:"B", answerText:"", analysis:"【考察知识点】进程的描述与控制 — 进程状态转换\n\n【题目分析】\n\"当一个进程从等待态变成就绪态，则一定有一个进程从就绪态变成运行态。\"\n\n这个说法是错误的。\n一个进程从等待态（阻塞态）变成就绪态，不一定会引起调度。\n在非抢占式系统中，即使有新的进程进入就绪队列，也不会立即调度，要等当前进程主动放弃CPU。\n即使在抢占式系统中，也不一定（如果新进程优先级不高，就不会抢占）。\n\n所以\"一定\"有一个进程从就绪态变成运行态，这个说法太绝对了，是错误的。\n\n❌ A. 对 — 错误。\n✅ B. 错 — 正确。\n\n【答案】B\n\n【补充说明】\n进程从阻塞态变为就绪态，只是加入就绪队列，不一定会立即调度。\n\n在非抢占式系统中：\n- 新进程进入就绪队列不会触发调度\n- 要等当前进程时间片用完或主动阻塞才会调度\n\n在抢占式系统中：\n- 只有当新进程优先级比当前运行进程高时，才会触发调度\n- 如果优先级低，就不会立即调度\n\n所以\"一定\"有进程从就绪变运行，这个说法是错误的。"},
{id:261, type:"essay", chapter:2, chapterName:"进程的描述与控制", text:"设系统中有n（n>2）个进程，且当前不执行进程调度程序，试考虑下述4种情况： （1） 没有运行进程，有2个就绪进程，n个进程处于阻塞状态。 （2） 有1个运行进程，没有就绪进程，n-1个进程处于阻塞状态。 （3） 有1个运行进程，有1个就绪进程，n-2个进程处于阻塞状态。 （4） 有1个运行进程，n-1个就绪进程，没有进程处于阻塞状态 上述情况中，哪些情况可能发生？哪些不可能发生？为什么？", options:[], answer:"", answerText:"（1）不可能发生，因为没有运行进程，调度程序必然会从就绪队列中选择一个运行。 （2）有可能，一个进程运行，其它进程阻塞。 （3）有可能，有1个运行进程，有1个就绪进程，n-2个进程处于阻塞状态。 （4）有可能，有1个运行进程，n-1个就绪进程，没有进程处于阻塞状态。", analysis:"【题型】应用题\n【章节】进程的描述与控制\n\n【参考答案】\n（1）不可能发生，因为没有运行进程，调度程序必然会从就绪队列中选择一个运行。 （2）有可能，一个进程运行，其它进程阻塞。 （3）有可能，有1个运行进程，有1个就绪进程，n-2个进程处于阻塞状态。 （4）有可能，有1个运行进程，n-1个就绪进程，没有进程处于阻塞状态。\n\n【解题思路】\n本题考查进程的描述与控制的综合应用能力。解答此类题目时，需要：\n1. 仔细阅读题目，理解问题背景和已知条件；\n2. 回忆相关知识点，确定适用的原理、算法或公式；\n3. 按照逻辑步骤进行分析和计算；\n4. 最终给出清晰、完整的答案。\n\n建议动手画图辅助分析，注意检查计算过程和单位。"},
{id:262, type:"essay", chapter:2, chapterName:"进程的描述与控制", text:"设某计算机系统有一个CPU、一台输入设备、一台打印机。现有两个进程同时进入就绪状态，且进程A先得到CPU运行，进程B后运行。进程A的运行轨迹为：计算50ms，打印信息100ms，再计算50ms，打印信息100ms，结束。进程B的运行轨迹为：计算50ms，输入数据80ms，再计算100ms，结束。试说明： （1）开始运行后，CPU有无空闲等待？若有，在哪段时间内等待？计算CPU的利用率。 （2）进程A运行时有无等待现象？若有，在什么时候发生等待现象？ （3）进程B运行时有无等待现象？若有，在什么时候发生等待现象？", options:[], answer:"", answerText:"（1）CPU在100到150ms时间段内空闲，利用率为250/300=83.3%。 （2）进程A无等待现象。 （3）进程B有等待现象，0到50ms，180到200ms", analysis:"【题型】应用题\n【章节】进程的描述与控制\n\n【参考答案】\n（1）CPU在100到150ms时间段内空闲，利用率为250/300=83.3%。 （2）进程A无等待现象。 （3）进程B有等待现象，0到50ms，180到200ms\n\n【解题思路】\n本题考查进程的描述与控制的综合应用能力。解答此类题目时，需要：\n1. 仔细阅读题目，理解问题背景和已知条件；\n2. 回忆相关知识点，确定适用的原理、算法或公式；\n3. 按照逻辑步骤进行分析和计算；\n4. 最终给出清晰、完整的答案。\n\n建议动手画图辅助分析，注意检查计算过程和单位。"},
{id:263, type:"essay", chapter:2, chapterName:"进程的描述与控制", text:"（2023）进程 P 通过系统调用请求从键盘读入一个字符。题目乱序给出6 个 处理步骤 ①将进程 P 插入就绪队列； ②将进程 P 插入阻塞队列； ③将字符从键盘控制器读入系统缓冲区； ④启动中断处理程序； ⑤系统调用返回； ⑥用户通过键盘输人字符； （1）①的前、后分别是哪个步骤?⑥的 后面是什么步骤? （2）哪个步骤一定会使 CPU 从 P 进程 切换到其他进程?哪个步骤之后调度器 可以调度进程 P? （3） 哪个步骤是由键盘驱动程序完成 的? （4 ） 中断处理时 ，进程 P 是什么状 态?CPU 处于内核态还是用户态?", options:[], answer:"", answerText:"(1)①的前面是③，①的后面是⑤，⑥的后面是④。 (2)②使得CPU从进程P切换到其他进程，①之后调度器可以调度进程P。 (3)③由键盘驱动程序完成。 (4)中断处理时，进程P处于阻塞态，CPU处于内核态。", analysis:"【题型】应用题\n【章节】进程的描述与控制\n\n【参考答案】\n(1)①的前面是③，①的后面是⑤，⑥的后面是④。 (2)②使得CPU从进程P切换到其他进程，①之后调度器可以调度进程P。 (3)③由键盘驱动程序完成。 (4)中断处理时，进程P处于阻塞态，CPU处于内核态。\n\n【解题思路】\n本题考查进程的描述与控制的综合应用能力。解答此类题目时，需要：\n1. 仔细阅读题目，理解问题背景和已知条件；\n2. 回忆相关知识点，确定适用的原理、算法或公式；\n3. 按照逻辑步骤进行分析和计算；\n4. 最终给出清晰、完整的答案。\n\n建议动手画图辅助分析，注意检查计算过程和单位。"},
{id:264, type:"single", chapter:7, chapterName:"设备管理", text:"程序员利用系统调用打开I/O设备时，通常使用的设备标识是（ ）。", options:[{letter:"A", text:"逻辑设备名"}, {letter:"B", text:"物理设备名"}, {letter:"C", text:"主设备号"}, {letter:"D", text:"从设备号"}], answer:"A", answerText:"", analysis:"【考察知识点】设备管理 — 设备标识\n\n【选项分析】\n程序员利用系统调用打开I/O设备时，通常使用的设备标识是什么？\n\n✅ A. 逻辑设备名 — 正确。\n用户编程时使用逻辑设备名，实现设备独立性。\n\n❌ B. 物理设备名 — 错误。物理设备名是系统内部使用的，用户不直接使用。\n\n❌ C. 主设备号 — 错误。主设备号是内核标识设备类型的，用户不直接使用。\n\n❌ D. 从设备号 — 错误。从设备号是标识具体设备的，用户不直接使用。\n\n【答案】A\n\n【补充说明】\n设备独立性（设备无关性）：\n- 用户编程时使用逻辑设备名\n- 操作系统负责逻辑设备到物理设备的映射\n- 好处：提高可移植性、易于更换设备、便于资源分配\n\n逻辑设备名是用户看到的设备名，如/dev/tty、LPT1等。"},
{id:265, type:"single", chapter:7, chapterName:"设备管理", text:"在系统内存中设置磁盘缓冲区的主要目的是（ ）。", options:[{letter:"A", text:"减少磁盘I/O次数"}, {letter:"B", text:"减少平均寻道时间"}, {letter:"C", text:"提高磁盘数据可靠性"}, {letter:"D", text:"实现设备无关性"}], answer:"A", answerText:"", analysis:"【考察知识点】设备管理 — 磁盘缓冲区\n\n【选项分析】\n在系统内存中设置磁盘缓冲区的主要目的是什么？\n\n✅ A. 减少磁盘I/O次数 — 正确。\n磁盘缓冲区（高速缓存）可以缓存常用的磁盘数据，减少实际的磁盘I/O次数，提高性能。\n\n❌ B. 减少平均寻道时间 — 错误。缓冲区不能减少寻道时间，寻道时间是磁盘的物理特性。\n\n❌ C. 提高磁盘数据可靠性 — 错误。缓冲区主要是为了提高性能，不是可靠性。\n\n❌ D. 实现设备无关性 — 错误。设备无关性是通过逻辑设备名实现的，不是缓冲区。\n\n【答案】A\n\n【补充说明】\n磁盘高速缓存（缓冲区）的作用：\n- 利用内存空间缓存磁盘数据\n- 减少磁盘I/O次数\n- 提高I/O速度\n- 利用局部性原理（时间局部性、空间局部性）\n\n缓冲区在内存中，不在磁盘上。"},
{id:266, type:"single", chapter:7, chapterName:"设备管理", text:"用户程序发出磁盘I/O请求后，系统的处理流程是：用户程序->系统调用程序->设备驱动程序->中断处理程序。其中，计算数据所在磁盘的柱面号、磁头号、扇区号的程序是（ ）。", options:[{letter:"A", text:"用户程序"}, {letter:"B", text:"系统调用程序"}, {letter:"C", text:"设备驱动程序"}, {letter:"D", text:"中断处理程序"}], answer:"C", answerText:"", analysis:"【考察知识点】设备管理 — 设备驱动程序\n\n【选项分析】\n计算数据所在磁盘的柱面号、磁头号、扇区号的程序是哪个？\n\n❌ A. 用户程序 — 错误。用户程序只给出逻辑块号，不直接和物理地址打交道。\n\n❌ B. 系统调用程序 — 错误。系统调用是接口层，不负责具体的物理地址转换。\n\n✅ C. 设备驱动程序 — 正确。\n设备驱动程序负责将逻辑块号转换为具体的物理地址（柱面号、磁头号、扇区号），并控制设备执行I/O操作。\n\n❌ D. 中断处理程序 — 错误。中断处理程序负责I/O完成后的处理，不负责地址转换。\n\n【答案】C\n\n【补充说明】\nI/O软件的层次结构：\n1. 用户层I/O软件：提供系统调用接口\n2. 设备无关软件：实现设备独立性、缓冲等\n3. 设备驱动程序：将逻辑请求转换为具体的物理操作\n4. 中断处理程序：处理I/O完成后的中断\n\n设备驱动程序是和具体硬件打交道的，负责地址转换、控制设备操作等。"},
{id:267, type:"single", chapter:7, chapterName:"设备管理", text:"某文件占10个磁盘块，现要把该文件磁盘块逐个读入主存缓冲区，并送到用户区进行分析，假设一个缓冲区与一个磁盘块大小相同，把一个磁盘块读入缓冲区的时间为100μs，将缓冲区的数据传送到用户区的时间是50 μs ，CPU对一块数据进行分析的时间为50 μs 。在单缓冲和双缓冲结构下，读入并分析完该文件的时间分别是（ ）。", options:[{letter:"A", text:"1500 μs，1000 μs"}, {letter:"B", text:"1550 μs，1100 μs"}, {letter:"C", text:"1550 μs ，1550 μs"}, {letter:"D", text:"2000 μs，2000 μs"}], answer:"B", answerText:"", analysis:"【考察知识点】设备管理 — 单缓冲、双缓冲\n\n【已知条件】\n- 10个磁盘块\n- 读入缓冲区时间：100μs\n- 缓冲区传送到用户区：50μs\n- CPU分析时间：50μs\n\n【解题步骤】\n单缓冲：\n处理一个块的时间 = max(读入, 分析) + 传送\n= max(100, 50) + 50 = 100 + 50 = 150μs\n但注意：第一块和最后一块的处理不同。\n\n实际上，单缓冲下：\n- 第1块：读入100 + 传送50 + 分析50 = 200μs\n- 第2~10块：每块可以和前一块的分析并行，所以每块增加max(100, 50) = 100μs\n  不对，让我重新算。\n\n单缓冲的流水线：\n块1：读入(0-100) → 传送(100-150) → 分析(150-200)\n块2：读入(100-200) → 传送(200-250) → 分析(250-300)\n...\n注意：读入和分析可以并行，但传送和读入不能并行（只有一个缓冲区）。\n\n更准确的计算：\n单缓冲下，每块的处理时间（除了第一块）= max(读入, 分析) + 传送\n但实际上，由于只有一个缓冲区，读入和传送不能重叠。\n\n标准公式：\n单缓冲：T = n × max(C, M) + T + C？不对。\n\n让我用标准方法：\n单缓冲处理一块的时间 = max(读入, 处理) + 传送\n其中处理 = 传送 + 分析？不对。\n\n标准公式：\n- 读入时间：T\n- 传送时间：M\n- 计算时间：C\n\n单缓冲：\n处理一块的时间 = max(T, C) + M\n但第一块和最后一块不同。\n\n对于n块：\n单缓冲总时间 = (n-1) × max(T, M+C) + T + M + C？不对。\n\n让我直接计算：\nT = 100, M = 50, C = 50\n\n单缓冲：\n块1：读入(0-100) → 传送(100-150) → 分析(150-200)\n块2：读入(100-200) → 传送(200-250) → 分析(250-300)\n...\n块10：读入(900-1000) → 传送(1000-1050) → 分析(1050-1100)？不对\n\n等等，读入和分析可以并行，\n但读入和传送不能并行（同一个缓冲区），\n传送和分析也不能并行（同一个用户区？不对）。\n\n让我重新想：\n单缓冲：\n- 磁盘把数据读入缓冲区（100μs）\n- 缓冲区的数据传送到用户区（50μs）\n- CPU分析用户区的数据（50μs）\n\n读入和分析可以并行吗？\n可以，因为读入是磁盘到缓冲区，分析是CPU处理用户区的数据，\n这两个可以同时进行。\n\n但传送和读入不能同时（缓冲区只有一个）。\n传送和分析也不能同时（用户区只有一个？不对，分析的是上一块的数据）。\n\n让我用时间线：\n时间0：开始读第1块到缓冲区\n时间100：第1块读入完成，开始传送到用户区\n时间150：传送完成，开始分析第1块\n同时，开始读第2块到缓冲区（因为缓冲区现在空了？不对，传送完成后缓冲区就空了）\n\n时间150：开始分析第1块（150-200）\n同时：开始读第2块（150-250）\n\n时间200：第1块分析完成\n时间250：第2块读入完成，开始传送\n时间300：第2块传送完成，开始分析第2块（300-350）\n同时：开始读第3块（250-350？不对，250开始读，350完成）\n\n等等，这样算的话：\n第1块完成分析：200μs\n第2块完成分析：350μs\n每块增加150μs？不对。\n\n让我重新算：\n块1：0-100读入，100-150传送，150-200分析 → 200完成\n块2：150-250读入（和块1的分析并行），250-300传送，300-350分析 → 350完成\n块3：300-400读入（和块2的分析并行），400-450传送，450-500分析 → 500完成\n...\n每块增加150μs\n\n10块的话：\n第1块：200\n第2~10块：9 × 150 = 1350\n总计：200 + 1350 = 1550μs\n\n对，单缓冲是1550μs。\n\n双缓冲：\n双缓冲可以让读入和传送更好地并行。\n块1：0-100读入缓冲1，100-150传送，150-200分析\n同时：100-200读入缓冲2（因为缓冲1在传送，缓冲2可以读）\n...\n\n双缓冲下，读入和传送可以更好地并行。\n每块的时间主要由max(读入, 传送+分析)决定。\nmax(100, 50+50) = max(100, 100) = 100μs\n\n10块：\n第1块：100 + 50 + 50 = 200\n第2~10块：9 × 100 = 900\n总计：200 + 900 = 1100μs\n\n所以单缓冲1550μs，双缓冲1100μs。\n\n【答案】B（1550 μs，1100 μs）\n\n【补充说明】\n单缓冲 vs 双缓冲：\n- 单缓冲：读入和分析可以并行，但传送和读入串行\n- 双缓冲：读入和传送可以更好地并行，提高效率\n\n计算公式（近似）：\n- 单缓冲：总时间 ≈ n × max(T, M+C) + M + C（不精确，需要具体分析）\n- 双缓冲：总时间 ≈ n × max(T, M+C)（当T > M+C时）\n\n这道题T=100，M+C=100，刚好相等。"},
{id:268, type:"single", chapter:7, chapterName:"设备管理", text:"设磁盘的转速为6000r/min，盘面划分为10个扇区，则读取一个扇区的时间为( )。", options:[{letter:"A", text:"6ms"}, {letter:"B", text:"5ms"}, {letter:"C", text:"2ms"}, {letter:"D", text:"1ms"}], answer:"D", answerText:"", analysis:"【考察知识点】设备管理 — 磁盘性能\n\n【已知条件】\n- 磁盘转速：6000r/min\n- 扇区数：10个/磁道\n\n【解题步骤】\n第一步：计算转一圈的时间\n6000转/分钟 = 6000转/60秒 = 100转/秒\n转一圈的时间 = 1/100 = 0.01秒 = 10ms\n\n第二步：计算读取一个扇区的时间\n一个磁道有10个扇区，\n所以读取一个扇区的时间 = 10ms / 10 = 1ms\n\n【答案】D（1ms）\n\n【补充说明】\n磁盘的传输时间：\n- 转一圈的时间 = 60 / 转速(rpm) 秒\n- 一个磁道的扇区数 = N\n- 读取一个扇区的时间 = 转一圈时间 / N\n\n注意：这只是传输时间，不包括寻道时间和旋转延迟。\n完整的磁盘访问时间 = 寻道时间 + 旋转延迟 + 传输时间"},
{id:269, type:"single", chapter:7, chapterName:"设备管理", text:"用户程序发出磁盘I/O请求后，系统的正确处理流程是（ ）。", options:[{letter:"A", text:"用户程序->系统调用程序->中断处理程序->设备驱动程序"}, {letter:"B", text:"用户程序->系统调用程序->设备驱动程序->中断处理程序"}, {letter:"C", text:"用户程序->设备驱动程序->系统调用程序->中断处理程序"}, {letter:"D", text:"用户程序->设备驱动程序->中断处理程序->系统调用程序"}], answer:"B", answerText:"", analysis:"【考察知识点】设备管理 — I/O处理流程\n\n【选项分析】\n用户程序发出磁盘I/O请求后，系统的正确处理流程是什么？\n\n❌ A. 用户程序->系统调用程序->中断处理程序->设备驱动程序 — 错误。\n顺序不对，驱动程序在中断处理程序前面。\n\n✅ B. 用户程序->系统调用程序->设备驱动程序->中断处理程序 — 正确。\n用户程序发起系统调用 → 系统调用处理 → 设备驱动程序（启动设备）→ 设备完成后触发中断 → 中断处理程序。\n\n❌ C. 用户程序->设备驱动程序->系统调用程序->中断处理程序 — 错误。\n系统调用在驱动程序前面。\n\n❌ D. 用户程序->设备驱动程序->中断处理程序->系统调用程序 — 错误。\n顺序完全不对。\n\n【答案】B\n\n【补充说明】\nI/O请求的处理流程：\n1. 用户程序：发起I/O请求（通过系统调用）\n2. 系统调用处理程序：检查参数、找到对应设备\n3. 设备驱动程序：初始化设备、启动I/O操作\n4. 设备：执行I/O操作\n5. 中断处理程序：I/O完成后，设备触发中断，中断处理程序善后处理\n\n从上到下（用户到硬件）：用户层 → 系统调用 → 驱动程序 → 设备\n从下到上（完成后）：设备 → 中断 → 驱动 → 返回用户"},
{id:270, type:"single", chapter:7, chapterName:"设备管理", text:"本地用户通过键盘登录系统时，首先获得键盘输入信息的程序是（ ）。", options:[{letter:"A", text:"命令解释程序"}, {letter:"B", text:"中断处理程序"}, {letter:"C", text:"系统调用服务程序"}, {letter:"D", text:"用户登录程序"}], answer:"B", answerText:"", analysis:"【考察知识点】设备管理 — 键盘输入\n\n【选项分析】\n本地用户通过键盘登录系统时，首先获得键盘输入信息的程序是什么？\n\n❌ A. 命令解释程序 — 错误。命令解释程序是后面的，不是首先获得的。\n\n✅ B. 中断处理程序 — 正确。\n键盘输入会触发中断，首先由中断处理程序获得输入信息，存入内核缓冲区。\n\n❌ C. 系统调用服务程序 — 错误。系统调用是用户程序请求服务时用的，不是首先获得输入的。\n\n❌ D. 用户登录程序 — 错误。登录程序是应用层的，不是首先获得的。\n\n【答案】B\n\n【补充说明】\n键盘输入的处理过程：\n1. 用户按键\n2. 键盘控制器产生中断\n3. CPU响应中断，执行键盘中断处理程序\n4. 中断处理程序读取键盘数据，存入内核缓冲区\n5. 等待用户程序通过系统调用读取\n\n所以首先获得键盘输入信息的是中断处理程序。"},
{id:271, type:"single", chapter:7, chapterName:"设备管理", text:"操作系统的I/O子系统通常由四个层次组成，每一层明确定义了与邻近层次的接口，其合理的层次组织排列顺序是（ ）。", options:[{letter:"A", text:"用户级I/O软件，设备无关软件，设备驱动程序，中断处理程序"}, {letter:"B", text:"用户级I/O软件，设备无关软件，中断处理程序，设备驱动程序"}, {letter:"C", text:"用户级I/O软件，设备驱动程序，设备无关软件，中断处理程序"}, {letter:"D", text:"用户级I/O软件，中断处理程序，设备无关软件，设备驱动程序"}], answer:"A", answerText:"", analysis:"【考察知识点】设备管理 — I/O软件层次\n\n【选项分析】\nI/O子系统的四个层次，合理的排列顺序是什么？\n\n✅ A. 用户级I/O软件，设备无关软件，设备驱动程序，中断处理程序 — 正确。\n从上到下（用户到硬件）：\n1. 用户级I/O软件（最上层，用户接口）\n2. 设备无关软件（设备独立性软件）\n3. 设备驱动程序\n4. 中断处理程序（最底层，硬件相关）\n\n❌ B. 用户级I/O软件，设备无关软件，中断处理程序，设备驱动程序 — 错误。\n驱动程序在中断处理程序上面。\n\n❌ C. 用户级I/O软件，设备驱动程序，设备无关软件，中断处理程序 — 错误。\n设备无关软件在驱动程序上面。\n\n❌ D. 用户级I/O软件，中断处理程序，设备无关软件，设备驱动程序 — 错误。\n顺序完全不对。\n\n【答案】A\n\n【补充说明】\nI/O软件的层次结构（从上到下）：\n1. 用户层I/O软件：提供系统调用接口、库函数\n2. 设备无关软件：实现设备独立性、缓冲、错误处理等\n3. 设备驱动程序：和具体设备打交道，控制设备操作\n4. 中断处理程序：处理I/O完成后的中断\n\n越往上越接近用户，越往下越接近硬件。"},
{id:272, type:"single", chapter:7, chapterName:"设备管理", text:"用户程序发出磁盘I/O请求后，系统的处理流程是：用户程序->系统调用程序->设备驱动程序->中断处理程序。其中，计算数据所在磁盘的柱面号、磁头号、扇区号的程序是（ ）。", options:[{letter:"A", text:"用户程序"}, {letter:"B", text:"系统调用程序"}, {letter:"C", text:"设备驱动程序"}, {letter:"D", text:"中断处理程序"}], answer:"C", answerText:"", analysis:"【考察知识点】设备管理 — 设备驱动程序\n\n【选项分析】\n计算数据所在磁盘的柱面号、磁头号、扇区号的程序是哪个？\n\n这道题和第266题是重复的。\n\n❌ A. 用户程序 — 错误。\n❌ B. 系统调用程序 — 错误。\n✅ C. 设备驱动程序 — 正确。\n❌ D. 中断处理程序 — 错误。\n\n【答案】C\n\n【补充说明】\n设备驱动程序负责将逻辑块号转换为具体的物理地址（柱面号、磁头号、扇区号），并控制设备执行I/O操作。\n\n驱动程序是和具体硬件打交道的，负责地址转换、控制设备操作等。"},
{id:273, type:"single", chapter:7, chapterName:"设备管理", text:"下列选项中，不能改善磁盘设备I/O性能的是（ ）。", options:[{letter:"A", text:"重排I/O请求次序"}, {letter:"B", text:"在一个磁盘上设置多个分区"}, {letter:"C", text:"预读和滞后写"}, {letter:"D", text:"优化文件物理块的分布"}], answer:"B", answerText:"", analysis:"【考察知识点】设备管理 — 磁盘I/O性能\n\n【选项分析】\n哪个不能改善磁盘设备I/O性能？\n\n❌ A. 重排I/O请求次序 — 可以改善。\n通过磁盘调度算法（如SSTF、SCAN）重排请求次序，可以减少寻道时间，改善性能。\n\n✅ B. 在一个磁盘上设置多个分区 — 不能改善。\n分区只是逻辑上划分，不能改善I/O性能，反而可能增加开销。\n\n❌ C. 预读和滞后写 — 可以改善。\n预读（提前读入可能需要的数据）和滞后写（批量写入）可以减少I/O次数，改善性能。\n\n❌ D. 优化文件物理块的分布 — 可以改善。\n优化文件块的分布（如连续分配），可以减少寻道时间，改善性能。\n\n【答案】B\n\n【补充说明】\n改善磁盘I/O性能的方法：\n- 磁盘调度算法（重排请求次序）\n- 预读和滞后写\n- 优化文件物理块分布\n- 磁盘高速缓存\n- 虚拟盘（RAM盘）\n- 提高磁盘转速、增加缓存等\n\n设置分区不能改善I/O性能，分区只是逻辑划分，不影响磁盘的物理性能。"},
{id:274, type:"single", chapter:7, chapterName:"设备管理", text:"打印机适合于连接到（ ）。", options:[{letter:"A", text:"成组多路通道"}, {letter:"B", text:"字节多路通道"}, {letter:"C", text:"数据选择通道"}, {letter:"D", text:"都不对"}], answer:"B", answerText:"", analysis:"【考察知识点】设备管理 — 通道\n\n【选项分析】\n打印机适合连接到哪种通道？\n\n❌ A. 成组多路通道 — 错误。成组多路通道（数组多路通道）适合高速设备。\n\n✅ B. 字节多路通道 — 正确。\n字节多路通道适合连接大量低速或中速I/O设备，如打印机、终端等。\n\n❌ C. 数据选择通道 — 错误。选择通道适合高速设备，如磁盘。\n\n❌ D. 都不对 — 错误。\n\n【答案】B\n\n【补充说明】\n通道的类型：\n1. 字节多路通道：\n   - 按字节交叉方式工作\n   - 适合连接大量低速、中速设备\n   - 如打印机、终端、键盘等\n\n2. 数组选择通道：\n   - 成组传送数据\n   - 只连接一个设备（选择一个设备）\n   - 适合高速设备，如磁盘\n\n3. 数组多路通道（成组多路通道）：\n   - 成组传送，但可以分时为多个设备服务\n   - 适合中高速设备\n   - 结合了前两者的优点\n\n打印机是低速设备，适合字节多路通道。"},
{id:275, type:"single", chapter:7, chapterName:"设备管理", text:"下列关于各阶段CPU和外设间进行通信的方式中，说法正确的是（ ）。", options:[{letter:"A", text:"程序直接控制方式中，CPU需要不断测试一台设备的忙/闲标志来获得外设的工作状态"}, {letter:"B", text:"程序中断I/O控制方式中，CPU需要不断测试一台设备的忙/闲标志来获得外设的工作状态"}, {letter:"C", text:"程序直接控制方式仅当I/O操作正常或异常结束时才中断中央处理机"}, {letter:"D", text:"DMA控制方式仅当I/O操作异常结束时才中断中央处理机"}], answer:"A", answerText:"", analysis:"【考察知识点】设备管理 — I/O控制方式\n\n【选项分析】\n关于CPU和外设通信方式，说法正确的是？\n\n✅ A. 程序直接控制方式中，CPU需要不断测试一台设备的忙/闲标志来获得外设的工作状态 — 正确。\n程序直接控制方式（轮询方式）中，CPU不断查询设备状态，直到设备就绪。\n\n❌ B. 程序中断I/O控制方式中，CPU需要不断测试一台设备的忙/闲标志来获得外设的工作状态 — 错误。\n中断方式中，CPU不需要轮询，设备完成后主动发中断通知CPU。\n\n❌ C. 程序直接控制方式仅当I/O操作正常或异常结束时才中断中央处理机 — 错误。\n程序直接控制方式没有中断，是轮询的。\n\n❌ D. DMA控制方式仅当I/O操作异常结束时才中断中央处理机 — 错误。\nDMA方式中，正常完成也会发中断通知CPU。\n\n【答案】A\n\n【补充说明】\nI/O控制方式：\n1. 程序直接控制（轮询）：\n   - CPU不断查询设备状态\n   - CPU和设备串行工作\n   - CPU利用率低\n\n2. 中断驱动方式：\n   - CPU启动设备后继续做其他事\n   - 设备完成后发中断通知CPU\n   - CPU和设备可以并行\n   - 但每个字节/字都要中断，开销大\n\n3. DMA方式：\n   - 数据传输由DMA控制器控制\n   - 整块数据传输完成后才发中断\n   - CPU干预更少，效率更高\n\n4. 通道方式：\n   - 通道是专门的I/O处理机\n   - CPU干预最少，效率最高"},
{id:276, type:"single", chapter:7, chapterName:"设备管理", text:"某磁盘的磁道数为400(磁道号为0~399),采用循环扫描算法(CSCAN)进行磁盘调度，完成对200号磁道的请求后，磁头向磁道号减小的方向移动。若还有7个磁盘请求，对应的磁道号分别为300，120，110，0，160，210，399，则完成上述磁盘访问请求后磁头移动的距离是( )。", options:[{letter:"A", text:"599"}, {letter:"B", text:"619"}, {letter:"C", text:"788"}, {letter:"D", text:"799"}], answer:"C", answerText:"", analysis:"【考察知识点】设备管理 — CSCAN磁盘调度\n\n【已知条件】\n- 磁道数：0~399\n- 当前位置：200号磁道\n- 移动方向：磁道号减小的方向\n- 请求队列：300, 120, 110, 0, 160, 210, 399\n- 算法：CSCAN（循环扫描）\n\n【解题步骤】\nCSCAN（循环扫描）算法：\n- 沿一个方向扫描，处理所有请求\n- 走到尽头后，直接跳转到另一端，继续沿同一个方向扫描\n- 注意：跳转的那段不算移动距离？不对，跳转也要算移动距离。\n\n等等，CSCAN是循环扫描，单向走到尽头后，直接跳转到最小的请求处继续。\n但跳转的距离算不算移动距离？\n通常是算的，因为磁头确实移动了。\n\n让我分析：\n当前位置：200，方向：减小（向0方向）\n\n沿减小方向，比200小的请求有：160, 120, 110, 0\n按从大到小排序：160, 120, 110, 0\n\n处理顺序（减小方向）：\n200 → 160 → 120 → 110 → 0\n移动距离：40 + 40 + 10 + 110 = 200\n\n走到0（尽头）后，跳转到最大的请求处，继续沿减小方向？不对。\nCSCAN是循环扫描，方向不变。\n走到尽头后，直接跳转到另一端的第一个请求，继续同方向扫描。\n\n比200大的请求有：210, 300, 399\n按从大到小排序：399, 300, 210\n\n等等，如果方向是减小，那从大到小处理。\n走到0后，跳转到最大的请求399，继续沿减小方向处理。\n\n跳转距离：0 → 399，移动399个磁道\n\n然后处理：399 → 300 → 210\n移动距离：99 + 90 = 189\n\n总移动距离：200 + 399 + 189 = 788\n\n对，是788。\n\n【答案】C（788）\n\n【补充说明】\nCSCAN（循环扫描）算法：\n- 沿一个方向扫描，处理所有遇到的请求\n- 走到尽头后，直接跳转到另一端的第一个请求\n- 继续沿同一个方向扫描\n- 跳转的距离也要算入总移动距离\n\n和SCAN（电梯算法）的区别：\n- SCAN走到尽头后掉头，反向扫描\n- CSCAN走到尽头后跳转到另一端，继续同方向扫描\n\nCSCAN的优点：对两端的请求响应更均匀，不会出现一端等待时间过长的情况。"},
{id:277, type:"single", chapter:7, chapterName:"设备管理", text:"下列（ ）不是设备的分配方式。", options:[{letter:"A", text:"独享分配"}, {letter:"B", text:"共享分配"}, {letter:"C", text:"虚拟分配"}, {letter:"D", text:"分区分配"}], answer:"D", answerText:"", analysis:"【考察知识点】设备管理 — 设备分配方式\n\n【选项分析】\n哪个不是设备的分配方式？\n\n❌ A. 独享分配 — 是。独享分配（独占分配）是设备分配方式之一。\n\n❌ B. 共享分配 — 是。共享分配是设备分配方式之一。\n\n❌ C. 虚拟分配 — 是。虚拟分配（如SPOOLing）是设备分配方式之一。\n\n✅ D. 分区分配 — 不是。分区分配是内存分配方式，不是设备分配方式。\n\n【答案】D\n\n【补充说明】\n设备分配方式：\n1. 独占分配（独享分配）：\n   - 设备分配给一个进程后，直到用完才释放\n   - 适合独占设备，如打印机\n   - 可能导致设备利用率低\n\n2. 共享分配：\n   - 多个进程可以同时使用设备\n   - 适合共享设备，如磁盘\n\n3. 虚拟分配：\n   - 通过SPOOLing等技术，将独占设备虚拟为共享设备\n   - 提高设备利用率\n\n分区分配是内存管理的概念，和设备分配无关。"},
{id:278, type:"single", chapter:7, chapterName:"设备管理", text:"设系统缓冲区和用户工作区均采用单缓冲，从外设读入1个数据块到系统缓冲区的时间为100，从系统缓冲区读入1个数据块到用户工作区的时间是5，对用户工作区的一个数据块进行分析的时间为90（如图所示），进程从外设读入并分析2个数据块的最短时间是（ ）。", options:[{letter:"A", text:"200"}, {letter:"B", text:"295"}, {letter:"C", text:"300"}, {letter:"D", text:"390"}], answer:"C", answerText:"", analysis:"【考察知识点】设备管理 — 单缓冲\n\n【已知条件】\n- 读入系统缓冲区时间：100\n- 缓冲区到用户工作区时间：5\n- 分析时间：90\n- 数据块数：2个\n\n【解题步骤】\n单缓冲处理2个数据块的最短时间：\n\n块1：\n- 读入缓冲区：0-100\n- 传送到用户区：100-105\n- 分析：105-195\n\n块2：\n- 读入缓冲区：100-200（和块1的传送、分析并行？不对，100时缓冲区满了，要等传送完才能读下一块）\n  等等，100时块1读入完成，开始传送。\n  传送需要5（100-105），105时缓冲区空了，可以开始读块2。\n  \n  所以块2读入：105-205\n  不对，这样的话：\n  \n  块1：0-100读入，100-105传送，105-195分析\n  块2：105-205读入（和块1的分析并行），205-210传送，210-300分析\n  \n  总时间：300\n\n对，是300。\n\n验证：\n块1分析完成：195\n块2分析完成：300\n总时间：300\n\n【答案】C（300）\n\n【补充说明】\n单缓冲的流水线：\n- 读入和分析可以并行\n- 但读入和传送不能并行（同一个缓冲区）\n- 传送和分析也不能完全并行\n\n公式（近似）：\n每块时间 ≈ max(读入, 分析) + 传送\n但第一块和最后一块需要完整计算。\n\n这道题：\n读入100，分析90，传送5\nmax(100, 90) = 100\n每块增加约100\n2块：100 + 5 + 90 + 100 = 295？不对，实际是300。\n\n因为第二块的读入要等第一块传送完才能开始，\n所以有5的延迟。\n100 + 5 + 90 + 100 + 5 = 300\n对，刚好300。"},
{id:279, type:"single", chapter:7, chapterName:"设备管理", text:"通过硬件和软件的支持，把原来只能独享的设备改造成为可供多个用户共享的设备，这种设备称为（ ）。", options:[{letter:"A", text:"存储设备"}, {letter:"B", text:"系统设备"}, {letter:"C", text:"用户设备"}, {letter:"D", text:"虚拟设备"}], answer:"D", answerText:"", analysis:"【考察知识点】设备管理 — 虚拟设备\n\n【选项分析】\n通过软硬件支持，把独享设备改造成多个用户共享的设备，这种设备叫什么？\n\n❌ A. 存储设备 — 错误。\n❌ B. 系统设备 — 错误。\n❌ C. 用户设备 — 错误。\n✅ D. 虚拟设备 — 正确。\n虚拟设备是通过SPOOLing等技术，将独占设备改造为共享设备。\n\n【答案】D\n\n【补充说明】\n虚拟设备：\n- 通过软件（如SPOOLing）+ 硬件支持\n- 将独占设备（如打印机）改造成共享设备\n- 每个用户感觉自己独占设备\n- 实际上是共享的，提高了设备利用率\n\n典型例子：SPOOLing系统将打印机虚拟为多台打印机。"},
{id:280, type:"single", chapter:7, chapterName:"设备管理", text:"（ ）用作连接大量的低速或中速I/O设备。", options:[{letter:"A", text:"数据选择通道"}, {letter:"B", text:"字节多路通道"}, {letter:"C", text:"数据多路通道"}, {letter:"D", text:"I/O处理机"}], answer:"B", answerText:"", analysis:"【考察知识点】设备管理 — 通道\n\n【选项分析】\n哪种通道用作连接大量的低速或中速I/O设备？\n\n❌ A. 数据选择通道 — 错误。选择通道适合高速设备。\n\n✅ B. 字节多路通道 — 正确。\n字节多路通道按字节交叉方式工作，适合连接大量低速、中速设备。\n\n❌ C. 数据多路通道 — 错误。数组多路通道适合中高速设备。\n\n❌ D. I/O处理机 — 错误。I/O处理机是更高级的，不是通道类型。\n\n【答案】B\n\n【补充说明】\n通道的类型：\n1. 字节多路通道：\n   - 按字节交叉方式工作\n   - 适合连接大量低速、中速设备\n   - 如打印机、终端、键盘等\n\n2. 数组选择通道：\n   - 成组传送数据\n   - 只连接一个设备\n   - 适合高速设备，如磁盘\n\n3. 数组多路通道：\n   - 成组传送，分时为多个设备服务\n   - 适合中高速设备\n\n字节多路通道适合大量低速/中速设备。"},
{id:281, type:"single", chapter:7, chapterName:"设备管理", text:"以下（ ）不属于设备管理数据结构", options:[{letter:"A", text:"PCB"}, {letter:"B", text:"DCT"}, {letter:"C", text:"COCT"}, {letter:"D", text:"CHCT"}], answer:"A", answerText:"", analysis:"【考察知识点】设备管理 — 设备管理数据结构\n\n【选项分析】\n哪个不属于设备管理数据结构？\n\n✅ A. PCB — 正确。\nPCB是进程控制块，属于进程管理，不是设备管理。\n\n❌ B. DCT — 错误。\nDCT（设备控制表）是设备管理的数据结构。\n\n❌ C. COCT — 错误。\nCOCT（控制器控制表）是设备管理的数据结构。\n\n❌ D. CHCT — 错误。\nCHCT（通道控制表）是设备管理的数据结构。\n\n【答案】A\n\n【补充说明】\n设备管理的数据结构：\n- DCT（Device Control Table）：设备控制表，每个设备一张\n- COCT（Controller Control Table）：控制器控制表，每个控制器一张\n- CHCT（Channel Control Table）：通道控制表，每个通道一张\n- SDT（System Device Table）：系统设备表，整个系统一张\n\nPCB（Process Control Block）是进程控制块，属于进程管理。"},
{id:282, type:"single", chapter:7, chapterName:"设备管理", text:"系统将数据从磁盘读到内存的过程包括以下操作：1、DMA控制器发出中断请求2、初始化DMA控制器并启动磁盘 3、从磁盘传输一块数据到内存缓冲区 4、执行“DMA结束”中断服务程序 正确的执行顺序是（ ）。", options:[{letter:"A", text:"3、1、2、4"}, {letter:"B", text:"2、3、1、4"}, {letter:"C", text:"2、1、3、4"}, {letter:"D", text:"1、2、4、3"}], answer:"B", answerText:"", analysis:"【考察知识点】设备管理 — DMA\n\n【选项分析】\n系统将数据从磁盘读到内存的过程，正确的执行顺序是什么？\n\n操作：\n1. DMA控制器发出中断请求\n2. 初始化DMA控制器并启动磁盘\n3. 从磁盘传输一块数据到内存缓冲区\n4. 执行\"DMA结束\"中断服务程序\n\n正确顺序：\n首先初始化DMA控制器并启动磁盘（2），\n然后磁盘传输数据到内存（3），\n传输完成后DMA控制器发中断（1），\n最后执行中断服务程序（4）。\n\n所以顺序是：2 → 3 → 1 → 4\n\n【答案】B（2、3、1、4）\n\n【补充说明】\nDMA的工作过程：\n1. CPU初始化DMA控制器（设置地址、长度等），启动设备\n2. DMA控制器接管总线，控制数据传输（设备 ↔ 内存）\n3. 数据传输完成后，DMA控制器发中断\n4. CPU响应中断，执行中断服务程序\n\nDMA的特点：\n- 数据传输由DMA控制器控制，不需要CPU干预\n- 传输完成后才发中断\n- 整块数据传输，CPU干预少，效率高"},
